<style>

<script>
"use strict";
/* ===================== FOUNDER — DYNASTY, INC. (rebuild) ===================== */
function rngFrom(s){let t=s>>>0;return function(){t=(t+0x6D2B79F5)>>>0;let x=Math.imul(t^(t>>>15),t|1);x^=x+Math.imul(x^(x>>>7),x|61);return ((x^(x>>>14))>>>0)/4294967296;};}
let RNG=rngFrom((Date.now())>>>0);
function rnd(){return RNG();}
function ri(a,b){return Math.floor(rnd()*(b-a+1))+a;}
function pick(a){return a[Math.floor(rnd()*a.length)];}
function chance(p){return rnd()<p;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
let _uid=0;function uid(){return 'x'+(_uid++).toString(36)+Math.floor(rnd()*1e6).toString(36);}
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0);}
function srnd(seed){return rngFrom(hash(seed));}
function money(m){if(m==null||isNaN(m))return '$0';const neg=m<0;let v=Math.abs(m),s;
 if(v>=1e6)s='$'+(v/1e6).toFixed(2)+'T';else if(v>=1e3)s='$'+(v/1e3).toFixed(2)+'B';
 else if(v>=1)s='$'+v.toFixed(v<10?1:0)+'M';else s='$'+Math.round(v*1000)+'K';
 return (neg?'-':'')+s;}
function pct(x){return (x*100).toFixed(x<0.095?1:0)+'%';}
function users(n){if(n>=1e9)return (n/1e9).toFixed(1)+'B';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return Math.round(n).toString();}

/* ---------- INDUSTRIES & SUBGENRES ---------- */
const INDUSTRIES=[
 {key:'tech',name:'Technology',color:'#5b8def',subs:['Social Networks','Search Engines','E-Commerce','Cloud & SaaS','Mobile Apps','Fintech Apps','Cybersecurity','AI & Data']},
 {key:'health',name:'Healthcare',color:'#3fb98f',subs:['Biotech','Pharma','Medical Devices','Health Insurance','Hospitals & Clinics','Telehealth','Diagnostics','Mental Health']},
 {key:'fin',name:'Finance',color:'#c8a24c',subs:['Retail Banking','Investment Banking','Asset Management','Insurance','Payments','Crypto','Lending','PropTech']},
 {key:'cons',name:'Consumer & Retail',color:'#e07a5f',subs:['Apparel','Food & Beverage','Grocery','Restaurants','Beauty','Home Goods','Luxury','DTC Brands']},
 {key:'media',name:'Media & Entertainment',color:'#b06ad6',subs:['Streaming','Gaming','Film & TV','Music','Publishing','Social Media','Advertising','Esports']},
 {key:'energy',name:'Energy & Industrial',color:'#d99a3f',subs:['Oil & Gas','Renewables','Utilities','Mining','Manufacturing','Chemicals','Construction','Aerospace']},
 {key:'logi',name:'Logistics & Mobility',color:'#6fb3c4',subs:['Freight & Shipping','Ride-Share','Food Delivery','Trucking','Airlines','Warehousing','Autonomous Vehicles','Space']},
];
const NET_WORDS=['Social','Search','Commerce','Payments','Ride','Delivery','Streaming','Media','Esports','Mobile','Crypto','Marketplace'];
const CAP_WORDS=['Biotech','Pharma','Devices','Hospitals','Oil','Mining','Manufacturing','Chemicals','Construction','Aerospace','Airlines','Trucking','Autonomous','Space','Utilities','Renewables','Freight'];
const LOWMARGIN=['Grocery','Restaurants','Airlines','Food','Retail','Trucking','Construction','Delivery','Apparel','Manufacturing'];
const HIGHMARGIN=['SaaS','Software','Cloud','Pharma','Biotech','Asset','Investment','Luxury','Search','Social','Payments','Insurance'];
let SUBS=[];const SUBBY={};
function buildSubs(){
 SUBS=[];INDUSTRIES.forEach(ind=>{ind.subs.forEach((nm,j)=>{
  const id=ind.key+':'+j;const r=srnd(id);
  let net=0.1+r()*0.25, cap=0.15+r()*0.25, margin=0.1+r()*0.18, growth=0.02+r()*0.06;
  NET_WORDS.forEach(w=>{if(nm.includes(w))net=clamp(net+0.5,0,0.95);});
  CAP_WORDS.forEach(w=>{if(nm.includes(w))cap=clamp(cap+0.5,0,0.95);});
  LOWMARGIN.forEach(w=>{if(nm.includes(w))margin=clamp(margin-0.07,0.04,0.5);});
  HIGHMARGIN.forEach(w=>{if(nm.includes(w))margin=clamp(margin+0.16,0.04,0.55);});
  if(ind.key==='tech')growth+=0.03; if(ind.key==='health'){growth+=0.015;cap=clamp(cap+0.2,0,0.95);}
  const indScale={tech:1,health:1.7,fin:1.8,cons:1.3,media:1,energy:2.2,logi:1.5}[ind.key];
  const base=(380+r()*1400)*indScale; // annual $M per region
  const arpu=20+r()*180; // $/user/yr for user metric
  const o={id,ind:ind.key,indName:ind.name,name:nm,color:ind.color,net,cap,margin,growth,base,arpu};
  SUBS.push(o);SUBBY[id]=o;
 });});
}
buildSubs();

/* ---------- REGIONS & CITIES ---------- */
const REGIONS={na:'North America',sa:'South America',eu:'Europe',mea:'Middle East & Africa',asia:'Asia',oce:'Oceania'};

 na:{tech:1.3,health:1.3,fin:1.3,cons:1.2,media:1.3,energy:1.1,logi:1.1},

 {key:'tok',name:'Tokyo',x:887,y:139,region:'asia',hubs:['tech','media']},
 {key:'syd',name:'Sydney',x:920,y:317,region:'oce',hubs:['fin','energy']},

const CITYBY={};CITIES.forEach(c=>CITYBY[c.key]=c);
function cityHubBoost(city,indKey){return city.hubs.includes(indKey)?1.4:1.0;}

/* ---------- PORTRAITS (pixel, customizable, heritable) ---------- */
const SKIN=['#f6dcc0','#ecc09c','#d29a6e','#b07a4e','#8a5a36','#5e3a22'];
const SKIN_LBL=['Porcelain','Light','Tan','Bronze','Brown','Deep'];
const HAIRC=['#1d1714','#3a2a1c','#5a3d26','#7a5a34','#9a7a44','#a8a29a','#caa24a','#7a2f2f'];
const HAIRC_LBL=['Black','Dark Brown','Brown','Light Brown','Blond','Grey','Auburn','Red'];
const EYEC=['#4a3120','#33514f','#3a577a','#4a6741','#6b4a2a'];
const EYEC_LBL=['Brown','Green','Blue','Hazel','Amber'];
const HAIRSTYLES=['short','side','buzz','curly','long','bun','bald'];
function shadeHex(c,a){let n=parseInt(c.slice(1),16),R=(n>>16)&255,G=(n>>8)&255,B=n&255;R=clamp(R+a,0,255);G=clamp(G+a,0,255);B=clamp(B+a,0,255);return '#'+((1<<24)+(R<<16)+(G<<8)+B).toString(16).slice(1);}
const JACKETS=['#33506b','#3b3f47','#5a3a44','#3f5a4a','#4a4036','#2e3138','#5a4a6a','#6a4030','#324a52','#2c2a30'];
const NECKC=['#7a263a','#264a7a','#2f6e56','#6a5a1f','#5a2e6a','#333','#b04a30'];
function defaultAppearance(fem){
 return {fem:!!fem,sk:1,hr:1,ey:0,style:fem?'long':'short',
  jacket:pick(JACKETS),shirt:pick(['#ffffff','#eef2f6','#dfe6ec','#2a2d33']),cut:pick(['single','single','double']),
  neck:fem?pick(['none','open']):pick(['tie','tie','open','bowtie']),neckcol:pick(NECKC),
  glasses:chance(.4),fac:fem?'none':pick(['none','none','stubble','beard','must']),acccol:pick(['#caa64a','#cdd2d6','#b04a30'])};
}
function randomAppearance(){const a=defaultAppearance(chance(.5));a.sk=ri(0,5);a.hr=ri(0,7);a.ey=ri(0,4);a.style=pick(a.fem?['long','long','short','side','bun']:['short','side','buzz','curly','short']);return a;}
function childAppearance(parent){
 const a=randomAppearance();
 a.sk=parent.app.sk; // inherit race
 a.hr=chance(.8)?parent.app.hr:ri(0,7);
 a.ey=chance(.6)?parent.app.ey:ri(0,4);
 a.fem=chance(.5);a.style=pick(a.fem?['long','short','side','bun']:['short','side','buzz','curly']);
 if(a.fem)a.fac='none';
 return a;
}

 RNG=rngFrom((Date.now()^hash(setup.dynasty))>>>0);_uid=0;Object.keys(usedCoNames).forEach(k=>delete usedCoNames[k]);

 sp.app.sk=f.app.sk; // (flavor) align household

 newWorld();
 // player company

function playerCo(){return G.companies.find(c=>c.id===G.playerCoId);}

/* ---------- market / economy ---------- */
function marketKey(subId,region){return subId+'|'+region;}
function marketSize(subId,region){const sub=SUBBY[subId];return sub.base*REGION_W[region][sub.ind]*G.macro*((G.industryMacro&&G.industryMacro[sub.ind])||1);}
function companiesInMarket(subId,region){const out=[];G.companies.forEach(c=>{if(!c.alive)return;c.markets.forEach(m=>{if(m.subId===subId&&m.region===region)out.push({c,m});});});return out;}
function appeal(c){return clamp((c.product*0.6+c.brand*0.4)/100,0.02,1);}
function avgAppeal(subId,region){const l=companiesInMarket(subId,region);if(!l.length)return 0.3;let s=0;l.forEach(o=>s+=appeal(o.c));return s/l.length;}
function shareIn(subId,region){
 const sub=SUBBY[subId];const k=1+sub.net*1.4;
 const list=companiesInMarket(subId,region);let denom=0;
 list.forEach(({c,m})=>{m._w=Math.pow(Math.max(0.01,m.traction*appeal(c)),k);denom+=m._w;});
 list.forEach(({m})=>{m.share=denom>0?m._w/denom:0;});
 return list;
}
function recalcCompany(c){
 let rev=0,usr=0;
 c.markets.forEach(m=>{
  shareIn(m.subId,m.region);
  const sz=marketSize(m.subId,m.region);
  m.revenue=(m.share||0)*sz/12; // monthly
  m.users=(m.share||0)*(sz/SUBBY[m.subId].arpu);
  rev+=m.revenue;usr+=m.users;
 });
 c.revenue=rev;c.users=usr;
 // valuation
 const annual=rev*12;let val;
 if(annual>3){const sub=SUBBY[c.markets[0].subId];let mult=3.5+sub.growth*55;if(c.stage==='Public')mult+=2;mult=clamp(mult,3,16);val=annual*mult;}
 else{const tr=c.markets.reduce((a,m)=>a+m.traction*appeal(c),0);val=tr*(2.2+SUBBY[c.markets[0].subId].net*4);}
 val+=Math.max(0,c.cash);
 c.valuation=Math.max(0.3,val);
 c.profitable=(rev*marginOf(c)-burnOf(c))>0;
}
function marginOf(c){const sub=SUBBY[c.markets[0].subId];return clamp(sub.margin*(0.7+c.scale/180),0.04,0.6);}
function burnOf(c){return c.employees*0.012 + c.markets.length*0.15 + (c.brand>50?0.3:0.1);}
function recalcAllFinancials(){G.companies.forEach(c=>{if(c.alive)recalcCompany(c);});}

/* ---------- time engine ---------- */
function step(){
 if(G.gameOver)return;
 G.month++;if(G.month>12){G.month=1;G.year++;yearTick();}
 tickWorld();
 tickWealth();
 tickTeams();
 maybeEvent();
 recalcAllFinancials();
 const pc=playerCo();
 if(pc&&pc.cash<-12){failCompany();}
 if(G.year>=G.endYear)endGame('Century complete');
 if(G.eventQueue.length)G.auto=false;
 save();render();
 if(G.auto&&!G.eventQueue.length&&!G.gameOver)scheduleAuto();
}
let autoTimer=null;
function scheduleAuto(){clearTimeout(autoTimer);autoTimer=setTimeout(()=>{if(G.auto)step();},560);}
function toggleAuto(){if(G.gameOver)return;G.auto=!G.auto;if(G.auto&&!G.eventQueue.length)scheduleAuto();else clearTimeout(autoTimer);render();}
function manualStep(){G.auto=false;clearTimeout(autoTimer);step();}

function tickWorld(){
 const pc=playerCo();
 // growth of traction for all companies
 G.companies.forEach(c=>{if(!c.alive)return;c.age++;
  const ap=appeal(c);
  c.markets.forEach(m=>{
   const sub=SUBBY[m.subId];
   const avgAp=avgAppeal(m.subId,m.region);
   // a better-than-average product grows; network effects amplify the gap (challengers can take over)
   let g=sub.growth*(0.5+ap)-0.012+(ap-avgAp)*(0.05+sub.net*0.11);
   g=clamp(g,-0.08,0.26);
   g*=(1-0.55*(m.share||0)); // saturation: can't grow past a market you already own
   m.traction=clamp(m.traction*(1+g)+ap*0.06,0.2,99999);
  });
  // attribute decay (slow — investments should stick)
  c.product=clamp(c.product-0.10,1,100);c.brand=clamp(c.brand-0.12,1,100);
  // cash flow
  const profit=c.revenue*marginOf(c)-burnOf(c);
  c.cash+=profit;
  // AI behavior (non-player)
  if(!c.isPlayer)aiCompany(c);
 });
 // macro drift + cycles
 G.macro*=(1+0.0016 + (chance(0.2)?(rnd()-0.5)*0.01:0));G.macro=clamp(G.macro,0.7,4);
 // shutdowns
 G.companies.forEach(c=>{if(c.alive&&!c.isPlayer&&c.cash<-4&&chance(0.4)){c.alive=false;if(c.valuation>40)addFeed('rival',`${c.name} shuts down after running out of runway.`);}});
 // new startups appear
 if(chance(0.5)){const sub=pick(SUBS);const city=pick(CITIES);const co=makeCompany({subId:sub.id,region:city.region,city:city.key,product:ri(25,55),brand:ri(4,20),scale:ri(8,30),cash:ri(2,12),stage:'Seed',employees:ri(4,20),traction:1.5+rnd()*3,ownership:.8});G.companies.push(co);if(chance(.25))addFeed('world',`New startup ${co.name} launches in ${city.name} (${sub.name}).`);}
 // rival M&A
 if(chance(0.3))aiMergers();
}
function aiCompany(c){
 if(c.cash>6&&chance(0.4)){const spend=c.cash*0.2;c.cash-=spend;if(chance(0.5))c.product=clamp(c.product+spend*0.8,1,100);else c.brand=clamp(c.brand+spend*0.9,1,100);}
 if(c.cash<3&&c.valuation>20&&chance(0.25)){const raise=c.valuation*0.15;c.cash+=raise;c.ownership=clamp(c.ownership*(1-raise/(c.valuation+raise)),0.05,1);}
 if(c.valuation>300&&c.markets.length<5&&chance(0.04)){const sub=pick(SUBS);const region=pick(Object.keys(REGIONS));if(!c.markets.some(m=>m.subId===sub.id&&m.region===region)){c.markets.push({subId:sub.id,region,traction:2+rnd()*3});}}
}
function aiMergers(){
 const big=G.companies.filter(c=>c.alive&&!c.isPlayer&&c.valuation>200);
 if(!big.length)return;const acq=pick(big);
 const targets=G.companies.filter(c=>c.alive&&!c.isPlayer&&c.id!==acq.id&&c.valuation<acq.valuation*0.4&&c.valuation>15);
 if(!targets.length)return;const t=pick(targets);const cost=t.valuation*1.3;
 if(acq.cash>=cost||acq.stage==='Public'){acq.cash-=Math.min(acq.cash,cost);mergeInto(acq,t);if(t.valuation>60)addFeed('deal',`${acq.name} acquires ${t.name} for ${money(cost)}.`);}
}
function mergeInto(a,t){
 t.markets.forEach(tm=>{const m=a.markets.find(x=>x.subId===tm.subId&&x.region===tm.region);if(m)m.traction+=tm.traction*0.85;else a.markets.push({subId:tm.subId,region:tm.region,traction:tm.traction*0.85});});
 a.product=clamp(Math.max(a.product,t.product),1,100);a.employees+=t.employees;t.alive=false;t.ownerId=a.id;
}

function yearTick(){
 Object.values(G.chars).forEach(c=>{if(!c.alive)return;c.age++;
  if(c.age>60)c.health-=ri(1,4)+Math.floor((c.age-60)/8);c.health=clamp(c.health,0,100);
  const dc=Math.max(0,(c.age-58)/360)+(c.health<25?0.04:0)+(c.age>85?0.05:0);
  if(chance(dc))charDies(c);
 });
 // births keep dynasty alive
 const dyn=Object.values(G.chars).filter(c=>c.alive&&c.family==='dynasty');
 if(dyn.length<10)dyn.filter(c=>c.age>=24&&c.age<=44).forEach(c=>{if(chance(0.16)){const kid=makeCharacter({app:childAppearance(c),surname:G.dynasty,age:0,role:'Family',family:'dynasty',power:.45});kid.parentId=c.id;G.chars[kid.id]=kid;addFeed('people',`${kid.name.split(' ')[0]} is born into the ${G.dynasty} family.`);}});
 narrativeMaybe();
}
function charDies(c){c.alive=false;c.health=0;
 if(c.id===G.founderId){addFeed('people',`${c.name}, founder of ${playerCo()?playerCo().name:'the company'}, has died at ${c.age}.`);succeed();}
 else addFeed('people',`${c.name} has passed away at ${c.age}.`);
}
function succeed(){
 let heir=G.heirId&&G.chars[G.heirId]&&G.chars[G.heirId].alive?G.chars[G.heirId]:null;
 if(!heir){const cand=Object.values(G.chars).filter(c=>c.alive&&c.family==='dynasty'&&c.id!==G.founderId);cand.sort((a,b)=>b.age-a.age);heir=cand[0];}
 if(!heir){addFeed('world',`With no heir, the ${G.dynasty} family loses control of the company.`);endGame('The line ends');return;}
 heir.role='Chair & CEO';G.founderId=heir.id;G.heirId=null;
 const pc=playerCo();if(pc){pc.ownership=clamp(pc.ownership-0.05,0.05,1);pc.founderId=heir.id;}
 if(heir.age<18)addFeed('world',`${heir.name} inherits as a minor — advisors steer the company.`);
 G.prestige+=3;
 queueModal({title:'A New Generation',body:`<p class="muted"><span class="gold">${heir.name}</span> takes the helm of the ${G.dynasty} business empire.</p>`,choices:[{t:'Carry the torch.',fn(){}}]});
}

/* ---------- events / offers ---------- */
function maybeEvent(){
 if(G.eventQueue.length)return;const pc=playerCo();if(!pc)return;
 // buyout offer
 if(pc.valuation>120&&pc.stage!=='Public'&&chance(0.05)){
  const big=G.companies.filter(c=>c.alive&&!c.isPlayer&&c.valuation>pc.valuation*2);
  if(big.length){const b=pick(big);const offer=pc.valuation*(1.3+rnd()*0.6);
   queueModal({title:'Acquisition Offer',body:`<p class="muted"><span class="gold">${b.name}</span> offers to acquire ${pc.name} for <span class="num gold">${money(offer)}</span>. Your family would walk away with <span class="num gold">${money(offer*pc.ownership)}</span>.</p>`,choices:[
    {t:`Sell ${pc.name} and exit.`,eff:'Big windfall. You found a new venture next.',fn(){acceptBuyout(offer);}},
    {t:'Stay independent.',eff:'Keep building.',fn(){addFeed('deal',`You rebuff ${b.name}'s offer.`);}}
   ]});return;}
 }
 // generic events
 if(!chance(0.1))return;
 const pool=[
  ()=>({title:'Viral Moment',body:'<p class="muted">Your product is having a moment online.</p>',choices:[{t:'Lean in with a marketing blitz (-$3M).',eff:'+brand, +traction',fn(){if(pc.cash>=3){pc.cash-=3;pc.brand=clamp(pc.brand+12,1,100);pc.markets.forEach(m=>m.traction*=1.08);}addFeed('money','Your blitz pays off.');}},{t:'Stay focused on product.',eff:'+product',fn(){pc.product=clamp(pc.product+5,1,100);}}]}),
  ()=>({title:'Key Hire Available',body:'<p class="muted">A star operator is on the market.</p>',choices:[{t:'Hire them (-$2M, +scale).',fn(){if(pc.cash>=2){pc.cash-=2;pc.scale=clamp(pc.scale+10,1,100);pc.employees+=15;addFeed('people','A key hire joins.');}}},{t:'Pass.',fn(){}}]}),
  ()=>({title:'Downturn',body:'<p class="muted">Funding markets are freezing up.</p>',choices:[{t:'Cut burn to extend runway.',fn(){pc.employees=Math.round(pc.employees*0.85);addFeed('world','You trim the team to survive.');}},{t:'Raise now at a discount.',fn(){const r=pc.valuation*0.12;pc.cash+=r;pc.ownership=clamp(pc.ownership*(1-r/(pc.valuation+r)),0.05,1);addFeed('money','You raise a down round.');}}]}),
 ];
 queueModal(pick(pool)());
}
function acceptBuyout(offer){

const A={
 invest(kind){const pc=playerCo();openInvest(kind);},
 doInvest(kind,amt){const pc=playerCo();if(pc.cash<amt){toast('Not enough cash.');return;}pc.cash-=amt;
  if(kind==='product')pc.product=clamp(pc.product+amt*1.4,1,100);
  else if(kind==='brand'){pc.brand=clamp(pc.brand+amt*1.5,1,100);pc.markets.forEach(m=>m.traction*=1.02);}
  else if(kind==='ops'){pc.scale=clamp(pc.scale+amt*1.2,1,100);pc.employees+=Math.round(amt*6);}
  addFeed('money',`Invested ${money(amt)} in ${kind}.`);closeModal();recalcAllFinancials();save();render();},
 raise(){const pc=playerCo();const idx=STAGES.indexOf(pc.stage);if(idx>=STAGES.length-1){toast('Already public.');return;}
  const next=STAGES[idx+1];const amt=clamp(pc.valuation*(0.15+idx*0.01),1.5,99999);const dil=amt/(pc.valuation+amt);
  pc.cash+=amt;pc.ownership=clamp(pc.ownership*(1-dil),0.03,1);pc.stage=next;G.prestige+=1;
  addFeed('money',`Raised ${money(amt)} (${next}). You now own ${pct(pc.ownership)}.`);save();render();},
 ipo(){const pc=playerCo();if(pc.valuation<800){toast('Need ~$800M valuation to IPO.');return;}if(pc.stage==='Public'){toast('Already public.');return;}
  const amt=pc.valuation*0.16;pc.cash+=amt;pc.ownership=clamp(pc.ownership*0.88,0.03,1);pc.stage='Public';G.prestige+=10;
  queueModal({title:'IPO! 🔔',body:`<p class="muted">${pc.name} goes public, raising <span class="num gold">${money(amt)}</span>. The ${G.dynasty} family's stake is worth <span class="num gold">${money(pc.valuation*pc.ownership)}</span>.</p>`,choices:[{t:'Ring the bell.',fn(){}}]});save();render();},
 openAcquire(){openAcquire();},
 acquire(id){const pc=playerCo();const t=G.companies.find(c=>c.id===id);if(!t||!t.alive)return;
  const cost=t.valuation*1.3;const canStock=pc.stage==='Public';
  if(pc.cash<cost&&!canStock){toast('Not enough cash. Go public to pay in stock.');return;}
  if(pc.cash>=cost)pc.cash-=cost;else{const dil=cost/(pc.valuation+cost);pc.ownership=clamp(pc.ownership*(1-dil),0.03,1);}
  mergeInto(pc,t);addFeed('deal',`You acquire ${t.name} for ${money(cost)}.`);G.prestige+=2;closeModal();recalcAllFinancials();save();render();},
 openExpand(){openExpand();},
 launch(subId,region){const pc=playerCo();const sub=SUBBY[subId];const home=SUBBY[pc.markets[0].subId];
  let rel=5; if(sub.ind===home.ind)rel=2; if(pc.markets.some(m=>m.subId===subId))rel=1;
  const cost=(marketSize(subId,region)*0.012+sub.cap*4)*rel;
  if(pc.cash<cost){toast('Not enough cash to launch ('+money(cost)+').');return;}
  if(pc.markets.some(m=>m.subId===subId&&m.region===region)){toast('Already in this market.');return;}
  pc.cash-=cost;pc.markets.push({subId,region,traction:1.5+pc.brand/40});
  addFeed('world',`${pc.name} launches ${sub.name} in ${REGIONS[region]} (${money(cost)}).`);closeModal();recalcAllFinancials();save();render();},
 hire(id){const c=G.talent.find(x=>x.id===id);if(!c)return;const pc=playerCo();const sign=2+overall(c)*0.1;if(pc.cash<sign){toast('Not enough cash.');return;}pc.cash-=sign;c.salary=0.5+overall(c)/30;c.role='Executive';G.chars[c.id]=c;G.talent=G.talent.filter(x=>x.id!==c.id);pc.scale=clamp(pc.scale+overall(c)/12,1,100);addFeed('people',`Hired ${c.name}.`);closeModal();render();},
 designateHeir(id){G.heirId=id;addFeed('people',`${G.chars[id].name} named as your heir.`);render();}
};

let MAPVIEW={x:0,y:0,w:1000,h:460};
function mapZoom(factor,cx,cy){const svg=document.getElementById('worldmap');if(!svg)return;
 cx=cx!=null?cx:MAPVIEW.x+MAPVIEW.w/2;cy=cy!=null?cy:MAPVIEW.y+MAPVIEW.h/2;
 let nw=clamp(MAPVIEW.w*factor,150,1000);let nh=nw*(460/1000);
 MAPVIEW.x=clamp(cx-(cx-MAPVIEW.x)*(nw/MAPVIEW.w),-50,1050-nw);
 MAPVIEW.y=clamp(cy-(cy-MAPVIEW.y)*(nh/MAPVIEW.h),-30,490-nh);
 MAPVIEW.w=nw;MAPVIEW.h=nh;applyMapView();}

 if(MAPVIEW.w<560){lab.innerHTML=CITIES.map(ct=>`<text class="citylabel" x="${ct.x+5*(MAPVIEW.w/1000)}" y="${ct.y+2}" style="font-size:${9*(MAPVIEW.w/1000)}px">${ct.name}</text>`).join('');}

function mountMap(founding){
 MAPVIEW={x:0,y:0,w:1000,h:460};
 const svg=document.getElementById('worldmap');if(!svg)return;applyMapView();
 let dragging=false,moved=false,sx=0,sy=0,vx=0,vy=0;
 function pt(e){return {x:e.touches?e.touches[0].clientX:e.clientX,y:e.touches?e.touches[0].clientY:e.clientY};}
 svg.addEventListener('pointerdown',e=>{dragging=true;moved=false;const p=pt(e);sx=p.x;sy=p.y;vx=MAPVIEW.x;vy=MAPVIEW.y;svg.classList.add('drag');svg.setPointerCapture&&svg.setPointerCapture(e.pointerId);});
 svg.addEventListener('pointermove',e=>{if(!dragging)return;const p=pt(e);const rect=svg.getBoundingClientRect();const sc=MAPVIEW.w/rect.width;const dx=(p.x-sx)*sc,dy=(p.y-sy)*sc;if(Math.abs(p.x-sx)+Math.abs(p.y-sy)>4)moved=true;MAPVIEW.x=clamp(vx-dx,-50,1050-MAPVIEW.w);MAPVIEW.y=clamp(vy-dy,-30,490-MAPVIEW.h);applyMapView();});
 svg.addEventListener('pointerup',e=>{dragging=false;svg.classList.remove('drag');});
 svg.addEventListener('pointerleave',()=>{dragging=false;svg.classList.remove('drag');});
 svg.addEventListener('wheel',e=>{e.preventDefault();const rect=svg.getBoundingClientRect();const cx=MAPVIEW.x+((e.clientX-rect.left)/rect.width)*MAPVIEW.w;const cy=MAPVIEW.y+((e.clientY-rect.top)/rect.height)*MAPVIEW.h;mapZoom(e.deltaY<0?0.85:1.18,cx,cy);},{passive:false});

}

function makePlayer(lg,avg){const ovr=clamp(Math.round((avg||62)+ri(-12,16)),40,99);const age=ri(21,34);const pot=clamp(ovr+(age<25?ri(0,12):ri(-4,4)),40,99);const salary=Math.round((Math.pow(Math.max(0,ovr-50),1.7)*0.02+0.4)*10)/10;return {id:uid(),name:pick(PFIRST)+' '+pick(PLAST),pos:pick(lg.positions),ovr,pot,age,salary,years:ri(1,4)};}
function makeSportsTeam(lg,cityObj,owned){const roster=[];for(let i=0;i<lg.rosterSize;i++)roster.push(makePlayer(lg,owned?59:63));const t={id:uid(),league:lg.key,name:cityObj.c+' '+pick(MASCOTS),city:cityObj.c,market:cityObj.m,roster,coach:ri(50,76),stadium:{name:cityObj.c+' Field',capacity:ri(34,68)*1000,quality:ri(45,82)},ticketPrice:Math.round(45+cityObj.m*45),fanHappiness:ri(45,70),record:{w:0,l:0},gamesPlayed:0,seasons:0,titles:0,playoffs:0,strategy:'balanced',owned:!!owned,value:0};t.value=teamValue(t,lg);return t;}
function teamStrength(t){const lg=leagueByKey(t.league);const s=t.roster.slice().sort((a,b)=>b.ovr-a.ovr).slice(0,Math.ceil(lg.rosterSize*0.6));const avg=s.reduce((a,p)=>a+p.ovr,0)/Math.max(1,s.length);return clamp(avg*0.8+t.coach*0.15+t.stadium.quality*0.05,30,99);}
function teamValue(t,lg){lg=lg||leagueByKey(t.league);const tot=t.record.w+t.record.l;const perf=tot>0?t.record.w/tot:0.5;const winLeg=1+t.titles*0.05+(perf-0.5)*0.2;return Math.max(50,lg.baseVal*t.market*(0.6+t.stadium.quality/100)*(0.8+t.stadium.capacity/130000)*winLeg*(G.sportsMacro||1));}
function payroll(t){return t.roster.reduce((a,p)=>a+p.salary,0);}
function teamMonthly(t){const lg=leagueByKey(t.league);const media=lg.baseVal*t.market*lg.mediaMul*0.0009;const sponsor=t.stadium.quality/100*t.market*1.1;const up=t.stadium.capacity/1000*0.02+t.coach*0.01;return media+sponsor-payroll(t)/12-up;}
function simGame(t){const lg=leagueByKey(t.league);const str=teamStrength(t);const opp=clamp(ri(46,82)+(t.strategy==='winnow'?3:t.strategy==='rebuild'?-3:0),30,96);const home=chance(0.5);const p=1/(1+Math.pow(10,(opp-str)/14))+(home?0.04:0);const win=chance(clamp(p,0.02,0.98));if(win)t.record.w++;else t.record.l++;t.gamesPlayed++;if(home){const att=clamp(0.45+t.fanHappiness/200+(win?0.05:0)-(t.ticketPrice/420),0.3,1);const rev=t.stadium.capacity*att*t.ticketPrice/1e6;G.personalCash+=rev*0.35;}t.fanHappiness=clamp(t.fanHappiness+(win?1.1:-0.9),5,100);}
function endSeason(t){const lg=leagueByKey(t.league);const tot=t.record.w+t.record.l;const wr=tot>0?t.record.w/tot:0;t.seasons++;let champ=false;if(wr>0.55){t.playoffs++;const str=teamStrength(t);let alive=true;for(let r=0;r<3&&alive;r++){const opp=ri(62,90);if(!chance(clamp(1/(1+Math.pow(10,(opp-str)/14)),0.05,0.95)))alive=false;}if(alive){champ=true;t.titles++;t.fanHappiness=clamp(t.fanHappiness+15,5,100);G.prestige+=8;addFeed('world',`🏆 The ${t.name} win the ${lg.name} championship!`);}else addFeed('world',`The ${t.name} reach the ${lg.name} playoffs (${t.record.w}-${t.record.l}).`);}else addFeed('world',`The ${t.name} finish ${t.record.w}-${t.record.l} and miss the playoffs.`);t.lastRecord=t.record.w+'-'+t.record.l;t.roster.forEach(p=>{p.years--;if(p.age<27)p.ovr=clamp(p.ovr+ri(0,2),40,99);else if(p.age>30)p.ovr=clamp(p.ovr-ri(0,3),40,99);p.age++;});t.roster=t.roster.filter(p=>p.years>0||chance(0.4));const dq=clamp(70-(wr-0.5)*40,55,80);while(t.roster.length<lg.rosterSize)t.roster.push(makePlayer(lg,dq));t.record={w:0,l:0};t.gamesPlayed=0;t.value=teamValue(t);}
function tickTeams(){(G.teams||[]).forEach(t=>{const lg=leagueByKey(t.league);G.personalCash+=teamMonthly(t);const gpm=Math.max(1,Math.round(lg.games/8));for(let i=0;i<gpm&&t.gamesPlayed<lg.games;i++)simGame(t);if(t.gamesPlayed>=lg.games)endSeason(t);t.value=teamValue(t);});}
const T={
 buy(id){const m=(G._teamMarket||[]).find(x=>x.id===id);if(!m)return;const price=m.value*1.1;if(G.personalCash<price){toast('Not enough personal cash for this franchise.');return;}G.personalCash-=price;m.owned=true;G.teams.push(m);G._teamMarket=G._teamMarket.filter(x=>x.id!==id);SELTEAM=G.teams.length-1;addFeed('world',`You bought the ${m.name} for ${money(price)}!`);G.prestige+=4;closeModal();save();render();},
 select(i){SELTEAM=i;render();},
 ticket(id,v){const t=teamById(id);if(t){t.ticketPrice=clamp(+v||40,20,500);render();}},
 strategy(id,s){const t=teamById(id);if(t){t.strategy=s;render();}},
 upgrade(id){const t=teamById(id);if(!t)return;const cost=t.stadium.capacity/1000*1.2+30;if(G.personalCash<cost){toast('Not enough cash ('+money(cost)+').');return;}G.personalCash-=cost;t.stadium.capacity=Math.min(105000,t.stadium.capacity+5000);t.stadium.quality=clamp(t.stadium.quality+6,1,100);addFeed('money',`Renovated ${t.stadium.name} (+5k seats) for ${money(cost)}.`);save();render();},
 build(id){const t=teamById(id);if(!t)return;const cost=t.market*450+200;if(G.personalCash<cost){toast('A new stadium costs '+money(cost)+'.');return;}G.personalCash-=cost;t.stadium={name:t.city+' Grand Arena',capacity:Math.round(60000+t.market*14000),quality:clamp(82+ri(0,12),1,100)};t.fanHappiness=clamp(t.fanHappiness+10,5,100);addFeed('world',`Opened a brand-new stadium for the ${t.name}!`);save();render();},
 coach(id){const t=teamById(id);if(!t)return;const cost=12;if(G.personalCash<cost){toast('Hiring a top coach costs '+money(cost)+'.');return;}G.personalCash-=cost;t.coach=clamp(t.coach+ri(4,9),1,99);addFeed('people',`Hired a new head coach for the ${t.name}.`);save();render();},
 release(id,pid){const t=teamById(id);if(!t)return;t.roster=t.roster.filter(p=>p.id!==pid);render();},
 signFA(id){openSignFA(id);},

 relocate(id){openRelocate(id);},

function recomputeMacros(){const im={tech:1,health:1,fin:1,cons:1,media:1,energy:1,logi:1};let sm=1;const am={};(G.narr||[]).forEach(a=>{if(a.ind&&a.mult)im[a.ind]*=a.mult;if(a.extra)for(const k in a.extra)im[k]*=a.extra[k];if(a.allmacro)for(const k in im)im[k]*=a.allmacro;if(a.sports)sm*=a.sports;if(a.asset)am[a.asset]=(am[a.asset]||1)*(a.amult||1);if(a.asset2)am[a.asset2]=(am[a.asset2]||1)*(a.amult||1);});G.industryMacro=im;G.sportsMacro=sm;G.assetMacro=am;}

  </div>
  <div class="col"><div class="card"><h3>Roster <span class="sub">${t.roster.length} players</span></h3>
   <div class="scrollx"><table><tr><th>Pos</th><th>Player</th><th>Age</th><th>OVR</th><th>POT</th><th>Salary</th><th>Yrs</th><th></th></tr>
   ${roster.map(p=>`<tr><td class="num">${p.pos}</td><td>${p.name}</td><td class="num">${p.age}</td><td class="num gold">${p.ovr}</td><td class="num dim">${p.pot}</td><td class="num">${money(p.salary)}</td><td class="num">${p.years}</td><td><button class="btn sm ghost" onclick="T.release('${t.id}','${p.id}')">✕</button></td></tr>`).join('')}
   </table></div></div></div>
 </div></div>`;
}
function openTeamMarket(){
 if(!G._teamMarket||!G._teamMarket.length){G._teamMarket=[];for(let i=0;i<6;i++){const lg=pick(LEAGUES);const city=pick(SPORT_CITIES);G._teamMarket.push(makeSportsTeam(lg,city,true));}}
 openModal(`<h2>Franchises for Sale</h2><div class="muted" style="font-size:13px;margin-bottom:6px">Your personal cash: <span class="num gold">${money(G.personalCash)}</span></div>
  ${G._teamMarket.map(t=>{const lg=leagueByKey(t.league);const price=t.value*1.1;return `<div class="colist"><div style="flex:1"><div class="gold" style="font-size:14px">${t.name}</div><div class="dim" style="font-size:11px">${lg.name} · ${t.city} · ${(t.stadium.capacity/1000).toFixed(0)}k seats · rating ${Math.round(teamStrength(t))}</div></div><button class="btn sm ${G.personalCash>=price?'primary':''}" onclick="T.buy('${t.id}')">${money(price)}</button></div>`;}).join('')}
  <div style="margin-top:14px"><button class="btn ghost" onclick="closeModal()">Close</button></div>`,true);
}
function openSignFA(id){const t=teamById(id);const lg=leagueByKey(t.league);G._fa=[];for(let i=0;i<6;i++)G._fa.push(makePlayer(lg,ri(58,82)));
 openModal(`<h2>Free Agents</h2><div class="muted" style="font-size:13px;margin-bottom:6px">Sign a player to the ${t.name}. Signing bonus ≈ salary × 1.2.</div>
  ${G._fa.map((p,i)=>`<div class="colist"><div style="flex:1"><div style="font-size:14px">${p.name} <span class="dim">${p.pos}</span></div><div class="dim" style="font-size:11px">age ${p.age} · ${p.ovr} OVR · ${money(p.salary)}/yr · ${p.years}yr</div></div><button class="btn sm ${G.personalCash>=p.salary*1.2?'primary':''}" onclick="T.doSign('${id}',${i})">Sign ${money(p.salary*1.2)}</button></div>`).join('')}
  <div style="margin-top:14px"><button class="btn ghost" onclick="closeModal()">Close</button></div>`,true);
}
function openRelocate(id){openModal(`<h2>Relocate Franchise</h2><div class="muted" style="font-size:13px;margin-bottom:6px">Moving costs ${money(120)} and angers current fans, but a bigger market means more revenue and value.</div>
  ${SPORT_CITIES.map((c,i)=>`<div class="colist"><div style="flex:1"><div style="font-size:14px">${c.c}</div><div class="dim" style="font-size:11px">market index ${c.m.toFixed(1)}</div></div><button class="btn sm primary" onclick="T.doRelocate('${id}',${i})">Move here</button></div>`).join('')}
  <div style="margin-top:14px"><button class="btn ghost" onclick="closeModal()">Close</button></div>`,true);
}
window.refreshAssetMarket=refreshAssetMarket;


window.onload=function(){render();};
</script>
</body>
</html>
