/* ===================== 20_board.js ===================== */
/* ============================================================
   THE BOARD — outside investors who take equity, demand things,
   and can ultimately remove you. Relationship meters, mandates,
   and negotiated fundraising rounds.
   ============================================================ */

const BOARD_TYPES={
  angel:    {label:'Angel',          icon:'😇', desc:'Patient, believes in the founder. Wants product and vision.', wants:['product','vision'], patience:1.5},
  vc:       {label:'Venture Capital',icon:'🚀', desc:'Wants explosive growth — revenue and expansion above all.',   wants:['growth','expand'],  patience:1.0},
  growth:   {label:'Growth Fund',    icon:'📈', desc:'Wants scale with a credible path to profit.',                 wants:['growth','profit'],  patience:0.95},
  strategic:{label:'Strategic',      icon:'🤝', desc:'A corporate partner. Wants market presence and product.',     wants:['expand','product'], patience:1.2},
  pe:       {label:'Private Equity', icon:'💼', desc:'Wants margins, discipline, and cash returned.',                wants:['profit','dividend'],patience:0.7},
  activist: {label:'Activist',       icon:'🦈', desc:'Loud and impatient. Demands buybacks and cost cuts.',          wants:['profit','dividend'],patience:0.55},
};
const VC_FIRMS=['Sequoia Lane','Benchmark Hill','Andreessen Park','Founders Reserve','Greylock Manor','Accel Point','Kleiner Court','Lightspeed Capital','Bessemer Trust','Index Partners','Thrive Holdings','Tiger Crossing','Insight Vantage','General Atlas','Coatue Bridge','Khosla Works','First Round House','Union Square Co.','NEA Group','Battery Cove'];
const PE_FIRMS=['Blackrock Stone','Carlyle Group','KKR Partners','Apollo Reserve','Bain Capital Co.','TPG Holdings','Silver Lake','Vista Equity','Warburg House','Advent International','Thoma Cressey','Leonard Green'];
const INV_FIRST=['Marcus','Diane','Sundar','Priya','Aviv','Helena','Ken','Rashida','Lars','Mei','Victor','Yusuf','Clara','Dmitri','Soraya','Grant','Naomi','Theo'];
const INV_LAST=['Whitman','Doerr','Khan','Lindqvist','Okafor','Castellane','Romero','Frank','Hale','Bergman','Vance','Marlowe','Cho','Petrov','Drummond','Saito','Adeyemi'];

function makeBoardMember(o){
  o=o||{};
  const type=o.type||pick(['angel','vc','growth']);
  const firms=(type==='pe'||type==='activist')?PE_FIRMS:VC_FIRMS;
  const firm=o.firm||pick(firms);
  const person=o.person||(pick(INV_FIRST)+' '+pick(INV_LAST));
  return {
    id:uid('b'),firm,person,type,
    stake:o.stake||0,                 // shares held
    rel:clamp(o.rel!=null?o.rel:60,0,100),
    mandate:o.mandate||null,
    mandateCooldown:G.month+ri(4,10),
    veto:!!o.veto,
    lastReassure:-99,joined:G.month,
  };
}

/* ---------- control & sentiment ---------- */
function investorControl(){const co=pc();return co.shares>0?(co.investorShares||0)/co.shares:0;}
function familyControl(){const co=pc();return co.shares>0?(co.famShares||0)/co.shares:1;}
function publicFloat(){const co=pc();return co.shares>0?(co.publicShares||0)/co.shares:0;}
function boardSentiment(){
  const b=G.board||[];if(!b.length)return 100;
  let ws=0,wt=0;b.forEach(m=>{const w=Math.max(1,m.stake);ws+=m.rel*w;wt+=w;});
  return wt?Math.round(ws/wt):60;
}
function relWord(r){return r<20?'Hostile':r<40?'Wary':r<60?'Neutral':r<80?'Supportive':'Champion';}
function relTone(r){return r<25?'bad':r<50?'warn':r<75?'':'good';}

/* ---------- mandates ---------- */
function curAnnualRev(){return (G.fin.revenue||0)*12;}
function assignMandate(m){
  const co=pc();const t=BOARD_TYPES[m.type];
  const wants=t.wants;const pool=[];
  const rev=curAnnualRev();
  if(wants.includes('growth')||wants.includes('expand')){
    pool.push({kind:'revenue',target:round1(Math.max(rev*1.6,rev+rf(3,20))),months:ri(12,28)});
    if(playerRegions().length<6)pool.push({kind:'expand',target:playerRegions().length+1,months:ri(12,26)});
    pool.push({kind:'hire',target:totalEmployees()+ri(15,70),months:ri(10,20)});
  }
  if(wants.includes('profit')||wants.includes('dividend')){
    pool.push({kind:'profit',target:1,months:ri(8,18)});
    pool.push({kind:'valuation',target:round1((co.valuation||10)*rf(1.8,2.6)),months:ri(18,34)});
  }
  if(wants.includes('product')||wants.includes('vision')){
    pool.push({kind:'launch',target:allProducts().length+1,months:ri(10,20)});
    pool.push({kind:'valuation',target:round1((co.valuation||10)*rf(1.6,2.2)),months:ri(16,30)});
  }
  if((co.roundsDone||[]).length>=3&&!co.public&&chance(0.4))pool.push({kind:'ipo',target:1,months:ri(14,34)});
  if(!pool.length)pool.push({kind:'revenue',target:round1(rev+rf(5,15)),months:ri(12,24)});
  const pickM=pick(pool);
  m.mandate={kind:pickM.kind,target:pickM.target,deadline:G.month+pickM.months,start:G.month,startRev:rev};
  pushFeed('board',`${m.firm} sets a mandate: ${mandateDesc(m.mandate)} by ${dateLabel(m.mandate.deadline)}.`,'neutral');
}
function mandateDesc(md){
  switch(md.kind){
    case 'revenue':return `reach $${money(md.target)}M annual revenue`;
    case 'profit':return `turn a monthly profit`;
    case 'hire':return `grow to ${units(md.target)} employees`;
    case 'expand':return `operate in ${md.target} regions`;
    case 'launch':return `ship ${md.target} products`;
    case 'valuation':return `reach a $${money(md.target)}M valuation`;
    case 'ipo':return `take the company public`;
  }
  return 'meet expectations';
}
function mandateCur(md){
  switch(md.kind){
    case 'revenue':return curAnnualRev();
    case 'profit':return (G.fin.net||0)>0?1:0;
    case 'hire':return totalEmployees();
    case 'expand':return playerRegions().length;
    case 'launch':return allProducts().length;
    case 'valuation':return pc().valuation||0;
    case 'ipo':return pc().public?1:0;
  }
  return 0;
}
function mandateMet(md){return mandateCur(md)>=md.target;}

/* ---------- monthly board tick ---------- */
function tickBoard(){
  const co=pc();const b=G.board||[];
  if(!b.length){co.boardHeat=0;co.boardSentiment=100;return;}
  // performance signals this month
  const profitable=(G.fin.net||0)>0;
  const hist=G.history||[];
  const ago=hist.length>12?hist[hist.length-13]:null;
  const revGrew=ago?curAnnualRev()>ago.rev:false;
  const valGrew=ago?(co.valuation||0)>ago.val:true;
  const burningHard=(G.fin.net||0)<-(curAnnualRev()*0.5+0.3);

  b.forEach(m=>{
    const t=BOARD_TYPES[m.type];
    // relationship drift by what this investor cares about
    let d=0;
    if(t.wants.includes('growth')||t.wants.includes('expand')){d+=revGrew?0.5:-0.45;d+=valGrew?0.25:-0.2;}
    if(t.wants.includes('profit')){d+=profitable?0.5:-0.4;}
    if(t.wants.includes('dividend')){d+=profitable?0.2:-0.15;}
    if(t.wants.includes('product')||t.wants.includes('vision')){d+=valGrew?0.35:-0.15;}
    if(burningHard)d-=0.4/(t.patience||1);
    d*=1.0;
    m.rel=clamp(m.rel+d,0,100);

    // mandate lifecycle
    if(m.mandate){
      if(mandateMet(m.mandate)){
        m.rel=clamp(m.rel+ri(8,15),0,100);
        pushFeed('board',`${m.firm} is delighted — you delivered: ${mandateDesc(m.mandate)}.`,'good');
        toast('👍 Mandate met',`${m.firm} raises its view of you.`);
        m.mandate=null;m.mandateCooldown=G.month+ri(8,16);
      }else if(G.month>=m.mandate.deadline){
        m.rel=clamp(m.rel-ri(10,18),0,100);
        pushFeed('board',`${m.firm} is frustrated — you missed the mandate to ${mandateDesc(m.mandate)}.`,'bad');
        toast('👎 Mandate missed',`${m.firm} is losing patience.`);
        m.mandate=null;m.mandateCooldown=G.month+ri(4,9);
      }
    }else if(G.month>=(m.mandateCooldown||0)&&chance(0.07)){
      assignMandate(m);
    }
  });

  // ouster pressure: only possible once investors hold the majority
  co.boardSentiment=boardSentiment();
  if(investorControl()>0.5&&co.boardSentiment<30){
    co.boardHeat=(co.boardHeat||0)+1;
    if(co.boardHeat===1)pushFeed('board',`The board has lost confidence in your leadership. Shape up, or they will move to replace you.`,'bad');
    else if(co.boardHeat>=4){
      G.gameOver=true;
      G.gameOverReason=`The board voted to remove you as CEO. Having sold majority control, the family no longer commands the company it founded.`;
    }else pushFeed('board',`The board is preparing a vote on your future. ${4-co.boardHeat} months to win them back.`,'bad');
  }else{
    co.boardHeat=Math.max(0,(co.boardHeat||0)-1);
  }
}

/* ---------- reassure ---------- */
function reassureBoard(id){
  const m=(G.board||[]).find(x=>x.id===id);if(!m)return;
  if(G.month-m.lastReassure<3){toast('Too soon',`${m.firm} won't take another meeting yet.`);return;}
  const ce=ceo();const cha=ce?(ce.stats.charisma||10):10;
  const gain=clamp(3+Math.round((cha-10)*0.5),2,9);
  m.rel=clamp(m.rel+gain,0,100);m.lastReassure=G.month;
  pushFeed('board',`You meet with ${m.person} of ${m.firm} to smooth things over (+${gain} rapport).`,'neutral');
  toast('🤝 Relationship managed',`${m.firm}: ${relWord(m.rel)}.`);
  render();
}

/* ---------- negotiated fundraising ---------- */
function genRaiseOffers(r){
  const co=pc();const val=Math.max(co.valuation||companyValuation(),r.valReq*0.6,1.2);
  const offers=[];
  const mk=(profile)=>{
    const eq=clamp(r.dil*profile.dilMult,0.05,0.45);
    const amount=round1(clamp(val*eq,r.min,r.max)*profile.amtMult);
    const preMoney=round1(amount*(1-eq)/eq);
    const type=pick(profile.types);
    const firms=(type==='pe'||type==='activist')?PE_FIRMS:VC_FIRMS;
    return {
      profile:profile.key,label:profile.label,
      firm:pick(firms),person:pick(INV_FIRST)+' '+pick(INV_LAST),type,
      amount,eq,preMoney,boardSeat:profile.boardSeat,veto:profile.veto,
      relStart:ri(profile.rel[0],profile.rel[1]),
      demands:profile.demands,
    };
  };
  offers.push(mk({key:'friendly',label:'Founder-Friendly',types:['angel','vc'],dilMult:0.65,amtMult:0.7,boardSeat:false,veto:false,rel:[64,74],demands:['No board seat','Keeps you in full control','Smaller cheque']}));
  offers.push(mk({key:'standard',label:'Standard Term Sheet',types:['vc','growth','strategic'],dilMult:1.0,amtMult:1.0,boardSeat:true,veto:false,rel:[56,66],demands:['One board seat','Will set growth mandates','Market-rate dilution']}));
  offers.push(mk({key:'aggressive',label:'Growth at All Costs',types:['growth','pe'],dilMult:1.4,amtMult:1.35,boardSeat:true,veto:true,rel:[46,56],demands:['Board seat + veto rights','Aggressive mandates','Largest cheque, most dilution']}));
  // dedupe firms
  const seen={};offers.forEach(o=>{while(seen[o.firm]){o.firm=pick(o.type==='pe'?PE_FIRMS:VC_FIRMS);}seen[o.firm]=1;});
  return offers;
}
function openRaiseModal(roundKey){
  const r=FUNDING_ROUNDS.find(x=>x.key===roundKey)||nextFundingRound();
  if(!r){toast('No round available','All private rounds are done.');return;}
  const co=pc();
  if(co.public){toast('Already public','Use the markets instead.');return;}
  if((co.valuation||companyValuation())<r.valReq){toast('Valuation too low',`Investors want ~$${money(r.valReq)}M before a ${r.name}.`);return;}
  const offers=genRaiseOffers(r);
  UI._raiseOffers=offers;UI._raiseRound=r.key;
  const cards=offers.map((o,i)=>{
    const bt=BOARD_TYPES[o.type];
    return `<div class="offer">
      <div class="offer-h"><span class="offer-tag tag-${o.profile}">${esc(o.label)}</span><span class="offer-firm">${bt.icon} ${esc(o.firm)}</span></div>
      <div class="offer-amt">+$${money(o.amount)}M</div>
      <div class="offer-meta">
        <span>For <b>${pct(o.eq)}</b> equity</span>
        <span>Pre-money <b>$${money(o.preMoney)}M</b></span>
        <span>Lead: <b>${bt.label}</b></span>
      </div>
      <ul class="offer-demands">${o.demands.map(d=>`<li>${esc(d)}</li>`).join('')}</ul>
      ${btn('Accept this offer','doraiseoffer',{idx:i},'primary block sm')}
    </div>`;
  }).join('');
  openModal(`<div class="modal raise-modal">
    <div class="modal-hd"><div><div class="mh-title">Raising ${esc(r.name)}</div><div class="mh-sub">Pick your investor. Bigger cheques cost more equity — and bring louder demands.</div></div>${btn('×','closemodal',{},'icon')}</div>
    <div class="offers">${cards}</div>
    <div class="btnrow" style="margin-top:12px;justify-content:center">${btn('Walk away — keep bootstrapping','declineraise',{},'ghost')}</div>
  </div>`);
}
function applyRaiseOffer(idx){
  const offers=UI._raiseOffers||[];const o=offers[idx];const r=FUNDING_ROUNDS.find(x=>x.key===UI._raiseRound);
  if(!o||!r)return;
  const co=pc();
  const newShares=Math.round(co.shares*(o.eq/(1-o.eq)));
  co.shares+=newShares;co.cash=round1(co.cash+o.amount);
  co.investorShares=(co.investorShares||0)+newShares;
  co.roundsDone=co.roundsDone||[];if(!co.roundsDone.includes(r.key))co.roundsDone.push(r.key);
  co.stage=r.name;
  if(o.boardSeat){
    const m=makeBoardMember({type:o.type,firm:o.firm,person:o.person,stake:newShares,rel:o.relStart,veto:o.veto});
    G.board=G.board||[];G.board.push(m);
    pushFeed('board',`${o.firm} joins your board (${pct(o.eq)} stake). ${BOARD_TYPES[o.type].desc}`,'neutral');
  }
  pushFeed('money',`Closed ${r.name}: +$${money(o.amount)}M from ${o.firm} at a $${money(o.preMoney)}M pre-money valuation.`,'good');
  toast(`💰 ${r.name} closed`,`${o.firm} wired $${money(o.amount)}M.`);
  closeModal();recompute();updateRivalValuations();checkAchievements();render();
}

{id:'board_expand',cat:'finance',w:2,cond:c=>(G.board||[]).some(m=>BOARD_TYPES[m.type].wants.includes('expand'))&&playerRegions().length<6,make:c=>{

/* ---------- default state ---------- */
function defaultOps(){
  const caps={};OPS_CAPS.forEach(c=>caps[c.key]=0);
  return {caps,perm:{},initiatives:[],done:{},inventory:0,metrics:{},supplierTier:1,suppliers:[]};
}
function ensureOps(){if(!G.ops)G.ops=defaultOps();if(!G.ops.caps)G.ops.caps={};OPS_CAPS.forEach(c=>{if(G.ops.caps[c.key]==null)G.ops.caps[c.key]=0;});if(!G.ops.perm)G.ops.perm={};if(!G.ops.initiatives)G.ops.initiatives=[];if(!G.ops.done)G.ops.done={};if(!G.ops.metrics)G.ops.metrics={};if(!G.ops.suppliers)G.ops.suppliers=[];return G.ops;}

/* ---------- aggregate bonus ---------- */
function opsBonus(){
  const b={cost:0,cap:0,qcap:0,defect:0,shock:0,sga:0,eff:0,morale:0,productivity:0,ontime:0,condition:0};
  if(!G.ops)return b;
  OPS_CAPS.forEach(c=>{const lv=G.ops.caps[c.key]||0;if(lv){const e=c.eff(lv);for(const k in e)b[k]=(b[k]||0)+e[k];}});
  const perm=G.ops.perm||{};for(const k in perm)b[k]=(b[k]||0)+perm[k];
  const af=G.ops.annualFocus;
  if(af&&G.month<af.until){
    if(af.key==='growth')b.cap+=0.05;
    else if(af.key==='efficiency')b.cost-=0.02;
    else if(af.key==='quality'){b.qcap+=3;b.defect-=0.012;}
  }
  return b;
}

/* ---------- facility-derived production capacity for a division ---------- */
function divFacilityCapacity(d){
  let prod=0,logi=0,inv=0;
  (d.facilities||[]).forEach(f=>{
    const role=facType(f).role;
    const cond=(f.condition!=null?f.condition:90)/100;
    const auto=1+(f.automation||0)/220;
    const c=(f.capacity||0)*cond*auto;
    if(role==='production')prod+=c;
    else if(role==='logistics')logi+=c;
    else if(role==='inventory')inv+=c;
  });
  return {prod,logi,inv,total:prod+logi*0.45+inv*0.3};
}
function divRndFacilityBoost(d){
  let pts=0;(d.facilities||[]).forEach(f=>{if(facType(f).role==='rnd')pts+=(f.capacity||0)*((f.condition!=null?f.condition:90)/100)/120;});return pts;
}
function avgFacilityCondition(){
  let s=0,n=0;G.divisions.forEach(d=>(d.facilities||[]).forEach(f=>{s+=(f.condition!=null?f.condition:90);n++;}));
  return n?s/n:100;
}
function avgFacilityAutomation(){
  let s=0,n=0;G.divisions.forEach(d=>(d.facilities||[]).forEach(f=>{s+=(f.automation||0);n++;}));
  return n?s/n:0;
}

/* ---------- live operations metrics (for the dashboard) ---------- */
function recomputeOpsMetrics(){
  ensureOps();const ob=opsBonus();
  let demand=0,cap=0;
  allProducts().forEach(p=>{
    const c=productCapacity(p);cap+=c;
    const u=(p.perf&&p.perf.units)||0;demand+=u;
  });
  const util=cap>0?clamp(demand/cap,0,1.3):0;
  const cond=avgFacilityCondition()/100;
  const auto=avgFacilityAutomation()/100;
  const defect=clamp(0.05 + (ob.defect||0) - (G.ops.caps.quality*0.002),0.002,0.2);
  const ontime=clamp(0.8 + (ob.ontime||0) + (cond-0.9)*0.4 + (typeof freightOnTime==='function'?freightOnTime():0),0.4,0.999);
  const perf=clamp(0.55 + auto*0.25 + (ob.eff||0)/200 + (ob.productivity||0),0.3,1.1);
  const oee=clamp(cond*perf*(1-defect),0,1);
  const cpu=clamp(1 + (ob.cost||0),0.4,1.3); // <1 = cheaper than baseline
  G.ops.metrics={util,oee,defect,ontime,cpu,cond,auto,demand,cap};
  return G.ops.metrics;
}

/* ---------- ACTIONS ---------- */
function opsCapCost(key){const c=OPS_CAPBY[key];const lv=(G.ops.caps[key]||0);return c?c.cost(lv+1):0;}

function buildFacilityTyped(divId,region,typeKey){
  ensureOps();const co=pc();const d=divById(divId);if(!d)return;
  const ft=FAC_TYPEBY[typeKey]||FAC_TYPEBY.factory;
  const sec=SECTORBY[d.sectorKey];
  const regionCost=(REGIONS[region]&&REGIONS[region].cost)||1;
  const cost=round1((sec.capital*6*ft.capex+4)*(0.8+regionCost*0.25));
  if(co.cash<cost){toast('Insufficient cash',`A ${ft.name} costs $${money(cost)}M.`);return;}

  const capacity=ri(ft.capBase[0],ft.capBase[1])*(sec.capital>0.6?0.7:sec.capital>0.35?1:1.4);
  const f=makeFacility({sectorKey:d.sectorKey,region,type:typeKey,value:cost,capacity:Math.round(capacity),quality:ri(46,62)});
  f.condition=100;f.automation=0;
  d.facilities.push(f);
  pushFeed('ops',`Opened a ${ft.name} in ${regionFull(region)} (−$${money(cost)}M).`,'neutral');
  toast(`${ft.icon} ${ft.name} online`,`${regionFull(region)} · capacity ${units(f.capacity)}`);

}
function maintainFacility(divId,fid){
  const co=pc();const d=divById(divId);if(!d)return;const f=(d.facilities||[]).find(x=>x.id===fid);if(!f)return;
  const cost=round1((f.value||5)*0.08+0.4);

}
function automateFacility(divId,fid){
  const co=pc();const d=divById(divId);if(!d)return;const f=(d.facilities||[]).find(x=>x.id===fid);if(!f)return;
  if((f.automation||0)>=100){toast('Fully automated','');return;}

  if(co.cash<cost){toast('Insufficient cash','');return;}

  d.morale=clamp((d.morale||60)-1.5,0,100);
  pushFeed('ops',`Automated the ${facType(f).name} in ${regionFull(f.region)} to ${f.automation}% (−$${money(cost)}M).`,'neutral');

}
function decommissionFacility(divId,fid){

function launchInitiative(key){
  ensureOps();const it=OPS_INITBY[key];if(!it)return;

  if(G.ops.initiatives.some(x=>x.key===key)){toast('Already underway','');return;}

  if(co.cash<cost){toast('Insufficient cash',`${it.name} needs $${money(cost)}M upfront.`);return;}

function completeInitiative(it){

  for(const k in perm)G.ops.perm[k]=(G.ops.perm[k]||0)+perm[k];

  if(it.rep)pc().reputation=clamp((pc().reputation||50)+it.rep,0,100);

/* ---------- monthly operations tick ---------- */
function tickOps(){
  ensureOps();const ob=opsBonus();const co=pc();
  // facility condition decay, offset by maintenance capability
  G.divisions.forEach(d=>{
    (d.facilities||[]).forEach(f=>{
      const decay=rf(0.25,0.7);const upkeep=(G.ops.caps.maintenance||0)*0.35+(ob.condition||0)*0.15;
      f.condition=clamp((f.condition!=null?f.condition:95)-decay+upkeep,15,100);
    });
    // lean + training nudge efficiency & morale toward capability-driven targets
    const effTarget=clamp(40+(ob.eff||0),20,100);
    if(Math.abs(effTarget-d.efficiency)>0.2)d.efficiency=clamp(d.efficiency+Math.sign(effTarget-d.efficiency)*Math.min(0.7,Math.abs(effTarget-d.efficiency)*0.15),20,100);
    if(ob.morale)d.morale=clamp((d.morale||60)+ob.morale*0.04,0,100);
  });
  // product quality & brand drift — gated by your investment (no free growth)
  const tb=G.techBonus||{},md=G._mods||{};
  const qcapBonus=(tb.qcap||0)+(md.qcap||0)+(ob.qcap||0)+(typeof supplierQualBonus==='function'?supplierQualBonus():0);
  const defectRate=clamp(0.05+(ob.defect||0)-(G.ops.caps.quality*0.002),0,0.2);
  allProducts().forEach(p=>{
    const rnd=p.rndInvest||0;
    if(rnd>0){
      const qCeil=clamp(30+rnd*7.5+qcapBonus,1,99);
      if(p.quality<qCeil)p.quality=clamp(p.quality+Math.min(0.8,(qCeil-p.quality)*0.06),1,99);
    }else{
      p.quality=clamp(p.quality-0.08,1,99); // products age if you stop investing
    }
    // defect escapes occasionally nick quality unless quality systems are strong
    if(defectRate>0.04&&chance(defectRate*0.6))p.quality=clamp(p.quality-defectRate*5,1,99);
    const mkt=p.mktInvest||0;
    if(mkt>0){
      const bCeil=clamp(8+mkt*9+(tb.brand?tb.brand*60:0),1,99);
      if(p.brand<bCeil)p.brand=clamp(p.brand+Math.min(0.7,(bCeil-p.brand)*0.05),1,99);
      else p.brand=clamp(p.brand-0.25*(1+(tb.branddecay||0)),1,99);
    }else{
      p.brand=clamp(p.brand-0.2*(1+(tb.branddecay||0)),1,99);
    }
  });
  // upkeep for capabilities and active initiatives
  let upkeep=0;OPS_CAPS.forEach(c=>{const lv=G.ops.caps[c.key]||0;if(lv&&c.upkeep)upkeep+=c.upkeep(lv);});
  G.ops.initiatives.forEach(it=>{upkeep+=it.monthlyCost||0;});
  if(upkeep>0)co.cash=round1(co.cash-upkeep);
  G.ops._upkeep=round1(upkeep);
  // initiative progress
  for(let i=G.ops.initiatives.length-1;i>=0;i--){
    const it=G.ops.initiatives[i];it.monthsLeft--;
    if(it.monthsLeft<=0){completeInitiative(it);G.ops.initiatives.splice(i,1);}
  }
  if(typeof tickSuppliers==='function')tickSuppliers();
  if(typeof tickWorkforce==='function')tickWorkforce();
  recomputeOpsMetrics();
}

function opsKpi(label,val,tone,sub){return tile(label,val,tone,sub);}
function capPips(lv,max){let s='';for(let i=0;i<max;i++)s+=`<span class="pip ${i<lv?'on':''}"></span>`;return `<span class="pips">${s}</span>`;}
function effSummary(c,lv){
  const e=c.eff(lv||1);const parts=[];
  const lbls={cost:'unit cost',cap:'capacity',qcap:'quality ceiling',defect:'defects',shock:'shock resist',sga:'overhead',eff:'efficiency',morale:'morale',productivity:'output/head',ontime:'on-time',condition:'upkeep'};
  for(const k in e){const v=e[k];if(!v)continue;
    let txt;
    if(k==='cost'||k==='sga'||k==='defect')txt=`${v<0?'−':'+'}${Math.abs(Math.round(v*1000)/10)}% ${lbls[k]}`;
    else if(k==='cap'||k==='productivity'||k==='shock'||k==='ontime')txt=`+${Math.round(v*100)}% ${lbls[k]}`;
    else if(k==='qcap')txt=`+${Math.round(v)} ${lbls[k]}`;
    else if(k==='eff')txt=`+${Math.round(v)} ${lbls[k]}`;
    else if(k==='morale')txt=`${v<0?'−':'+'}${Math.abs(Math.round(v))} ${lbls[k]}`;
    else txt=`${signed(Math.round(v*100))}% ${lbls[k]}`;
    parts.push(txt);
  }
  return parts.join(' · ');
}

/* ============================================================
   SUPPLY CHAIN & PROCUREMENT — contract suppliers, manage the
   relationships, and shape your materials cost and resilience.
   A second deep operations subsystem on top of capabilities.
   ============================================================ */

const SUPPLIER_KINDS=[
  {key:'commodity', name:'Commodity Vendor',   icon:'📦', desc:'Cheap, fungible inputs. Reliable enough, no loyalty.',         tier:1, costRange:[-0.02,0.01], rel:[40,60], reliab:[55,75], lead:[2,4]},
  {key:'contract',  name:'Contract Manufacturer',icon:'🏭',desc:'Builds to your spec at scale. The workhorse of supply.',      tier:2, costRange:[-0.05,-0.01],rel:[48,66], reliab:[62,82], lead:[1,3]},
  {key:'specialty', name:'Specialty Supplier',  icon:'🔩', desc:'High-grade components that lift quality — at a price.',        tier:2, costRange:[0.0,0.04],  rel:[50,70], reliab:[70,90], lead:[1,3], qual:[1,3]},
  {key:'strategic', name:'Strategic Partner',   icon:'🤝', desc:'Deep, exclusive partnership. Best terms — if you nurture it.',tier:3, costRange:[-0.08,-0.03],rel:[55,72], reliab:[78,94], lead:[1,2]},
  {key:'regional',  name:'Regional Distributor',icon:'🚚', desc:'Local reach and fast lead times in its home region.',         tier:1, costRange:[-0.03,0.0], rel:[45,64], reliab:[60,80], lead:[1,2]},
];
const SUP_KINDBY={};SUPPLIER_KINDS.forEach(k=>SUP_KINDBY[k.key]=k);
const SUP_FIRMS=['Hanwha','Foxlink','Jabil Forge','Flextron','Celestia','Wistronix','Pegabright','Quanta Reach','Sanmina Co.','Benchmark Supply','Zollner','Venture Mfg','TDK Components','Murata Works','Amphenol Reach','Corsair Materials','Aptiv Source','Magna Build','Bosch Components','Delphi Reach'];

function makeSupplier(o){
  o=o||{};const kind=SUP_KINDBY[o.kind]||pick(SUPPLIER_KINDS);
  const region=o.region||pick(REGION_KEYS);
  return {
    id:uid('s'),kind:kind.key,name:o.name||pick(SUP_FIRMS),person:o.person||(pick(INV_FIRST)+' '+pick(INV_LAST)),
    region,tier:kind.tier,
    costMod:round1c(rf(kind.costRange[0],kind.costRange[1])),     // negative = cheaper inputs
    reliability:ri(kind.reliab[0],kind.reliab[1]),
    leadTime:ri(kind.lead[0],kind.lead[1]),
    qual:kind.qual?ri(kind.qual[0],kind.qual[1]):0,
    coverage:o.coverage||ri(20,45),                                // % of your materials need it can cover
    rel:clamp(o.rel!=null?o.rel:ri(kind.rel[0],kind.rel[1]),0,100),
    monthlyFee:round1((kind.tier)*rf(0.05,0.18)),
    contracted:!!o.contracted,contractMonths:o.contractMonths||0,
    lastNurture:-99,
  };
}
function round1c(x){return Math.round(x*1000)/1000;}

/* contracted suppliers + coverage */
function contractedSuppliers(){ensureOps();return (G.ops.suppliers||[]).filter(s=>s.contracted);}
function supplyCoverage(){let c=0;contractedSuppliers().forEach(s=>{c+=s.coverage*(0.5+0.5*(s.rel/100));});return clamp(c/100,0,1);}
function supplierCostMod(){
  // weighted materials-cost change from your contracted base, scaled by coverage & relationship
  const sup=contractedSuppliers();if(!sup.length)return 0;
  let w=0,acc=0;sup.forEach(s=>{const wt=s.coverage*(0.6+0.4*(s.rel/100));acc+=s.costMod*wt;w+=wt;});
  const avg=w?acc/w:0;
  return avg*supplyCoverage();   // fully effective only at full coverage
}
function supplierQualBonus(){let q=0;contractedSuppliers().forEach(s=>{q+=(s.qual||0)*(s.rel/100);});return q;}
function supplyResilience(){
  // diversity + reliability + relationship; combines with the Supply Chain capability
  const sup=contractedSuppliers();if(!sup.length)return 0;
  const regions=new Set(sup.map(s=>s.region)).size;
  const avgRel=avg(sup,s=>s.rel)/100;const avgReli=avg(sup,s=>s.reliability)/100;
  return clamp(0.05*regions + 0.15*avgReli + 0.1*avgRel + supplyCoverage()*0.15,0,0.7);
}
function avgLeadTime(){const sup=contractedSuppliers();return sup.length?avg(sup,s=>s.leadTime):4;}

/* ---------- actions ---------- */
function scoutSuppliers(){
  ensureOps();
  const offers=[];const n=4;
  for(let i=0;i<n;i++){
    const myRegions=playerRegions();
    const region=chance(0.6)&&myRegions.length?pick(myRegions):pick(REGION_KEYS);
    offers.push(makeSupplier({kind:pick(SUPPLIER_KINDS).key,region}));
  }
  G.ops._supplierOffers=offers;
  return offers;
}
function contractSupplier(idx){
  ensureOps();const offers=G.ops._supplierOffers||[];const s=offers[idx];if(!s)return;
  const co=pc();const upfront=round1(s.tier*rf(0.4,1.2));
  if(co.cash<upfront){toast('Insufficient cash',`Onboarding costs $${money(upfront)}M.`);return;}
  co.cash=round1(co.cash-upfront);
  s.contracted=true;s.contractMonths=ri(18,42);
  G.ops.suppliers=G.ops.suppliers||[];G.ops.suppliers.push(s);
  G.ops._supplierOffers=offers.filter((o,i)=>i!==idx);
  pushFeed('ops',`Signed ${s.name} (${SUP_KINDBY[s.kind].name}, ${regionFull(s.region)}) — covers ~${s.coverage}% of materials needs.`,'good');
  toast(`${SUP_KINDBY[s.kind].icon} ${s.name} contracted`,`Coverage now ${pct(supplyCoverage())}.`);
  recompute();render();
}
function nurtureSupplier(id){
  const s=contractedSuppliers().find(x=>x.id===id);if(!s)return;
  if(G.month-s.lastNurture<4){toast('Too soon',`${s.name} isn't due for another review.`);return;}
  const ce=ceo();const cha=ce?(ce.stats.charisma||10):10;
  const gain=clamp(4+Math.round((cha-10)*0.4),3,10);
  s.rel=clamp(s.rel+gain,0,100);s.lastNurture=G.month;
  pushFeed('ops',`You strengthen ties with ${s.name} (+${gain} rapport).`,'neutral');
  toast('🤝 Supplier relationship',`${s.name}: ${relWord(s.rel)}.`);
  render();
}
function renegotiateSupplier(id){
  const s=contractedSuppliers().find(x=>x.id===id);if(!s)return;
  // better relationship = better odds of improved terms
  const odds=0.35+s.rel*0.005;
  if(chance(odds)){
    s.costMod=round1c(s.costMod-rf(0.005,0.02));s.coverage=clamp(s.coverage+ri(2,8),0,100);s.rel=clamp(s.rel+3,0,100);
    pushFeed('ops',`Renegotiated with ${s.name}: better pricing and coverage secured.`,'good');
    toast('📝 Better terms','Renegotiation succeeded.');
  }else{
    s.rel=clamp(s.rel-ri(3,8),0,100);
    pushFeed('ops',`${s.name} rebuffed your renegotiation. The relationship cooled.`,'bad');
    toast('📝 Talks stalled',`${s.name} held firm.`);
  }
  recompute();render();
}
function dropSupplier(id){
  ensureOps();const i=(G.ops.suppliers||[]).findIndex(x=>x.id===id);if(i<0)return;
  const s=G.ops.suppliers[i];G.ops.suppliers.splice(i,1);
  pushFeed('ops',`Ended the contract with ${s.name}.`,'neutral');
  recompute();render();
}

/* ---------- monthly supplier tick (called from tickOps) ---------- */
function tickSuppliers(){
  ensureOps();const sup=G.ops.suppliers||[];
  const profitable=(G.fin.net||0)>0;
  sup.forEach(s=>{
    if(!s.contracted)return;
    // relationship drifts with how the partnership is going
    let d=profitable?0.1:-0.05;
    if(supplyCoverage()>0.8)d+=0.05;
    s.rel=clamp(s.rel+d+rf(-0.1,0.1),0,100);
    // contract winds down
    s.contractMonths--;
    if(s.contractMonths<=0){
      if(s.rel>55&&chance(0.7)){s.contractMonths=ri(18,36);}     // auto-renew if relationship is good
      else{s.contracted=false;pushFeed('ops',`Your contract with ${s.name} lapsed.`,'warn');}
    }
  });
  // purge fully-lapsed
  G.ops.suppliers=sup.filter(s=>s.contracted);
}

/* ---------- SUPPLY CHAIN SCREEN ---------- */
SCREENS.supply=function(){
  ensureOps();const co=pc();
  const sup=contractedSuppliers();
  const cov=supplyCoverage();const resil=clamp(supplyResilience()+opsBonus().shock,0,1);
  const costEff=supplierCostMod();
  const head=panel('Supply Chain',`
    <div class="g4">
      ${tile('Materials Coverage',pct(cov),cov>0.8?'good':cov>0.4?'':'warn',cov<0.4?'exposed to spot market':'well-sourced')}
      ${tile('Materials Cost Edge',(costEff<=0?'−':'+')+pct(Math.abs(costEff)),costEff<0?'good':costEff>0?'warn':'')}
      ${tile('Supply Resilience',pct(resil),resil>0.4?'good':resil>0.2?'':'warn')}
      ${tile('Avg Lead Time',avgLeadTime().toFixed(1)+' mo',avgLeadTime()<2.5?'good':'')}
    </div>`);

  let body;
  if(!sup.length){
    body=`<div class="empty">You have no supplier contracts — you're buying on the spot market, paying full price and exposed to every shock. Scout and sign suppliers to lower materials cost and build resilience.</div>`;

/* ============================================================
   WORKFORCE OPERATIONS & FREIGHT — the shop-floor levers.
   Shifts, overtime, training and safety per division, plus a
   company freight policy trading cost against on-time delivery.
   These feed capacity, payroll, unit cost and on-time metrics.
   ============================================================ */

/* ---------- per-division operations state (lazy defaults) ---------- */
function wfShifts(d){return clamp(d.shifts||1,1,3);}
function wfOvertime(d){return clamp(d.overtime||0,0,60);}
function wfTraining(d){return clamp(d.training||0,0,100);}
function wfSafety(d){return clamp(d.safety!=null?d.safety:80,0,100);}

/* capacity multiplier from running more shifts / overtime / training */
function shiftCapacityFactor(d){
  const s=wfShifts(d),ot=wfOvertime(d),tr=wfTraining(d);
  return 1 + (s-1)*0.55 + (ot/100)*0.45 + (tr/100)*0.12;
}
/* payroll multiplier — extra shifts and overtime cost real money */
function shiftPayrollFactor(d){
  const s=wfShifts(d),ot=wfOvertime(d);
  return 1 + (s-1)*0.82 + (ot/100)*0.7;   // overtime is paid at a premium
}

/* ---------- freight policy ---------- */
const FREIGHT_MODES=[
  {key:'economy', name:'Economy',  icon:'🚢', desc:'Slow ocean & ground freight. Cheapest — but late.',      cost:-0.012, ontime:-0.08},
  {key:'standard',name:'Standard', icon:'🚚', desc:'A balanced mix of road, rail and sea.',                   cost:0,      ontime:0},
  {key:'express', name:'Express',  icon:'✈️', desc:'Air and priority freight. Fast and dependable — pricey.', cost:0.02,   ontime:0.1},
];
const FREIGHT_BY={};FREIGHT_MODES.forEach(m=>FREIGHT_BY[m.key]=m);
function freightMode(){ensureOps();return FREIGHT_BY[G.ops.freight]||FREIGHT_BY.standard;}
function freightCostMod(){return freightMode().cost;}
function freightOnTime(){return freightMode().ontime;}
function setFreight(mode){ensureOps();if(!FREIGHT_BY[mode])return;G.ops.freight=mode;pushFeed('ops',`Freight policy set to ${FREIGHT_BY[mode].name}.`,'neutral');recompute();render();}

/* ---------- actions ---------- */
function setShifts(divId,n){const d=divById(divId);if(!d)return;d.shifts=clamp(+n,1,3);
  pushFeed('ops',`${d.name} now running ${d.shifts} shift${d.shifts>1?'s':''}.`,'neutral');recompute();render();}
function setOvertime(divId,delta){const d=divById(divId);if(!d)return;d.overtime=clamp(wfOvertime(d)+(+delta||0),0,60);recompute();render();}
function investTraining(divId){
  const d=divById(divId);if(!d)return;const co=pc();const cost=round1(0.4+totalEmployeesIn(d)*0.004);
  if(co.cash<cost){toast('Insufficient cash',`A training push costs $${money(cost)}M.`);return;}
  co.cash=round1(co.cash-cost);d.training=clamp(wfTraining(d)+ri(8,16),0,100);d.morale=clamp((d.morale||60)+2,0,100);
  pushFeed('ops',`Funded a training program at ${d.name} (−$${money(cost)}M).`,'good');recompute();render();
}
function improveSafety(divId){
  const d=divById(divId);if(!d)return;const co=pc();const cost=round1(0.5+totalEmployeesIn(d)*0.003);
  if(co.cash<cost){toast('Insufficient cash','');return;}
  co.cash=round1(co.cash-cost);d.safety=clamp(wfSafety(d)+ri(6,12),0,100);d.morale=clamp((d.morale||60)+1.5,0,100);
  pushFeed('ops',`Invested in safety at ${d.name} (−$${money(cost)}M).`,'good');recompute();render();
}
function totalEmployeesIn(d){let n=0;for(const f in (d.employees||{}))n+=d.employees[f];return n;}

/* ---------- monthly workforce drift (called from tickOps) ---------- */
function tickWorkforce(){
  G.divisions.forEach(d=>{
    const s=wfShifts(d),ot=wfOvertime(d);
    // strain from heavy shift/overtime erodes morale; training boosts efficiency over time
    let strain=(s-1)*0.5 + (ot/100)*0.9;
    if(strain>0)d.morale=clamp((d.morale||60)-strain*0.4,0,100);
    if(wfTraining(d)>0){
      d.efficiency=clamp((d.efficiency||40)+wfTraining(d)*0.003,20,100);
      d.training=clamp(wfTraining(d)-0.4,0,100); // training decays — keep investing
    }
    // safety drifts toward neutral if neglected
    if(wfSafety(d)>60)d.safety=clamp(wfSafety(d)-0.2,0,100);
  });
}

  if(!G.divisions.length)return '';

    const s=wfShifts(d),ot=wfOvertime(d),tr=wfTraining(d),sf=wfSafety(d);
    const shiftBtns=[1,2,3].map(n=>btn(n+(n===1?' shift':' shifts'),'wfshifts',{div:d.id,n:n},'chip'+(s===n?' on':'')+' sm')).join('');
    return `<div class="wf-card">
      <div class="wf-h"><span class="wf-name">${esc(d.name)}</span><span class="wf-emp">${units(totalEmployeesIn(d))} staff · morale ${Math.round(d.morale||60)}</span></div>

}},

/* ============================================================
   FAMILY HOLDINGS — the meta-game. Once your operating company
   has scale, establish a family holding company and begin
   acquiring whole businesses across every sector as standalone
   subsidiaries, plus a family venture arm making minority bets.
   The empire rolls up into one value you can watch grow.
   ============================================================ */

const HOLDCO_SUFFIX=['Holdings','Capital','Group','Ventures','Partners','Industries','Global','Enterprises'];
const VC_STAGES=['Seed','Series A','Series B','Series C','Pre-IPO'];
function nextStage(s){const i=VC_STAGES.indexOf(s);return i<0||i>=VC_STAGES.length-1?VC_STAGES[VC_STAGES.length-1]:VC_STAGES[i+1];}

function defaultHoldings(){return {founded:false,name:'',subs:[],vc:[],dealFlow:[],_divFlow:0,milestonesHit:{}};}
function ensureHoldings(){if(!G.holdings)G.holdings=defaultHoldings();const h=G.holdings;if(!h.subs)h.subs=[];if(!h.vc)h.vc=[];if(!h.dealFlow)h.dealFlow=[];if(!h.milestonesHit)h.milestonesHit={};return h;}
function holdingsFounded(){return !!(G.holdings&&G.holdings.founded);}
function holdcoName(){return (G.holdings&&G.holdings.name)|| ((founder()?founder().surname:'Family')+' Holdings');}

function canFoundHoldings(){return !holdingsFounded()&&(pc().valuation||0)>=150;}
function foundHoldings(){
  ensureHoldings();
  if(holdingsFounded())return;
  if(!canFoundHoldings()){toast('Not yet','Grow your company to ~$150M valuation before forming a holding company.');return;}
  const sur=founder()?founder().surname:'Family';
  G.holdings.founded=true;
  G.holdings.name=sur+' '+pick(HOLDCO_SUFFIX);
  refreshDealFlow();
  pushFeed('deal',`${G.holdings.name} is established. ${pc().name} becomes the flagship of a family empire — you can now acquire companies across every sector.`,'good');
  toast('🏛️ Holding company formed',`${G.holdings.name} is open for business.`);
  UI.tab='holdings';render();
}

/* ---------- rolled-up value ---------- */
function subEquity(s){return s.value*(s.stake/100);}
function holdingsSubValue(){return sum(G.holdings?G.holdings.subs:[],s=>subEquity(s));}
function holdingsVcValue(){let v=0;(G.holdings?G.holdings.vc:[]).forEach(x=>{if(x.status!=='exited'&&x.status!=='failed')v+=x.value;});return v;}
function empireValue(){return (pc().valuation||0)+holdingsSubValue()+holdingsVcValue();}
function portfolioRevenue(){return sum(G.holdings?G.holdings.subs:[],s=>s.revenue*(s.stake/100));}

/* ---------- subsidiaries ---------- */
function makeSubFromRival(r,opts){
  opts=opts||{};
  const main=r.presences&&r.presences.length?r.presences.reduce((a,b)=>(b.quality>a.quality?b:a)):{sectorKey:pick(sectorsOf(r.indKey)).key};
  const sk=main.sectorKey;const sec=SECTORBY[sk]||{margin:0.2,growth:0.05};
  const fullVal=round1(opts.value!=null?opts.value:(r.valuation||rivalValuation(r)));
  return {id:uid('sub'),name:r.name,ticker:r.ticker,sectorKey:sk,indKey:r.indKey,
    stake:clamp(opts.stake||100,5,100),
    engagement:opts.engagement||'active',     // 'active' = steer it · 'passive' = royalty checks
    focus:opts.focus||'balanced',             // active subs: 'grow' | 'profit' | 'balanced'
    value:Math.max(1,fullVal),
    revenue:round1(Math.max(0.5,r.revenue||((r.scale||40)*0.06))),
    growth:round1c(rf(-0.04,0.16)),margin:clamp(sec.margin+rf(-0.05,0.06),0.05,0.62),
    divPayout:round1c(rf(0.08,0.34)),acquiredMonth:G.month};
}
function acquireAsSubsidiary(rid,stake,engagement,premium){
  ensureHoldings();
  if(!holdingsFounded()){toast('Form holdings first','Establish your family holding company to acquire subsidiaries.');return;}
  const co=pc();const r=rivalById(rid);if(!r||!r.alive)return;
  stake=clamp(stake||100,5,100);engagement=engagement||'active';premium=premium!=null?premium:0.3;
  const fullVal=round1(r.valuation||rivalValuation(r));
  const price=round1(fullVal*(1+premium)*(stake/100));
  let cashPart=Math.min(co.cash,price),stockPart=round1(price-cashPart);
  if(stockPart>0&&!co.public){toast('Insufficient cash','Go public to fund deals with stock, or take a smaller stake.');return;}
  co.cash=round1(co.cash-cashPart);
  if(stockPart>0){const val=co.valuation||companyValuation();const ns=Math.round(co.shares*(stockPart/val));co.shares+=ns;co.investorShares=(co.investorShares||0)+ns;}
  G.holdings.subs.push(makeSubFromRival(r,{value:fullVal,stake,engagement}));
  r.alive=false;
  G.stats=G.stats||{};G.stats.acquisitions=(G.stats.acquisitions||0)+1;
  const posture=stake>=60?(engagement==='active'?'controlling, active':'controlling, passive'):(engagement==='active'?'minority, active board seat':'minority, passive');
  pushFeed('deal',`${holdcoName()} took a ${pct(stake/100)} stake in ${r.name} (${(INDBY[r.indKey]||{}).name||r.indKey}) for $${money(price)}M — ${posture}.`,'good');
  toast('🤝 Deal closed',`${r.name} · ${pct(stake/100)} ${engagement}.`);
  refreshDealFlow();recompute();checkAchievements();render();
}
function injectSubCapital(id){
  const s=(G.holdings.subs||[]).find(x=>x.id===id);if(!s)return;const co=pc();
  const cost=round1(Math.max(2,s.value*0.22));
  if(co.cash<cost){toast('Insufficient cash',`Growth capital for ${s.name} is $${money(cost)}M.`);return;}
  co.cash=round1(co.cash-cost);
  s.value=round1(s.value+cost*1.15);s.revenue=round1(s.revenue*1.09);s.growth=round1c(clamp(s.growth+0.015,-0.1,0.4));
  pushFeed('deal',`Injected $${money(cost)}M of growth capital into ${s.name}.`,'neutral');
  recompute();render();
}
function divestSub(id){
  const i=(G.holdings.subs||[]).findIndex(x=>x.id===id);if(i<0)return;
  const s=G.holdings.subs[i];const proceeds=round1(subEquity(s)*0.97);
  G.holdings.subs.splice(i,1);pc().cash=round1(pc().cash+proceeds);
  pushFeed('deal',`Divested ${s.name} for $${money(proceeds)}M.`,'neutral');
  toast('💼 Divested',`${s.name} sold for $${money(proceeds)}M.`);
  recompute();render();
}

/* ---------- family venture arm ---------- */
function investVC(amount){
  ensureHoldings();
  if(!holdingsFounded()){toast('Form holdings first','');return;}
  const co=pc();amount=round1(amount||1);
  if(co.cash<amount){toast('Insufficient cash',`This check is $${money(amount)}M.`);return;}
  co.cash=round1(co.cash-amount);
  const sk=pick(SECTORS).key;const ind=SECTORBY[sk].ind;
  const x={id:uid('vc'),name:genCompanyName(ind),sectorKey:sk,stage:'Seed',stakePct:ri(5,20),costBasis:amount,value:amount,status:'growing',monthsHeld:0,multiple:1};
  G.holdings.vc.push(x);
  pushFeed('deal',`${holdcoName()} Ventures wrote a $${money(amount)}M check into ${x.name} (${SECTORBY[sk].name}) for ${x.stakePct}%.`,'neutral');
  toast('🌱 New venture bet',`${x.name} — ${x.stakePct}% stake.`);
  render();
}

/* ---------- deal flow (acquisition targets) ---------- */
function refreshDealFlow(){
  ensureHoldings();
  const co=pc();
  const targets=(G.rivalCos||[]).filter(r=>r.alive).map(r=>({r,price:round1((r.valuation||rivalValuation(r))*1.3)}))
    .sort((a,b)=>a.price-b.price);
  // a spread: a few affordable, a couple of stretch targets
  const affordable=targets.filter(t=>t.price<=co.cash*1.4).slice(-6);
  const stretch=targets.filter(t=>t.price>co.cash*1.4).slice(0,2);
  G.holdings.dealFlow=affordable.concat(stretch).map(t=>t.r.id);
}

/* ---------- monthly tick ---------- */
function tickHoldings(){
  ensureHoldings();if(!holdingsFounded())return;
  const co=pc();const macro=(G.macro&&G.macro.growth)||1;let div=0;
  G.holdings.subs.forEach(s=>{
    const sec=SECTORBY[s.sectorKey]||{growth:0.05,margin:0.2};
    // engagement & focus shape the trajectory
    let steer=0, payMult=1;
    if(s.engagement==='active'){
      const inf=s.stake>=50?1:0.5;                 // minority steering is weaker
      if(s.focus==='grow'){steer=0.05*inf; payMult=0.4;}
      else if(s.focus==='profit'){steer=-0.01*inf; payMult=1.6;}
      else {steer=0.025*inf; payMult=0.9;}          // balanced
    }else{
      steer=-0.012; payMult=1.35;                   // passive: drifts, but pays out generously
    }
    const g=(s.growth + steer + sec.growth*0.5 + (macro-1)*0.5)/12;
    s.revenue=Math.max(0.2,round1(s.revenue*(1+g+rf(-0.012,0.012))));
    const mult=4+sec.margin*6+clamp(s.growth*10,-2,4);
    s.value=round1(Math.max(1,s.revenue*mult));
    const d=round1(s.revenue*s.margin*clamp(s.divPayout*payMult,0,0.6)/12*(s.stake/100));
    if(d>0){co.cash=round1(co.cash+d);div+=d;}
  });
  G.holdings._divFlow=round1(div);
  G.holdings.vc.forEach(x=>{
    if(x.status==='exited'||x.status==='failed')return;
    x.monthsHeld++;
    const roll=Math.random();
    if(roll<0.012){x.status='failed';x.value=0;pushFeed('deal',`Venture write-off: ${x.name} shut down.`,'bad');}
    else if(roll<0.032){const m=rf(1.3,2.3);x.value=round1(x.value*m);x.stage=nextStage(x.stage);pushFeed('deal',`${x.name} raised an up-round — your stake is now $${money(x.value)}M.`,'good');}
    else if(roll<0.05&&x.monthsHeld>10){x.status='exited';co.cash=round1(co.cash+x.value);pushFeed('deal',`Exited ${x.name} for $${money(x.value)}M.`,'good');toast('💸 Venture exit',`${x.name} returned $${money(x.value)}M.`);}
    else x.value=round1(Math.max(0,x.value*(1+rf(-0.02,0.045))));
    x.multiple=x.costBasis>0?round1(x.value/x.costBasis):0;
  });
  if(G.month%3===0||chance(0.05))refreshDealFlow();
  checkMilestones();
}

const MILESTONES=[
  {key:'val',label:'Company Valuation',fmt:v=>'$'+money(v),cur:()=>pc().valuation||0,tiers:[100,1000,10000,100000,1000000]},
  {key:'emp',label:'Empire Value',fmt:v=>'$'+money(v),cur:()=>empireValue(),tiers:[200,2000,20000,200000,2000000]},
  {key:'rev',label:'Annual Revenue',fmt:v=>'$'+money(v),cur:()=>(G.fin.revenue||0)*12+portfolioRevenue(),tiers:[10,100,1000,10000,100000]},
  {key:'nw',label:'Family Net Worth',fmt:v=>'$'+money(v),cur:()=>personalNetWorth(),tiers:[50,500,5000,50000,500000]},
  {key:'subs',label:'Subsidiaries',fmt:v=>units(v),cur:()=>(G.holdings?G.holdings.subs.length:0),tiers:[1,5,10,25,50]},
  {key:'emps',label:'Headcount',fmt:v=>units(v),cur:()=>totalEmployees(),tiers:[50,500,5000,50000,250000]},
];
function nextTier(m){const c=m.cur();for(const t of m.tiers)if(c<t)return t;return null;}
function checkMilestones(){
  ensureHoldings();
  MILESTONES.forEach(m=>{const c=m.cur();m.tiers.forEach(t=>{const k=m.key+'_'+t;if(c>=t&&!G.holdings.milestonesHit[k]){G.holdings.milestonesHit[k]=G.month;pushFeed('world',`Milestone reached — ${m.label}: ${m.fmt(t)}.`,'good');}});});
}

function renderGrowthCharts(){
  const h=(G.history||[]).slice(-120);
  if(h.length<2)return panel('Growth',`<div class="empty">Your growth charts will populate as the years pass.</div>`);
  const valChart=lineChart(h,[{key:'val',label:'Valuation',color:'var(--gold)'}],{w:640,h:170,fmt:v=>'$'+money0(v)});
  const revChart=lineChart(h,[{key:'rev',label:'Revenue',color:'var(--teal)'},{key:'net',label:'Net income',color:'var(--green)'}],{w:640,h:170,zero:true,fmt:v=>'$'+money0(v)});
  const nwChart=lineChart(h,[{key:'nw',label:'Family net worth',color:'var(--blue)'}],{w:640,h:170,fmt:v=>'$'+money0(v)});
  return panel('Growth — Command Center',`
    <div class="chart-block"><div class="chart-t">Company valuation</div>${valChart}</div>
    <div class="chart-block"><div class="chart-t">Revenue &amp; net income (annualized)</div>${revChart}</div>
    <div class="chart-block"><div class="chart-t">Family net worth</div>${nwChart}</div>
  `);
}
function renderMilestones(){
  const cards=MILESTONES.map(m=>{
    const cur=m.cur(),tier=nextTier(m);
    if(tier==null)return `<div class="ms-card done"><div class="ms-l">${esc(m.label)}</div><div class="ms-v gold">${m.fmt(cur)}</div><div class="ms-sub">Maxed — legendary</div></div>`;
    const prevTier=m.tiers[m.tiers.indexOf(tier)-1]||0;
    const frac=clamp((cur-prevTier)/(tier-prevTier),0,1);
    return `<div class="ms-card"><div class="ms-l">${esc(m.label)}</div><div class="ms-v">${m.fmt(cur)}</div>${bar(frac,frac>0.8?'good':'')}<div class="ms-sub">Next: ${m.fmt(tier)}</div></div>`;
  }).join('');
  return panel('Milestones &amp; Trajectory',`<div class="ms-grid">${cards}</div>`);
}
function renderBenchmark(){
  const rivals=(G.rivalCos||[]).filter(r=>r.alive);
  if(!rivals.length)return '';
  const myQ=avg(allProducts(),p=>p.quality)||0;
  const myB=avg(allProducts(),p=>p.brand)||0;
  const rivQ=avg(rivals,r=>r.quality)||0;
  const rivB=avg(rivals,r=>r.brand)||0;
  const m=(G.ops&&G.ops.metrics)||{};
  const cmp=(mine,theirs,inv)=>{const better=inv?mine<theirs:mine>theirs;return `<span class="${better?'good':'warn'}">${better?'▲':'▼'}</span>`;}
  return panel('Competitive Benchmark',`
    <div class="g4">
      ${tile('Your Quality',Math.round(myQ)+' '+cmp(myQ,rivQ),myQ>=rivQ?'good':'warn','peers '+Math.round(rivQ))}
      ${tile('Your Brand',Math.round(myB)+' '+cmp(myB,rivB),myB>=rivB?'good':'warn','peers '+Math.round(rivB))}
      ${tile('Unit Cost Index',(m.cpu||1).toFixed(2)+'×',(m.cpu||1)<1?'good':'','lower is better')}
      ${tile('Net Margin',pct(G.fin.netMargin||0),(G.fin.netMargin||0)>0.1?'good':(G.fin.netMargin||0)<0?'bad':'')}
    </div>
    <div class="hint" style="margin-top:8px">Your flagship measured against the ${units(rivals.length)} companies still standing in the world.</div>`);
}

/* ---------- absorb & shut down: kill the competition ---------- */
function absorbCompetitor(rid){
  ensureHoldings();
  if(!holdingsFounded()){toast('Form holdings first','');return;}
  const co=pc();const r=rivalById(rid);if(!r||!r.alive)return;
  const price=acqModePrice(r,'absorb');
  let cashPart=Math.min(co.cash,price),stockPart=round1(price-cashPart);
  if(stockPart>0&&!co.public){toast('Insufficient cash','Go public to fund a takeover of this size.');return;}
  co.cash=round1(co.cash-cashPart);
  if(stockPart>0){const val=co.valuation||companyValuation();const ns=Math.round(co.shares*(stockPart/val));co.shares+=ns;co.investorShares=(co.investorShares||0)+ns;}
  // consolidate: transfer customer base / mindshare to your overlapping products
  const secs=new Set((r.presences||[]).map(p=>p.sectorKey));
  let boosted=false;
  allProducts().forEach(p=>{if(secs.has(p.sectorKey)){p.brand=clamp(p.brand+(r.brand||30)*0.28,1,99);boosted=true;}});
  co.reputation=clamp((co.reputation||50)+(boosted?4:2),0,100);
  // mark a lingering consolidation edge so the win is felt
  ensureOps&&ensureOps();
  r.alive=false;
  G.stats=G.stats||{};G.stats.acquisitions=(G.stats.acquisitions||0)+1;
  pushFeed('deal',`${holdcoName()} absorbed and shut down ${r.name} for $${money(price)}M${boosted?', folding its customers into your own products':''}. A rival is gone.`,'good');
  toast('🔪 Competitor eliminated',`${r.name} is off the board — its market is yours to take.`);
  refreshDealFlow();recompute();checkAchievements();render();
}

function ensureGrowth(){if(!G.campaigns)G.campaigns=[];if(!G.reviews)G.reviews=[];}

/* ===================== #5 EXPANSION CAMPAIGNS ===================== */
const CAMPAIGN_PHASES=['Market entry','Securing permits','Building distribution','Local launch'];
function expansionCost(region){
  const rc=(REGIONS[region]&&REGIONS[region].cost)||1;
  const sec=SECTORBY[(G.divisions[0]||{}).sectorKey]||{capital:0.3};
  let cost=(6+sec.capital*9)*(0.7+rc*0.45);
  const af=G.ops&&G.ops.annualFocus;
  if(af&&af.key==='expansion'&&G.month<af.until)cost*=0.8;   // expansion focus discount
  return round1(cost);
}
function launchExpansionCampaign(region){
  ensureGrowth();
  if(playerRegions().includes(region)){toast('Already there',`You already operate in ${regionFull(region)}.`);return;}
  if(G.campaigns.some(c=>c.region===region)){toast('Campaign underway',`You're already entering ${regionFull(region)}.`);return;}
  const cost=expansionCost(region);const co=pc();
  if(co.cash<cost){toast('Insufficient cash',`Entering ${regionFull(region)} costs $${money(cost)}M upfront.`);return;}
  co.cash=round1(co.cash-cost);
  const months=ri(6,12);
  G.campaigns.push({id:uid('camp'),region,monthsLeft:months,totalMonths:months,monthly:round1(cost*0.05),phase:0});
  pushFeed('world',`Expansion campaign launched into ${regionFull(region)} (−$${money(cost)}M, ~${months} months).`,'neutral');
  toast('🗺️ Expansion underway',`Entering ${regionFull(region)}.`);
  recompute();render();
}
function tickCampaigns(){
  ensureGrowth();const co=pc();
  for(let i=G.campaigns.length-1;i>=0;i--){
    const c=G.campaigns[i];
    if(c.monthly)co.cash=round1(co.cash-c.monthly);
    c.monthsLeft--;
    c.phase=clamp(Math.floor((1-c.monthsLeft/c.totalMonths)*CAMPAIGN_PHASES.length),0,CAMPAIGN_PHASES.length-1);
    if(c.monthsLeft<=0){
      allProducts().forEach(p=>{if(!p.launchedRegions.includes(c.region)){p.launchedRegions.push(c.region);p.brand=clamp(p.brand+3,1,99);}});
      pushFeed('world',`Now operating in ${regionFull(c.region)} — your products are live in the new market.`,'good');
      toast('✅ Expansion complete',`${regionFull(c.region)} is online.`);
      G.campaigns.splice(i,1);
    }
  }
}
function renderExpansionPanel(){
  ensureGrowth();
  const here=playerRegions();
  const hereChips=here.map(r=>`<span class="chip on">${esc(regionFull(r))}</span>`).join('')||'<span class="dim">none yet</span>';
  let active='';
  G.campaigns.forEach(c=>{
    const frac=clamp(1-c.monthsLeft/Math.max(1,c.totalMonths),0,1);
    active+=`<div class="exp-active"><div class="exp-h"><span>🗺️ ${esc(regionFull(c.region))}</span><span class="init-left">${CAMPAIGN_PHASES[c.phase]} · ${c.monthsLeft}mo</span></div>${bar(frac,'')}</div>`;
  });
  const avail=REGION_KEYS.filter(rg=>!here.includes(rg)&&!G.campaigns.some(c=>c.region===rg));
  const availCards=avail.map(rg=>`<div class="exp-card">
    <div class="exp-name">${esc(regionFull(rg))}</div>
    <div class="exp-cost">~$${money(expansionCost(rg))}M · 6–12 mo</div>
    ${btn('Launch campaign','launchexp',{region:rg},'ghost block sm')}
  </div>`).join('');
  return panel('Regional Expansion',`
    <div class="exp-here"><span class="exp-flabel">Operating in:</span> ${hereChips}</div>
    ${active?`<div class="exp-running">${active}</div>`:''}
    ${availCards?`<div class="expgrid">${availCards}</div>`:`<div class="empty">You operate in every region on Earth.</div>`}

}

function setPriority(pid,delta){

/* ===================== #11 ANNUAL REVIEW ===================== */
function annualGrade(r){
  let s=0;
  if(r.revGrow>0.3)s+=2;else if(r.revGrow>0.1)s+=1;else if(r.revGrow<0)s-=1;
  if(r.net>0)s+=1;else s-=1;
  if(r.valGrow>0.25)s+=2;else if(r.valGrow>0.05)s+=1;else if(r.valGrow<0)s-=1;
  if(r.oee>0.7)s+=1;if(r.defect<0.03)s+=1;if(r.ontime>0.9)s+=1;
  return s>=6?'A+':s>=5?'A':s>=3?'B':s>=1?'C':s>=-1?'D':'F';
}
function maybeAnnualReview(){
  if(G.month===0||G.month%12!==0)return;
  ensureGrowth();
  const prev=G._yrSnapshot||{val:pc().valuation||0,rev:(G.fin.revenue||0)*12};
  const cur={val:pc().valuation||0,rev:(G.fin.revenue||0)*12};
  const m=(G.ops&&G.ops.metrics)||{};
  const review={year:G.year,val:cur.val,valGrow:prev.val?(cur.val/prev.val-1):0,
    rev:cur.rev,revGrow:prev.rev?(cur.rev/prev.rev-1):0,net:(G.fin.net||0)*12,
    oee:m.oee||0,defect:m.defect||0,ontime:m.ontime||0,emps:totalEmployees(),
    subs:(G.holdings?G.holdings.subs.length:0),nw:personalNetWorth()};
  review.grade=annualGrade(review);
  G.reviews.push(review);G._annualReview=review;G._yrSnapshot=cur;
  pushFeed('world',`${review.year} Annual Review ready — operations grade ${review.grade}.`,'neutral');
  toast('📋 Annual Review',`${review.year}: grade ${review.grade}. Open it from Operations.`);
}

function playerIndustry(){const d=G.divisions&&G.divisions[0];if(!d)return null;return (SECTORBY[d.sectorKey]||{}).ind||null;}
function activeIndustrySystem(){return INDUSTRY_SYSTEMS[playerIndustry()]||null;}
/* Every industry the empire operates: flagship + other divisions + ACTIVE subsidiaries. */
function industriesActive(){
  const out=[];const seen={};
  (G.divisions||[]).forEach(d=>{const ind=(SECTORBY[d.sectorKey]||{}).ind;if(ind&&INDUSTRY_SYSTEMS[ind]&&!seen[ind]){seen[ind]=1;out.push(ind);}});
  if(G.holdings&&G.holdings.subs)G.holdings.subs.forEach(s=>{if(s.engagement==='active'&&s.indKey&&INDUSTRY_SYSTEMS[s.indKey]&&!seen[s.indKey]){seen[s.indKey]=1;out.push(s.indKey);}});
  if(!out.length){const pi=playerIndustry();if(pi&&INDUSTRY_SYSTEMS[pi])out.push(pi);}
  return out;
}
function hasIndustry(ind){return industriesActive().indexOf(ind)>=0;}
/* A representative sector for an industry (so finance/tech read the right one even as a subsidiary). */
function industrySectorKey(ind){
  const d=(G.divisions||[]).find(x=>(SECTORBY[x.sectorKey]||{}).ind===ind);if(d)return d.sectorKey;
  if(G.holdings&&G.holdings.subs){const s=G.holdings.subs.find(x=>x.indKey===ind&&x.engagement==='active');if(s)return s.sectorKey;}
  const sec=SECTORS.find(s=>s.ind===ind);return sec?sec.key:(G.divisions[0]||{}).sectorKey;
}
function viewedIndustry(){const act=industriesActive();if(UI.indView&&act.indexOf(UI.indView)>=0)return UI.indView;return act[0]||playerIndustry();}
function ensureIndustryState(){if(!G.industry)G.industry={};industriesActive().forEach(ind=>{const sys=INDUSTRY_SYSTEMS[ind];if(sys&&sys.ensure)sys.ensure();});}
function tickIndustry(){industriesActive().forEach(ind=>{const sys=INDUSTRY_SYSTEMS[ind];if(sys){if(sys.ensure)sys.ensure();if(sys.tick)sys.tick();}});}

  {key:'tv',     name:'TV Series',            icon:'📺', months:[6,12], budget:[12,80],  mult:[0.4,3.6], brand:6, recur:true, desc:'Recurring seasons — steady if it lands, and renewable.'},
  {key:'podcast',name:'Podcast',              icon:'🎙️', months:[2,5],  budget:[0.5,6],  mult:[0.5,3.2], brand:3, desc:'Cheap and fast. Builds a loyal audience and ad revenue.'},
  {key:'book',   name:'Book / Author',        icon:'📖', months:[5,10], budget:[1,12],   mult:[0.4,4.2], brand:4, desc:'Sign an author; a bestseller has a long royalty tail.'},
  {key:'comic',  name:'Comic / Graphic Novel',icon:'📓', months:[3,7],  budget:[0.5,9],  mult:[0.3,3.8], brand:5, ip:true, desc:'Original IP that can franchise into film, TV and games.'},
  {key:'game',   name:'Video Game',           icon:'🎮', months:[10,20],budget:[20,150], mult:[0.2,5.2], brand:7, desc:'Blockbuster upside on a long, expensive build.'},

const STUDIO_FMTBY={};STUDIO_FORMATS.forEach(f=>STUDIO_FMTBY[f.key]=f);
const STUDIO_GENRES=['Drama','Comedy','Thriller','Sci-Fi','Fantasy','Horror','Romance','Action','Documentary','Animation','Crime','Coming-of-Age'];
const BUDGET_TIERS=[{key:'lean',name:'Lean',mult:0.4,q:-6},{key:'standard',name:'Standard',mult:1.0,q:4},{key:'prestige',name:'Prestige',mult:1.9,q:14}];
const TALENT_TIERS=[{key:'rising',name:'Rising talent',mult:0.6,q:-4,brand:0.6},{key:'established',name:'Established',mult:1.0,q:6,brand:1},{key:'alist',name:'A-list',mult:1.8,q:16,brand:1.6}];
const BTIER_BY={};BUDGET_TIERS.forEach(t=>BTIER_BY[t.key]=t);const TAL_BY={};TALENT_TIERS.forEach(t=>TAL_BY[t.key]=t);

function ensureStudio(){if(!G.industry)G.industry={};if(!G.industry.studio)G.industry.studio={projects:[],released:[],hits:0,grossLife:0};const s=G.industry.studio;if(!s.projects)s.projects=[];if(!s.released)s.released=[];}
function studioRepBonus(){return clamp(((pc().reputation||50)-50)*0.3,-15,18);}
function greenlight(format,genre,tierKey,talentKey){
  ensureStudio();const f=STUDIO_FMTBY[format];if(!f)return;
  const tier=BTIER_BY[tierKey]||BUDGET_TIERS[1];const tal=TAL_BY[talentKey]||TALENT_TIERS[1];
  const base=rf(f.budget[0],f.budget[1]);
  const budget=round1(base*tier.mult*(0.7+tal.mult*0.5));
  const co=pc();
  if(co.cash<budget){toast('Insufficient cash',`This ${f.name.toLowerCase()} needs $${money(budget)}M to greenlight.`);return;}
  co.cash=round1(co.cash-budget);
  const months=ri(f.months[0],f.months[1]);
  const title=studioTitle(format,genre);
  G.industry.studio.projects.push({id:uid('proj'),format,genre,tier:tierKey,talent:talentKey,title,budget,monthsLeft:months,totalMonths:months,figures:(typeof studioCrewFor==='function'?studioCrewFor(format):[])});
  pushFeed('media',`Greenlit ${title} — a ${tier.name.toLowerCase()} ${genre.toLowerCase()} ${f.name.toLowerCase()} (−$${money(budget)}M, ~${months} mo).`,'neutral');
  toast(`${f.icon} In production`,`${title} · ${months} months`);
  recompute();render();
}
function studioTitle(format,genre){
  const A=['The Last','Midnight','Crimson','Hollow','Eternal','Broken','Silent','Golden','Wild','Lost','Neon','Paper','Iron','Velvet','Ashen'];
  const B=['Empire','Tide','Harbor','Reverie','Circuit','Crown','Echo','Ember','Atlas','Mirage','Threshold','Requiem','Frontier','Gambit','Lullaby'];
  return pick(A)+' '+pick(B);
}
function releaseProject(p){
  const f=STUDIO_FMTBY[p.format];const tier=BTIER_BY[p.tier];const tal=TAL_BY[p.talent];
  const q=clamp(48+tier.q+tal.q+studioRepBonus()+rf(-22,22),1,100);
  let outcome,mult;
  if(q<35){outcome='Flop';mult=rf(f.mult[0],f.mult[0]+(f.mult[1]-f.mult[0])*0.25);}
  else if(q<58){outcome='Modest';mult=rf(f.mult[0]+(f.mult[1]-f.mult[0])*0.2,f.mult[0]+(f.mult[1]-f.mult[0])*0.5);}
  else if(q<80){outcome='Hit';mult=rf(f.mult[0]+(f.mult[1]-f.mult[0])*0.45,f.mult[0]+(f.mult[1]-f.mult[0])*0.8);}
  else {outcome='Blockbuster';mult=rf(f.mult[0]+(f.mult[1]-f.mult[0])*0.75,f.mult[1]);}
  const gross=round1(p.budget*mult);
  const rel={id:p.id,title:p.title,format:p.format,genre:p.genre,outcome,quality:Math.round(q),budget:p.budget,gross,remaining:gross,rate:f.key==='tv'?0.10:0.2,recur:f.recur,renews:0,figures:p.figures||[]};
  G.industry.studio.released.unshift(rel);
  if(typeof studioLogRelease==='function')studioLogRelease(rel);
  if(G.industry.studio.released.length>40)G.industry.studio.released.pop();
  const brandGain=Math.round(f.brand*(tal.brand||1)*(outcome==='Blockbuster'?2.2:outcome==='Hit'?1.3:outcome==='Modest'?0.5:-0.3));
  if(brandGain)_brandAll(brandGain);
  pc().reputation=clamp((pc().reputation||50)+(outcome==='Blockbuster'?5:outcome==='Hit'?3:outcome==='Flop'?-3:1),0,100);
  if(outcome==='Hit'||outcome==='Blockbuster')G.industry.studio.hits++;
  pushFeed('media',`${p.title} releases — ${outcome}! Projected lifetime gross $${money(gross)}M.`,outcome==='Flop'?'bad':'good');
  toast(`${STUDIO_FMTBY[p.format].icon} ${outcome}`,`${p.title}: $${money(gross)}M gross`);
}
function tickStudio(){
  ensureStudio();const s=G.industry.studio;const co=pc();let mrev=0;
  for(let i=s.projects.length-1;i>=0;i--){const p=s.projects[i];p.monthsLeft--;if(p.monthsLeft<=0){releaseProject(p);s.projects.splice(i,1);}}
  for(let i=s.released.length-1;i>=0;i--){
    const r=s.released[i];
    if(r.remaining>0.2){const pay=round1(r.remaining*r.rate);co.cash=round1(co.cash+pay*(typeof industryNetMult==='function'?industryNetMult('media'):1));r.remaining=round1(r.remaining-pay);mrev+=pay;s.grossLife=round1((s.grossLife||0)+pay);}
    else if(r.recur&&(r.outcome==='Hit'||r.outcome==='Blockbuster')&&r.renews<3&&chance(0.25)){
      // a hit series gets renewed for another season at a discount
      r.renews++;r.remaining=round1(r.gross*rf(0.5,0.9));pushFeed('media',`${r.title} renewed for another season.`,'good');
    }
  }
  s._mrev=round1(mrev);
}

      return `<div class="rel-card"><div class="rel-h"><span>${f.icon} ${esc(r.title)}</span><span class="rel-out ${oTone}">${r.outcome}</span></div>
      <div class="proj-sub">${esc(r.genre)} · ${esc(f.name)}</div>${(r.figures&&r.figures.length&&typeof figInline==='function')?`<div class="proj-crew">${r.figures.map(figInline).join(' · ')}</div>`:''}
      <div class="rel-stats"><span>Gross $${money(r.gross)}M</span><span>${r.remaining>0.2?'earning':'tail done'}</span>${r.renews?`<span class="good">${r.renews} renewals</span>`:''}</div></div>`;}).join('')}</div>`;
  }else rel=`<div class="empty">No releases yet.</div>`;
  const released=panel('Released Slate',rel,{right:`<span class="hint">Lifetime slate gross $${money(s.grossLife||0)}M</span>`});

  return head+production+released;

function doGreenlight(){const f=($('#glFormat')||{}).value,g=($('#glGenre')||{}).value,t=($('#glTier')||{}).value,tal=($('#glTalent')||{}).value;if(f){closeModal();greenlight(f,g,t,tal);}}

/* ============================================================
   HEALTH — PIPELINE & MEDICAL FIELD FORCE
   Push drug and device candidates through development phases
   (with real attrition), win approval, then convert science into
   sales with a field force detailing providers — until the patent
   cliff arrives.
   ============================================================ */
const PIPE_PHASES=[
  {key:'disc',name:'Discovery',    months:[3,6],  cost:[1,4],  p:0.80},
  {key:'pre', name:'Preclinical',  months:[4,8],  cost:[3,10], p:0.74},
  {key:'p1',  name:'Phase I',      months:[6,12], cost:[6,18], p:0.70},
  {key:'p2',  name:'Phase II',     months:[8,16], cost:[12,42],p:0.58},
  {key:'p3',  name:'Phase III',    months:[10,20],cost:[28,120],p:0.66},
  {key:'fda', name:'FDA Review',   months:[6,12], cost:[4,12], p:0.88},
];
const PROGRAM_TYPES=[
  {key:'drug',  name:'Drug / Biologic',icon:'💊',costMult:1.0,peak:[3,9],patent:[120,168],desc:'Slow, expensive, brutal attrition — but blockbuster upside.'},
  {key:'device',name:'Medical Device', icon:'🩺',costMult:0.5,peak:[1.5,4],patent:[96,132],desc:'Cheaper and faster to clear, with a steadier, lower peak.'},
];
const PROG_TYPEBY={};PROGRAM_TYPES.forEach(t=>PROG_TYPEBY[t.key]=t);
const THERAPY_AREAS=['Oncology','Cardiology','Neurology','Immunology','Rare Disease','Metabolic','Infectious Disease','Orthopedics'];

function ensurePipeline(){if(!G.industry)G.industry={};if(!G.industry.pipeline)G.industry.pipeline={candidates:[],approved:[],reps:0,detail:0};const p=G.industry.pipeline;if(!p.candidates)p.candidates=[];if(!p.approved)p.approved=[];if(p.reps==null)p.reps=0;if(p.detail==null)p.detail=0;}
function pipeRndBonus(){const tb=G.techBonus||{};return clamp((tb.rndmult||0)*0.4 + (G.ops&&G.ops.caps?G.ops.caps.quality*0.01:0),0,0.25);}
function startProgram(typeKey,area){
  ensurePipeline();const t=PROG_TYPEBY[typeKey]||PROGRAM_TYPES[0];const co=pc();
  const ph=PIPE_PHASES[0];const cost=round1(rf(ph.cost[0],ph.cost[1])*t.costMult);
  if(co.cash<cost){toast('Insufficient cash',`Launching discovery costs $${money(cost)}M.`);return;}
  co.cash=round1(co.cash-cost);
  const months=ri(ph.months[0],ph.months[1]);
  const c={id:uid('cand'),type:typeKey,area,name:pipeName(area),phase:0,monthsLeft:months,totalMonths:months,
    monthlyCost:round1(cost/months),invested:cost,
    peakPotential:round1(rf(t.peak[0],t.peak[1])* (typeKey==='drug'?rf(40,140):rf(30,90)))};
  if(typeof pipelineAssignLead==='function')pipelineAssignLead(c);
  G.industry.pipeline.candidates.push(c);
  if(c.leadId&&typeof logCareer==='function')logCareer(c.leadId,`Took the helm of the ${c.name} ${t.name.toLowerCase()} program.`,'program',1);
  pushFeed('rnd',`${holdcoNameSafe()} begins ${t.name.toLowerCase()} discovery: ${c.name} (${area}).`,'neutral');
  toast(`${t.icon} Program started`,`${c.name} enters Discovery.`);
  recompute();render();
}
function holdcoNameSafe(){return (typeof holdcoName==='function'&&G.holdings&&G.holdings.founded)?holdcoName():pc().name;}
function pipeName(area){const pre=['Vela','Zyn','Cor','Neu','Onco','Immu','Cardi','Reva','Lumen','Axi','Nov','Tev'];const suf=['mab','nib','zumab','strel','dex','phor','via','genix','cel','dyne'];return pick(pre)+pick(suf)+' '+(['I','II','X','S','R','Z'][ri(0,5)]);}
function fieldForceFactor(){
  const p=G.industry.pipeline;const reps=p.reps||0;const detail=p.detail||0;
  // capture: reps drive reach, detailing budget amplifies — diminishing returns
  return clamp(0.2 + Math.log10(1+reps)*0.32 + Math.min(0.3,detail*0.02),0.2,1.0);
}
function tickPipeline(){
  ensurePipeline();const p=G.industry.pipeline;const co=pc();let prev=0;
  // candidates advance
  for(let i=p.candidates.length-1;i>=0;i--){
    const c=p.candidates[i];const ph=PIPE_PHASES[c.phase];
    if(c.monthlyCost){co.cash=round1(co.cash-c.monthlyCost);c.invested=round1(c.invested+c.monthlyCost);}
    c.monthsLeft--;
    if(c.monthsLeft<=0){
      const typeMod=c.type==='device'?0.08:0;
      const succ=clamp(ph.p+pipeRndBonus()+typeMod+(typeof synergy==='function'?synergy('ai_discovery'):0),0.05,0.95);
      if(!chance(succ)){
        pushFeed('rnd',`Setback: ${c.name} failed in ${ph.name}. $${money(c.invested)}M written off.`,'bad');
        toast('🧪 Trial failed',`${c.name} did not clear ${ph.name}.`);
        if(c.leadId&&typeof logCareer==='function')logCareer(c.leadId,`${c.name} failed to clear ${ph.name}.`,'failed',-4);
        p.candidates.splice(i,1);continue;
      }
      if(c.phase>=PIPE_PHASES.length-1){
        // approved!
        const t=PROG_TYPEBY[c.type];
        p.approved.push({id:c.id,name:c.name,type:c.type,area:c.area,peak:c.peakPotential,sales:0,
          patentLeft:ri(t.patent[0],t.patent[1]),stage:'ramp',leadId:c.leadId});
        pushFeed('rnd',`APPROVED: ${c.name} clears FDA review and goes to market. Peak potential $${money(c.peakPotential)}M/yr.`,'good');
        toast('✅ Approved',`${c.name} is on the market.`);
        if(c.leadId&&typeof logCareer==='function')logCareer(c.leadId,`Led ${c.name} to FDA approval — a career milestone.`,'approved',11);
        _rep&&_rep(4);
        p.candidates.splice(i,1);continue;
      }
      // advance to next phase
      c.phase++;const np=PIPE_PHASES[c.phase];const months=ri(np.months[0],np.months[1]);const cost=round1(rf(np.cost[0],np.cost[1])*PROG_TYPEBY[c.type].costMult);
      c.monthsLeft=months;c.totalMonths=months;c.monthlyCost=round1(cost/months);
      pushFeed('rnd',`${c.name} advances to ${np.name}.`,'good');
    }
  }
  // approved products: ramp via field force, then patent cliff
  const ff=fieldForceFactor();let prevAnnual=0;
  p.approved.forEach(a=>{
    const target=a.peak*ff;
    if(a.patentLeft>0){
      if(a.sales<target){a.sales=round1(a.sales+(target-a.sales)*0.06+0.2);a.stage='ramp';}
      else {a.sales=round1(target);a.stage='peak';}
      a.patentLeft--;
      if(a.patentLeft<=0)a.stage='cliff';
    }else{
      a.sales=round1(a.sales*0.93);a.stage='decline';   // generics / off-patent erosion
    }
    co.cash=round1(co.cash+(a.sales/12)*(typeof industryNetMult==='function'?industryNetMult('health'):1));
    prevAnnual+=a.sales;
  });
  // field force cost
  const repCost=round1((p.reps||0)*0.012 + (p.detail||0)*0.1);
  if(repCost>0)co.cash=round1(co.cash-repCost);
  p._annualRev=round1(prevAnnual);p._ffCost=repCost;
  // prune dead products
  p.approved=p.approved.filter(a=>!(a.stage==='decline'&&a.sales<0.3));
}
function hireReps(n){ensurePipeline();const p=G.industry.pipeline;p.reps=Math.max(0,(p.reps||0)+n);pushFeed('people',`Field force ${n>0?'expanded':'trimmed'} to ${units(p.reps)} reps.`,'neutral');recompute();render();}
function adjustDetail(delta){ensurePipeline();const p=G.industry.pipeline;p.detail=clamp((p.detail||0)+delta,0,20);recompute();render();}
function renderPipelineScreen(){
  ensurePipeline();const p=G.industry.pipeline;
  const head=panel('R&D Pipeline & Commercial',`
    <div class="g4">
      ${tile('Programs in Dev',units(p.candidates.length))}
      ${tile('Approved Products',units(p.approved.length),'gold')}
      ${tile('Pipeline Revenue','$'+money(p._annualRev||0)+'/yr','green')}
      ${tile('Field Capture',pct(fieldForceFactor()),fieldForceFactor()>0.6?'good':'')}
    </div>`,{right:btn('🧪 Start a program','pipestart',{},'primary sm')});

  // candidates
  let cand='';
  if(p.candidates.length){
    cand=`<div class="cand-list">${p.candidates.map(c=>{const ph=PIPE_PHASES[c.phase];const t=PROG_TYPEBY[c.type];const frac=clamp(1-c.monthsLeft/Math.max(1,c.totalMonths),0,1);const succ=Math.round(clamp(ph.p+pipeRndBonus(),0.05,0.95)*100);
      return `<div class="cand-card"><div class="cand-h"><span>${t.icon} ${esc(c.name)}</span><span class="cand-phase">${esc(ph.name)}</span></div>
      <div class="proj-sub">${esc(c.area)} · invested $${money(c.invested)}M · ${succ}% to clear</div>${(c.leadId&&typeof figChip==='function')?`<div class="fig-attach">${figChip(c.leadId,'Program lead')}</div>`:''}${bar(frac,frac>0.7?'good':'')}</div>`;}).join('')}</div>`;
  }else cand=`<div class="empty">No active programs. Start a drug or device program to build a pipeline.</div>`;
  const candidates=panel('Development Pipeline',cand,{right:`<span class="hint">Every phase has attrition — failures are sunk cost</span>`});

  // approved
  let appr='';
  if(p.approved.length){
    appr=`<div class="cand-list">${p.approved.map(a=>{const t=PROG_TYPEBY[a.type];const sTone=a.stage==='peak'?'good':a.stage==='decline'?'bad':a.stage==='cliff'?'warn':'';
      return `<div class="cand-card"><div class="cand-h"><span>${t.icon} ${esc(a.name)}</span><span class="rel-out ${sTone}">${a.stage}</span></div>
      <div class="proj-sub">${esc(a.area)} · $${money(a.sales)}M/yr of $${money(a.peak)}M peak · patent ${Math.max(0,Math.round(a.patentLeft/12))}y</div>${(a.leadId&&typeof figChip==='function')?`<div class="fig-attach">${figChip(a.leadId,'Discovered by')}</div>`:''}${bar(clamp(a.sales/Math.max(1,a.peak),0,1),sTone)}</div>`;}).join('')}</div>`;
  }else appr=`<div class="empty">No products on the market yet.</div>`;
  const approved=panel('On the Market',appr);

  // field force
  const fld=panel('Medical Field Force',`
    ${(typeof pipelineVpId==='function'&&typeof figChip==='function')?`<div class="fig-attach" style="margin-bottom:10px">${figChip(pipelineVpId(),'VP of Sales — heads the field force')}</div>`:''}
    <div class="g3">
      ${tile('Sales Reps',units(p.reps||0))}
      ${tile('Detailing Budget','$'+money(p.detail||0)+'M/mo')}
      ${tile('Monthly Cost','$'+money(p._ffCost||0))}
    </div>
    <div class="btnrow" style="margin-top:10px;gap:6px;flex-wrap:wrap">
      ${btn('+25 reps','piperephire',{n:25},'ghost sm')}${btn('+100 reps','piperephire',{n:100},'ghost sm')}${btn('−50 reps','piperephire',{n:-50},'ghost sm')}
      ${btn('Detailing +','pipedetail',{delta:1},'ghost sm')}${btn('Detailing −','pipedetail',{delta:-1},'ghost sm')}
    </div>
    <div class="hint" style="margin-top:8px">Reps and detailing determine how much of each approved product's peak you actually capture — and how fast. Science gets you approved; the field force turns it into revenue.</div>`);

  return head+candidates+approved+fld;
}
function openProgramModal(){
  ensurePipeline();
  const types=PROGRAM_TYPES.map(t=>`<option value="${t.key}">${t.icon} ${esc(t.name)} — ${esc(t.desc)}</option>`).join('');
  const areas=THERAPY_AREAS.map(a=>`<option value="${a}">${a}</option>`).join('');

/* ============================================================
   FINANCE — CAPITAL & THE CYCLE
   No products. You run a balance sheet: deploy capital, raise
   outside money (AUM), choose leverage and risk appetite, and
   ride the credit cycle. Booms reward leverage; a crisis can
   blow up an aggressive book.
   ============================================================ */
const FIN_YIELDS={bank:0.065,invbank:0.11,asset:0.095,payments:0.105,insurance:0.075,crypto:0.16};
const FIN_CYCLE=[
  {key:'boom',  label:'Boom',       tone:'good', yieldMod:0.03, lossMod:0.5},
  {key:'stable',label:'Stable',     tone:'',     yieldMod:0.0,  lossMod:1.0},
  {key:'tight', label:'Tightening', tone:'warn', yieldMod:-0.01,lossMod:1.8},
  {key:'crisis',label:'Crisis',     tone:'bad',  yieldMod:-0.04,lossMod:4.2},
];
const FIN_CYBY={};FIN_CYCLE.forEach(c=>FIN_CYBY[c.key]=c);
function ensureFinance(){if(!G.industry)G.industry={};if(!G.industry.finance)G.industry.finance={deployed:0,aum:0,leverage:1,risk:35,cycle:'stable',cycleMo:0,lifetimePnl:0};const f=G.industry.finance;['deployed','aum','lifetimePnl'].forEach(k=>{if(f[k]==null)f[k]=0;});if(f.leverage==null)f.leverage=1;if(f.risk==null)f.risk=35;if(!f.cycle)f.cycle='stable';}
function finBaseYield(){const sk=(typeof industrySectorKey==='function')?industrySectorKey('finance'):(G.divisions[0]||{}).sectorKey;return FIN_YIELDS[sk]||0.085;}
function finCycleObj(){ensureFinance();return FIN_CYBY[G.industry.finance.cycle]||FIN_CYBY.stable;}
function finEffectiveBook(){const f=G.industry.finance;return f.deployed*f.leverage+f.aum;}
function finNetYield(){const f=G.industry.finance;const cyc=finCycleObj();return finBaseYield()+ (f.risk/100)*0.08 + cyc.yieldMod;}
function deployCapital(amt){ensureFinance();const f=G.industry.finance;const co=pc();amt=amt==='all'?Math.max(0,co.cash-1):round1(amt);amt=Math.min(amt,Math.max(0,co.cash-0.5));if(amt<=0){toast('No cash to deploy','');return;}f.deployed=round1(f.deployed+amt);co.cash=round1(co.cash-amt);pushFeed('money',`Deployed $${money(amt)}M into the book.`,'neutral');recompute();render();}
function withdrawCapital(amt){ensureFinance();const f=G.industry.finance;const co=pc();amt=amt==='all'?f.deployed:Math.min(round1(amt),f.deployed);if(amt<=0)return;f.deployed=round1(f.deployed-amt);co.cash=round1(co.cash+amt);pushFeed('money',`Pulled $${money(amt)}M of capital back to the treasury.`,'neutral');recompute();render();}
function setLeverage(x){ensureFinance();G.industry.finance.leverage=clamp(+x,1,5);pushFeed('money',`Leverage set to ${(+x).toFixed(1)}×.`,'neutral');recompute();render();}
function setRisk(delta){ensureFinance();G.industry.finance.risk=clamp(G.industry.finance.risk+(+delta||0),0,100);render();}
function raiseFund(){
  ensureFinance();const f=G.industry.finance;const rep=pc().reputation||50;const track=clamp(f.lifetimePnl,0,500);
  const raise=round1((20+rep*1.5+track*0.3)*rf(0.7,1.4));
  f.aum=round1(f.aum+raise);
  pushFeed('money',`Raised $${money(raise)}M of outside capital — AUM now $${money(f.aum)}M. You earn fees and carry on it.`,'good');
  toast('💰 Fund raised',`+$${money(raise)}M AUM`);
  render();
}
function tickFinance(){
  ensureFinance();const f=G.industry.finance;const co=pc();
  // cycle drift, nudged by macro
  f.cycleMo=(f.cycleMo||0)+1;
  if(f.cycleMo>=ri(8,18)){
    f.cycleMo=0;const mg=(G.macro&&G.macro.growth)||1;
    const r=Math.random()+(mg-1)*1.5;
    f.cycle = r>1.0?'boom': r>0.5?'stable': r>0.15?'tight':'crisis';
  }
  const cyc=finCycleObj();const eff=finEffectiveBook();
  if(eff<=0){f._mpnl=0;return;}
  const income=eff*finNetYield()/12;
  const fundingCost=f.deployed*(f.leverage-1)*((G.macro&&G.macro.rates)||0.05)/12;
  const lossRate=(0.012 + (f.risk/100)*0.06 + (f.leverage-1)*0.012)*cyc.lossMod;
  let losses=eff*lossRate/12;
  const fees=f.aum*0.02/12;
  const carry=Math.max(0,income*0.12);
  let net=round1(income-fundingCost-losses+fees+carry);
  co.cash=round1(co.cash+net*(typeof industryNetMult==='function'?industryNetMult('finance'):1));
  f.lifetimePnl=round1((f.lifetimePnl||0)+net);
  f._mpnl=net;f._income=round1(income);f._losses=round1(losses);
  // blow-up risk: aggressive + leveraged + crisis
  if(cyc.key==='crisis'&&f.leverage>=3&&f.risk>60&&chance(0.12)){
    const hit=round1(f.deployed*rf(0.15,0.35));
    co.cash=round1(co.cash-hit);f.deployed=round1(Math.max(0,f.deployed-hit*0.5));f.leverage=Math.max(1,f.leverage-1);
    pushFeed('money',`The book took a $${money(hit)}M hit in the downturn — forced to deleverage.`,'bad');
    toast('📉 Drawdown',`A leveraged bet blew up: −$${money(hit)}M.`);
  }
}

  const risk=panel('Leverage &amp; Risk',`

    <div class="wf-row"><span class="wf-l">Risk appetite</span><span class="agectl">${btn('−','finrisk',{delta:-10},'ghost sm')}<span class="wf-ot">${f.risk}</span>${btn('+','finrisk',{delta:10},'ghost sm')}</span><span class="wf-bar">${bar(f.risk/100,f.risk>70?'bad':f.risk>40?'warn':'good')}</span></div>
    <div class="hint" style="margin-top:6px">Higher leverage and risk lift returns in good times and magnify losses in bad ones. Stay liquid before a crisis.</div>`);

  const fund=panel('Asset Management',`
    <div class="g2">${tile('AUM','$'+money(f.aum))}${tile('Fees + carry','~2% + 12%')}</div>
    <div class="btnrow" style="margin-top:10px">${btn('Raise a fund','finraise',{},'primary block sm')}</div>
    <div class="hint" style="margin-top:6px">Raising outside capital grows the book without risking your own — you earn management fees and carry. Bigger track record raises more.</div>`);
