/* ---------- global click + input wiring ---------- */
function wireEvents(){
  document.body.addEventListener('click',e=>{
    const t=e.target.closest('[data-act]'); if(!t)return;
    if(t.tagName==='INPUT'&&t.type==='range')return;
    dispatch(t.getAttribute('data-act'),dataset(t),t);
  });
  document.body.addEventListener('input',e=>{
    const t=e.target.closest('[data-act]'); if(!t)return;
    if(t.tagName==='INPUT'||t.tagName==='SELECT'){
      dispatch(t.getAttribute('data-act'),dataset(t),t);
    }
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&UI.modalStack.length)closeModal();
    if(e.key===' '&&!UI.modalStack.length&&G.started&&!isTyping(e)){e.preventDefault();setSpeed(UI.speed?0:1);}
  });
}
function isTyping(e){const n=e.target.tagName;return n==='INPUT'||n==='TEXTAREA'||n==='SELECT';}
function dataset(el){const o={};for(const a of el.attributes){if(a.name.startsWith('data-')&&a.name!=='data-act')o[a.name.slice(5)]=a.value;}return o;}

/* A titled card container. */
function panel(title,body,opts){
  opts=opts||{};

  const ttl=title?`<div class="cardttl"><span>${esc(title)}</span>${right}</div>`:'';
  return `<div class="card ${opts.cls||''}">${ttl}${body}</div>`;
}

/* Two-column key/value ledger row used in statements. */
function ledgerRow(label,value,cls){

}

/* Render a labeled progress meter with a numeric caption. */
function meter(label,frac,caption,tone){
  frac=clamp(frac,0,1);
  return `<div class="meterblock">
    <div class="meterhead"><span class="mlbl">${esc(label)}</span><span class="mcap ${tone||''}">${caption!=null?caption:pct(frac)}</span></div>

/* Small stat tile with label over value. */
function tile(label,value,tone,sub){
  return `<div class="subtile">
    <div class="lbl">${esc(label)}</div>

/* A clickable list row representing an entity (division/product/rival/person). */
function entityRow(opts){
  // opts: {act, args, icon, iconColor, title, subtitle, metrics:[{label,value,tone}], right}
  const a=opts.args?Object.entries(opts.args).map(([k,v])=>`data-${k}="${esc(String(v))}"`).join(' '):'';
  const ic=opts.icon?`<div class="erow-ic" style="--ic:${opts.iconColor||'var(--gold)'}">${opts.icon}</div>`:'';
  const mets=(opts.metrics||[]).map(m=>`<div class="erow-met"><span class="em-l">${esc(m.label)}</span><span class="em-v ${m.tone||''}">${m.value}</span></div>`).join('');
  return `<div class="erow ${opts.cls||''}" ${opts.act?`data-act="${opts.act}" ${a}`:''} role="button">

    </div>
    <div class="erow-mets">${mets}</div>
    ${opts.right?`<div class="erow-right">${opts.right}</div>`:''}
  </div>`;
}

/* A data table from headers + rows (rows are arrays of html cells). */
function dataTable(headers,rows,opts){
  opts=opts||{};
  const th=headers.map((h,i)=>`<th class="${opts.align&&opts.align[i]==='r'?'tright':''}">${h}</th>`).join('');
  const tr=rows.map(r=>{
    const attrs=r._attrs||'';
    const cells=(r.cells||r).map((c,i)=>`<td class="${opts.align&&opts.align[i]==='r'?'tright':''}">${c}</td>`).join('');
    return `<tr ${attrs}>${cells}</tr>`;
  }).join('');
  return `<table class="tbl ${opts.cls||''}"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}

/* A donut/pie composition from segments [{label,value,color}]. */
function donut(segments,size,thickness){
  size=size||120;thickness=thickness||16;
  const total=segments.reduce((a,s)=>a+Math.max(0,s.value),0)||1;
  const r=(size-thickness)/2;const cx=size/2,cy=size/2;const circ=2*Math.PI*r;
  let off=0;
  const arcs=segments.map(s=>{
    const frac=Math.max(0,s.value)/total;
    const len=frac*circ;
    const dash=`${len.toFixed(2)} ${(circ-len).toFixed(2)}`;
    const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}" stroke-dasharray="${dash}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len;
    return el;
  }).join('');
  return `<svg class="donut" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}</svg>`;
}

/* Legend for donut/segments. */
function legend(segments){
  return `<div class="legend">${segments.map(s=>`<div class="leg"><span class="lswatch" style="background:${s.color}"></span><span class="lname">${esc(s.label)}</span><span class="lval">${s.cap||''}</span></div>`).join('')}</div>`;
}

/* Multi-series line chart (history). series:[{key,color,label}], data:[{...}] */
function lineChart(data,series,opts){
  opts=opts||{};
  const w=opts.w||640,h=opts.h||220,pad=opts.pad||{l:54,r:14,t:14,b:24};
  if(!data||data.length<2)return `<div class="empty">Not enough history yet.</div>`;
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  let mn=Infinity,mx=-Infinity;
  data.forEach(d=>series.forEach(s=>{const v=d[s.key];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v;}}));
  if(opts.zero)mn=Math.min(mn,0);
  if(mn===Infinity){mn=0;mx=1;}
  if(mn===mx){mx=mn+1;}
  const rng=mx-mn;
  const X=i=>pad.l+(i/(data.length-1))*iw;
  const Y=v=>pad.t+ih-((v-mn)/rng)*ih;
  // gridlines
  let grid='';const gl=4;
  for(let g=0;g<=gl;g++){const val=mn+(rng*g/gl);const y=Y(val);
    grid+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${w-pad.r}" y2="${y.toFixed(1)}" class="cgrid"/>`;
    grid+=`<text x="${pad.l-6}" y="${(y+3).toFixed(1)}" class="caxis" text-anchor="end">${opts.fmt?opts.fmt(val):money0(val)}</text>`;
  }
  const lines=series.map(s=>{
    const pts=data.map((d,i)=>d[s.key]!=null?`${X(i).toFixed(1)},${Y(d[s.key]).toFixed(1)}`:null).filter(Boolean).join(' ');
    return `<polyline fill="none" stroke="${s.color}" stroke-width="2" points="${pts}"/>`;
  }).join('');
  const leg=series.length>1?`<div class="chartleg">${series.map(s=>`<span class="cl"><span class="cld" style="background:${s.color}"></span>${esc(s.label)}</span>`).join('')}</div>`:'';
  return `${leg}<svg class="linechart" width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${grid}${lines}</svg>`;
}

/* Horizontal bar comparison. items:[{label,value,color,cap}] */
function hBars(items,opts){
  opts=opts||{};
  const mx=Math.max(...items.map(i=>i.value),opts.max||0,0.0001);
  return `<div class="hbars">${items.map(it=>`
    <div class="hbar">
      <span class="hb-l">${esc(it.label)}</span>
      <span class="hb-track"><span class="hb-fill" style="width:${(it.value/mx*100).toFixed(1)}%;background:${it.color||'var(--gold)'}"></span></span>
      <span class="hb-v ${it.tone||''}">${it.cap!=null?it.cap:money(it.value)}</span>
    </div>`).join('')}</div>`;
}

/* Region label + flag-ish glyph. */
function regionName(key){return (REGIONS[key]&&REGIONS[key].short)||key;}
function regionFull(key){return (REGIONS[key]&&REGIONS[key].name)||key;}

/* Tone helper for numbers. */
function toneOf(v){return v>0?'good':v<0?'bad':'';}
function arrow(v){return v>0?'▲':v<0?'▼':'■';}

/* Format a delta vs previous value as a small badge. */
function deltaBadge(cur,prev,fmt){
  if(prev==null||prev===0)return '';
  const d=(cur-prev)/Math.abs(prev);
  const cls=d>0?'up':d<0?'down':'';
  return `<span class="kpi-trend ${cls}">${arrow(d)} ${pct(Math.abs(d))}</span>`;
}

/* Stars rating out of 5 from a 0..100 number. */
function stars(v){
  const n=Math.round(clamp(v,0,100)/20);
  let s='';for(let i=0;i<5;i++)s+=i<n?'★':'☆';
  return `<span class="stars">${s}</span>`;
}

/* Format a quality/brand chip with tone. */
function qualityChip(v,label){
  const tone=v>=70?'good':v>=40?'':'bad';
  return `<span class="chip ${tone}">${esc(label||'Q')} ${Math.round(v)}</span>`;
}

/* Tiny inline character portrait (canvas placeholder rendered after). */
let _portraitQueue=[];
function charAvatar(c,size){

  if(!c)return `<div class="cavatar" style="width:${size}px;height:${size}px"></div>`;
  const id='pa_'+c.id+'_'+(_portraitQueue.length);

}
/* After DOM render, paint queued avatars. */
function flushPortraits(){
  _portraitQueue.forEach(q=>{
    const el=document.getElementById(q.id);
    const c=G.chars[q.charId];
    if(el&&c)drawPortrait(el,c);
  });
  _portraitQueue=[];
}

/* Render the activity feed (n items). */
function renderFeed(n){
  const items=(G.feed||[]).slice(0,n||20);
  if(!items.length)return emptyState('No activity yet.');
  return `<div class="feed">${items.map(f=>{
    const cls='f-'+(f.cat||'world');
    const toneCls=f.tone==='good'?'good':f.tone==='bad'?'bad':'';
    return `<div class="feeditem ${cls}"><span class="fdate">${esc(f.date||'')}</span><span class="ftext ${toneCls}">${esc(f.text)}</span></div>`;
  }).join('')}</div>`;
}

SCREENS.products=function(){
  const prods=allProducts();
  const totRev=prods.reduce((a,p)=>a+(p.perf&&p.perf.rev||0),0);
  const totUnits=prods.reduce((a,p)=>a+(p.perf&&p.perf.units||0),0);
  const totGross=prods.reduce((a,p)=>a+(p.perf&&p.perf.gross||0),0);

  const head=panel('Product Portfolio',`
    <div class="g4">
      ${tile('Active Products',prods.length)}
      ${tile('Total Revenue','$'+money(totRev))}
      ${tile('Gross Profit','$'+money(totGross),toneOf(totGross))}
      ${tile('Total Units',units(totUnits))}
    </div>
  `,{right:G.divisions.length?btn('+ Launch Product','newprod',{div:G.divisions[0].id},'primary sm'):''});

  if(!prods.length){
    return head+panel('Products',emptyState(G.divisions.length?'No products yet. Launch one inside a division.':'Found a division first, then launch products.'));
  }

  // sortable table
  const sortKey=UI.sort.products||'rev';
  const rows=prods.map(p=>{
    const d=divById(p.divId);const sec=SECTORBY[p.sectorKey];
    const perf=p.perf||{};
    const margin=perf.margin||0;
    const opMargin=perf.rev>0?(perf.gross-p.mktInvest-p.rndInvest)/perf.rev:0;
    return {
      _attrs:`data-act="openprod" data-id="${p.id}" role="button" class="clickrow"`,
      rev:perf.rev||0,units:perf.units||0,quality:p.quality,share:perf.share||0,margin,
      cells:[
        `<div class="prodcell"><span class="pdot" style="--pc:${sec.color}"></span><div><div class="pname">${esc(p.name)}</div><div class="psub">${esc(sec.name)} · ${esc(d?d.name:'')}</div></div></div>`,
        qualityChip(p.quality,'Q'),
        Math.round(p.priceIdx)+'',
        pct(perf.share||0),
        '$'+money(perf.rev||0),
        '$'+money(perf.gross||0),
        `<span class="${margin>0.3?'good':margin<0?'bad':''}">${pct(margin)}</span>`,
        units(perf.units||0),
      ]
    };
  }).sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));

  const tbl=dataTable(
    ['Product','Quality','Price','Share','Revenue','Gross','Margin','Units'],
    rows,
    {align:['l','l','r','r','r','r','r','r'],cls:'prodtbl'}
  );

  // best/worst callouts
  const sorted=[...prods].sort((a,b)=>(b.perf&&b.perf.gross||0)-(a.perf&&a.perf.gross||0));
  const best=sorted[0],worst=sorted[sorted.length-1];
  const callouts=`<div class="g2">
    ${panel('Top Performer',best?`<div class="callout"><div class="co-name">${esc(best.name)}</div><div class="co-stat good">$${money(best.perf&&best.perf.gross||0)} gross / mo</div><div class="hint">${pct(best.perf&&best.perf.margin||0)} margin · ${pct(best.perf&&best.perf.share||0)} share</div></div>`:emptyState('—'))}
    ${panel('Needs Attention',worst&&worst!==best?`<div class="callout"><div class="co-name">${esc(worst.name)}</div><div class="co-stat ${(worst.perf&&worst.perf.gross||0)<0?'bad':''}">$${money(worst.perf&&worst.perf.gross||0)} gross / mo</div><div class="hint">Consider repricing, R&D, or discontinuation.</div></div>`:emptyState('All products healthy.'))}
  </div>`;

  return head+callouts+panel('All Products',tbl);
};

    return `<div class="card marketcard">
      <div class="cardttl"><span>${esc(sec.name)} · ${regionFull(rg)}</span><span class="hint">TAM $${money0(tam)}/yr</span></div>
      <div class="row" style="gap:6px;margin-bottom:8px">
        ${pill('Your share '+pct(myShare),myShare>0.3?'good':'')}

      </div>
      ${hBars(segs,{max:Math.max(...segs.map(s=>s.value),0.2)})}

  // sector explorer — all sectors with entry hints
  const explorer=panel('Sector Explorer',`

    <div class="g2">
      ${INDUSTRIES.map(ind=>{
        const secs=sectorsOf(ind.key);
        const unlocked=unlockedSectors();
        return `<div class="indblock">
          <div class="indblock-h" style="--ic:${ind.color}">${ind.glyph} ${esc(ind.name)} <span class="dim">${indMacroLabel(ind.key)}</span></div>
          <div class="sectorchips">${secs.map(s=>{
            const isOpen=unlocked.has(s.key);
            return `<span class="schip ${isOpen?'':'locked'}" title="${esc(s.name)}">${esc(s.name)} ${isOpen?'':'🔒'}</span>`;
          }).join('')}</div>
        </div>`;
      }).join('')}
    </div>
  `);

  return head+`<div class="marketgrid">${blocks}</div>`+explorer;
};

function indMacroLabel(indKey){
  const v=(G.indMacro&&G.indMacro[indKey])||1;
  const tone=v>=1.1?'good':v<=0.9?'bad':'dim';
  return `<span class="${tone}">${v>=1?'+':''}${pct(v-1)}</span>`;
}

SCREENS.rnd=function(){
  const bank=G.rndBank||0;
  const perMo=G.fin.rndPoints||0;
  const unlocked=G.tech.unlocked||[];

  const head=panel('Research & Development',`
    <div class="g4">
      ${tile('R&D Bank',Math.round(bank)+' pts','gold')}
      ${tile('Generation','+'+Math.round(perMo)+' / mo',perMo>0?'good':'')}
      ${tile('Unlocked',unlocked.length+' / '+TECH_TREE.length)}
      ${tile('Researchers',units(researchHeadcount()))}
    </div>
    <div class="hint" style="margin-top:8px">R&D points come from your Research staff, product R&D budgets, and division research budgets. Spend them on the tree below to unlock permanent bonuses and new sectors.</div>
  `);

  // branch columns
  const branches=Object.keys(TECH_BRANCHES);
  const cols=branches.map(br=>{
    const nodes=TECH_TREE.filter(t=>t.branch===br).sort((a,b)=>a.tier-b.tier);
    const owned=nodes.filter(n=>unlocked.includes(n.id)).length;
    const cards=nodes.map(n=>{
      const isOwned=unlocked.includes(n.id);
      const canDo=canResearch(n);
      const prereqOk=techPrereqsMet(n);
      let stateCls=isOwned?'owned':canDo?'avail':prereqOk?'tooexp':'locked';
      const eff=Object.entries(n.eff||{}).map(([k,v])=>effLabel(k,v)).filter(Boolean).join(' · ');
      return `<div class="technode ${stateCls}" data-act="techinfo" data-key="${n.id}" role="button">
        <div class="tn-head">
          <span class="tn-tier">T${n.tier}</span>
          <span class="tn-name">${esc(n.name)}</span>
          ${isOwned?'<span class="tn-check">✓</span>':`<span class="tn-cost ${canDo?'good':''}">${n.cost}</span>`}
        </div>
        <div class="tn-desc">${esc(n.desc)}</div>
        ${n.unlock?`<div class="tn-unlock">🔓 Unlocks: ${n.unlock.map(s=>SECTORBY[s]?SECTORBY[s].name:s).join(', ')}</div>`:''}
        ${!isOwned&&canDo?`<div class="tn-action">${btn('Research ('+n.cost+')','research',{key:n.id},'primary block sm')}</div>`:''}
        ${!isOwned&&!prereqOk?`<div class="tn-locked">Requires earlier ${TECH_BRANCHES[br]} tech</div>`:''}
      </div>`;
    }).join('');
    return `<div class="techcol">
      <div class="techcol-head">${esc(TECH_BRANCHES[br])} <span class="dim">${owned}/${nodes.length}</span></div>
      ${cards}
    </div>`;
  }).join('');

  const tree=panel('Technology Tree',`<div class="techtree">${cols}</div>`);

  // active bonuses summary
  const tb=G.techBonus||{};
  const bonusItems=Object.entries(tb).map(([k,v])=>(v&&effLabel(k,v))?`<span class="chip">${effLabel(k,v)}</span>`:'').filter(Boolean).join('');
  const bonuses=panel('Active Tech Bonuses',bonusItems?`<div class="chiprow">${bonusItems}</div>`:emptyState('No technologies unlocked yet.'));

  return head+bonuses+tree;
};

function researchHeadcount(){let n=0;G.divisions.forEach(d=>n+=(d.employees&&d.employees.Research)||0);return n;}
function effLabel(k,v){
  const pctv=(x)=>(x>0?'+':'')+Math.round(x*100)+'%';
  const map={
    qcap:'+'+v+' quality cap',rndmult:pctv(v)+' R&D',brand:pctv(v)+' brand wt',network:'+'+v.toFixed(2)+' network',
    cost:pctv(v)+' unit cost',cap:pctv(v)+' capacity',shock:pctv(v)+' shock',launch:pctv(v)+' launch cost',
    margin:'+'+v.toFixed(2)+' margin cap',mktmult:pctv(v)+' marketing',organic:pctv(v)+' organic',
    branddecay:pctv(v)+' brand decay',churn:pctv(v)+' churn',elastic:'+'+v.toFixed(2)+' pricing power',
    sga:pctv(v)+' SG&A',acqcost:pctv(v)+' acq cost',integration:pctv(v)+' integration',rate:pctv(v)+' rates',
    yield:pctv(v)+' cash yield',tax:Math.round(v*100)+'pt tax',multiple:'+'+v.toFixed(1)+' val mult',
    raise:pctv(v)+' raises',synergy:pctv(v)+' synergy',board:pctv(v)+' board',breakthrough:'breakthroughs',variance:'variance'
  };
  return map[k]||'';
}

        {label:'Founder/Family',value:fam,color:'var(--gold)'},

        {label:'Public float',value:co.publicShares||0,color:'var(--teal)'},

      <div style="flex:1">${legend([
        {label:'You & family',color:'var(--gold)',cap:pct(famPct)},
        {label:'Investors',color:'var(--blue)',cap:pct(co.shares?(co.investorShares||0)/co.shares:0)},

function assetsBookValue(){let v=0;G.divisions.forEach(d=>(d.facilities||[]).forEach(f=>v+=f.value||0));return v;}
function estCapex(){return 0;}
function runwayLabel(co,fin){
  const burn=-(fin.net||0);
  if(burn<=0)return '<span class="good">Profitable — indefinite</span>';
  const months=co.cash/burn;
  if(months<0)return '<span class="bad">Already negative</span>';
  if(months<6)return `<span class="bad">${months.toFixed(1)} months</span>`;
  if(months<18)return `<span class="orange">${months.toFixed(1)} months</span>`;
  return `<span class="good">${months.toFixed(0)}+ months</span>`;
}

SCREENS.deals=function(){
  const co=pc();
  const rivals=(G.rivalCos||[]).filter(r=>r.alive);
  updateRivalValuations();
  rivals.sort((a,b)=>b.valuation-a.valuation);

  const head=panel('Mergers & Acquisitions',`
    <div class="g4">
      ${tile('Acquisitions',(G.stats&&G.stats.acquisitions)||0)}
      ${tile('War Chest','$'+money(co.cash))}
      ${tile('Stock Currency',co.public?'Available':'IPO first',co.public?'good':'dim')}
      ${tile('Targets',rivals.length)}
    </div>
    <div class="hint" style="margin-top:8px">Acquiring a rival folds its operations into a new division. Cash deals always work; stock deals require being public. A 30% premium is typical; hostile takeovers cost more but work on public targets.</div>
  `);

  // affordable vs aspirational
  const targets=rivals.map(r=>{
    const price=round1((r.valuation||rivalValuation(r))*1.3);
    const canCash=co.cash>=price;
    const canStock=co.public;
    const affordable=canCash||canStock;
    return {r,price,affordable,canCash};
  });
  const sortedT=targets.sort((a,b)=>(b.affordable-a.affordable)||(a.price-b.price));

  const rows=sortedT.map(({r,price,affordable,canCash})=>{
    return entityRow({
      act:'openrival',args:{id:r.id},
      icon:r.logo&&r.logo.glyph||'◆',iconColor:rivalColor(r),
      title:r.name,
      subtitle:`${indTag(r.indKey)} ${r.public?pill('Public'):''} ${tag(r.presences.length+' markets')}`,
      metrics:[
        {label:'Valuation',value:'$'+money(r.valuation||0)},
        {label:'Revenue/yr',value:'$'+money((r.revenue||0)*12)},
        {label:'Buy ~',value:'$'+money(price),tone:affordable?'good':'dim'},
      ],
      right:affordable?btn('Acquire','acquire',{id:r.id},'primary sm'):pill('Too big','dim')
    });
  }).join('');

  const list=panel('Acquisition Targets',rivals.length?`<div class="erows">${rows}</div>`:emptyState('No rival companies remain.'));

  return head+list;
};

/* ---------- PRODUCT MODAL ---------- */
function openProductModal(id){ openModal(productModalBody(id),{cls:'wide'}); }
function refreshProductModal(id){ refreshModal(productModalBody(id)); }
function productModalBody(id){
  const p=prodById(id);if(!p)return emptyState('Product not found.');
  const sec=SECTORBY[p.sectorKey];const d=divById(p.divId);
  const perf=p.perf||{};

  const hdr=`<div class="modal-hd">
    <div class="mh-ic" style="--ic:${sec.color}">◆</div>
    <div class="mh-tt"><div class="mh-name">${esc(p.name)}</div><div class="mh-sub">${esc(sec.name)} · ${esc(d?d.name:'')}</div></div>
  </div>`;

  const stats=`<div class="g4">
    ${tile('Revenue','$'+money(perf.rev||0))}
    ${tile('Gross','$'+money(perf.gross||0),toneOf(perf.gross))}
    ${tile('Margin',pct(perf.margin||0),(perf.margin||0)>0.3?'good':(perf.margin||0)<0?'bad':'')}
    ${tile('Units',units(perf.units||0))}
  </div>
  <div class="g2" style="margin-top:8px">
    ${meter('Quality',p.quality/100,Math.round(p.quality)+' / 100',p.quality>60?'good':'')}
    ${meter('Brand',p.brand/100,Math.round(p.brand)+' / 100')}
  </div>`;

  // pricing
  const elasticDesc=sec.elastic>0.5?'High price sensitivity':sec.elastic>0.35?'Moderate sensitivity':'Low sensitivity';
  const pricing=`<div class="sectionttl"><span>Pricing</span><span class="hint">${elasticDesc}</span></div>
    <div class="statrow"><span class="k">Price index</span><span class="v gold" id="priceLbl_${p.id}">${Math.round(p.priceIdx)} ${p.priceIdx>100?'(premium)':p.priceIdx<100?'(discount)':'(neutral)'}</span></div>
    <input class="range" type="range" min="40" max="200" step="1" value="${Math.round(p.priceIdx)}" data-act="setprice" data-id="${p.id}"/>
    <div class="hint">Effective price ≈ $${(sec.arpu*p.priceIdx/100).toFixed(0)}/${sec.unit}/yr. Higher prices boost margin but cost you volume & share.</div>`;

  // investment sliders
  const invest=`<div class="sectionttl"><span>Investment</span></div>
    <div class="statrow"><span class="k">Marketing</span><span class="v" id="mktLbl_${p.id}">$${money(p.mktInvest)}M/mo</span></div>
    <input class="range" type="range" min="0" max="30" step="0.5" value="${p.mktInvest}" data-act="setpinv" data-id="${p.id}" data-field="mktInvest"/>
    <div class="statrow"><span class="k">R&D</span><span class="v" id="rndLbl_${p.id}">$${money(p.rndInvest)}M/mo</span></div>
    <input class="range" type="range" min="0" max="30" step="0.5" value="${p.rndInvest}" data-act="setpinv" data-id="${p.id}" data-field="rndInvest"/>
    <div class="hint">Marketing builds brand & awareness. R&D raises quality toward the sector & tech ceiling.</div>`;

  // region performance / toggles
  const regionRows=REGION_KEYS.map(rg=>{
    const live=p.launchedRegions.includes(rg);
    const rp=perf.byRegion&&perf.byRegion[rg];
    return `<div class="regionrow ${live?'live':''}">
      <span class="rr-name">${regionFull(rg)}</span>
      ${live&&rp?`<span class="rr-stat">${pct(rp.share)} share · $${money(rp.rev)}${rp.capped?' ⚠cap':''}</span>`:'<span class="rr-stat dim">not present</span>'}
      <span class="rr-act">${btn(live?'Exit':'Launch','toggleregion',{id:p.id,region:rg},live?'ghost xs':'primary xs')}</span>
    </div>`;
  }).join('');
  const regions=`<div class="sectionttl"><span>Regional Presence</span></div><div class="regionlist">${regionRows}</div>
    <div class="hint">Launching in a new region opens that market but adds competition & operating cost.</div>`;

  const danger=`<div class="modal-footer">${btn('Discontinue Product','discprod',{id:p.id},'danger sm')}</div>`;

  return hdr+stats+`<div class="modal-cols"><div class="mcol">${pricing}${invest}</div><div class="mcol">${regions}</div></div>`+danger;
}

/* ---------- NEW GAME ---------- */
function newGame(){
  const s=UI.setup||(initSetupState(),UI.setup);
  const seed=(Date.now()^(Math.random()*1e9))>>>0;
  RNG=rngFrom(seed);

  G={
    seed,month:0,year:2025,turn:0,generation:1,
    difficulty:s.diff,
    chars:{},divisions:[],products:{},rivalCos:[],execs:[],
    tech:{unlocked:[]},rndBank:0,loans:[],
    assets:[],teams:[],
    feed:[],history:[],achieved:{},stats:{acquisitions:0},
    personalCash:0,pendingEvent:null,
    macro:{sentiment:1,growth:1,rates:0.045,baseRates:0.045,regime:null,regimeEnd:0},
    indMacro:{},
    bloodline:[],
    started:true,gameOver:false,
    ui:UI,
  };

  // founder
  const first=(s.first||'').trim()||(s.fem?pick(FIRST_F):pick(FIRST_M));
  const surname=(s.surname||'').trim()||pick(SURNAMES);
  s.app.fem=s.fem;
  const founder=makeCharacter({app:s.app,fem:s.fem,first,surname,name:first+' '+surname,
    stats:s.stats,traits:s.traits,age:s.age,power:0.6});
  founder.role='CEO';founder.gen=1;founder.family='blood';
  G.chars[founder.id]=founder;
  G.founderId=founder.id;G.ceoId=founder.id;
  G.bloodline=[founder.id];

  // spouse + one young heir so the dynasty is alive from day one
  const spouse=makeCharacter({age:clamp(founder.age+ri(-5,4),24,55),power:rf(0.35,0.75),fem:!s.fem});
  spouse.role='Spouse';spouse.spouseId=founder.id;founder.spouseId=spouse.id;founder.married=true;spouse.married=true;
  G.chars[spouse.id]=spouse;
  // children so the dynasty has a future heir
  const nKids=1+(chance(0.5)?1:0);
  for(let k=0;k<nKids;k++){
    const child=makeChild(founder,spouse);
    child.age=clamp(founder.age-24-k*ri(2,4),1,founder.age-18);
    G.chars[child.id]=child;G.bloodline.push(child.id);
  }

  // starting company
  const coName=(s.company||'').trim()||genCompanyName(s.ind);
  G.co=makeCompany({sectorKey:s.sectorKey,name:coName,hqCity:s.hqCity,cash:DIFFS[s.diff].startCash});

  // starting division + first product
  const startRegion=(CITYBY[s.hqCity]||{}).region||'na';
  const d=makeDivision({sectorKey:s.sectorKey,name:SECTORBY[s.sectorKey].name+' Division',hqRegion:startRegion});
  G.divisions.push(d);
  const p=makeProduct({divId:d.id,sectorKey:s.sectorKey,name:genProductName(s.sectorKey),
    quality:32,brand:8,priceIdx:100,launchedRegions:[startRegion]});
  G.products[p.id]=p;d.products.push(p.id);

  // seed rivals
  seedRivals();
  // seed sports teams
  seedTeams();
  // init macro & indices
  recomputeMacros();
  rebuildIndexes();
  recompute();
  updateRivalValuations();

  pushFeed('world',`${coName} is founded in ${(CITYBY[s.hqCity]||{}).name||'—'} by ${fullName(founder)}.`,'good');
  pushFeed('rnd',`First product ${p.name} ships to ${regionFull(startRegion)}.`,'neutral');
  recordHistory();
  autoSave();

  UI.tab='dashboard';
  render();
  toast('◈ Welcome to MOGUL',`Build ${coName} into a dynasty.`);
}

function seedRivals(){
  G.rivalCos=[];
  const n=28+ri(0,8);
  for(let i=0;i<n;i++){
    G.rivalCos.push(makeRival({big:chance(0.22)}));
  }
  // ensure a few giants in the player's own industry for rivalry
  const myInd=SECTORBY[G.divisions[0].sectorKey].ind;
  for(let i=0;i<3;i++){
    const sec=pick(sectorsOf(myInd));
    G.rivalCos.push(makeRival({big:true,sectorKey:sec.key}));
  }
  // initial revenue so valuations are meaningful
  G.rivalCos.forEach(r=>{
    r.revenue=r.scale*0.04*(r.presences.length)+ (r.quality+r.brand)/40;
    r.valuation=rivalValuation(r);
  });
}

function seedTeams(){
  G.teams=[];
  const used={};
  LEAGUES.forEach(lg=>{
    const count=lg.key==='fb'?6:5;
    for(let i=0;i<count;i++){
      const sc=pick(SPORT_CITIES);
      let mascot=pick(MASCOTS);let nm=sc.c+' '+mascot;let guard=0;
      while(used[nm]&&guard<20){mascot=pick(MASCOTS);nm=sc.c+' '+mascot;guard++;}
      used[nm]=1;
      const rating=ri(45,80);
      G.teams.push({id:uid('t'),name:nm,league:lg.key,city:sc.c,
        value:round1(lg.base*sc.m*rf(0.7,1.3)),payroll:round1(lg.base*0.18*rf(0.7,1.2)),
        rating,owned:false,wins:0,losses:0,titles:0,lastSeasonWinPct:0.5,playoffs:false});
    }
  });
}

/* ============================================================
   CODEX — an in-game encyclopedia and strategy manual.
   Navigable categories rendered into the Codex tab.
   ============================================================ */

const CODEX_CATS=[
  {key:'start',   icon:'🚀', label:'Getting Started'},
  {key:'loop',    icon:'🔄', label:'The Core Loop'},
  {key:'economy', icon:'📐', label:'Economy & P&L'},
  {key:'industries',icon:'🏭',label:'Industries'},
  {key:'regions', icon:'🌍', label:'Regions'},
  {key:'products',icon:'◆',  label:'Products & Pricing'},
  {key:'rnd',     icon:'⚛',  label:'R&D & Technology'},
  {key:'finance', icon:'$',  label:'Finance & Capital'},
  {key:'mna',     icon:'⇄',  label:'Mergers & Acquisitions'},
  {key:'people',  icon:'☗',  label:'People & Executives'},
  {key:'leaders', icon:'★',  label:'Leadership & Traits'},
  {key:'wealth',  icon:'♦',  label:'Wealth & Assets'},
  {key:'sports',  icon:'🏟️', label:'Sports Franchises'},
  {key:'dynasty', icon:'♔',  label:'Dynasty & Succession'},
  {key:'events',  icon:'⚡', label:'Events & Crises'},
  {key:'difficulty',icon:'⚙',label:'Difficulty & Macro'},
  {key:'glossary',icon:'❡',  label:'Glossary'},
];

/* prose paragraph helper */
function cxP(){return [].slice.call(arguments).map(p=>`<p class="cx-p">${p}</p>`).join('');}
function cxH(t){return `<h3 class="cx-h">${esc(t)}</h3>`;}
function cxTip(t){return `<div class="cx-tip"><span class="cx-tip-i">▲</span><span>${t}</span></div>`;}
function cxList(items){return `<ul class="cx-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;}

const CODEX_RENDER={
  start:()=>cxH('Welcome, Founder')+
    cxP(
      `<b>MOGUL — Dynasty, Inc.</b> is a deep business-empire simulator. You begin as the founder of a single company with one product in one market, and a few million in the bank. Your ambition is unbounded: build a multi-industry conglomerate, take it public, dominate global markets, amass a personal fortune in trophy assets and sports franchises — and pass the empire to your heirs across the generations.`,
      `There is no single victory screen. Success is measured in valuation, personal net worth, global rank, achievements, and the longevity of your bloodline. The empire only ends if you go bankrupt or your dynasty dies out without an heir.`
    )+
    cxH('Your First Decade')+
    cxList([
      `<b>Watch your cash.</b> Early on you are usually burning money. Revenue must be <i>earned</i> — every dollar comes from products that customers actually choose to buy. Nothing grows for free.`,
      `<b>Improve your product.</b> Invest in R&D and marketing on your starting product. Quality wins share; brand lets you charge more.`,
      `<b>Price deliberately.</b> Demand is price-elastic. Cut prices to grab volume, raise them to protect margin. The right answer depends on your quality and competition.`,
      `<b>Hit profitability, then raise capital.</b> Once your unit economics work, raise a funding round or take on debt to expand into new products, regions, and divisions.`,
      `<b>Plan your succession.</b> Marry, have heirs, and designate a successor. A leaderless dynasty is a dead one.`,
    ])+
    cxTip(`Use the speed controls in the top bar to advance time. Pause whenever a decision matters — most of the game happens between the ticks.`),

  loop:()=>cxH('The Monthly Tick')+
    cxP(`Time advances one month at a time. On every tick the simulation runs a full sequence:`)+
    cxList([
      `<b>Macro update</b> — the economic regime, market sentiment, interest rates, and per-industry conditions shift.`,
      `<b>Market resolution</b> — every product competes in every market it sells into. Appeal (a blend of quality, brand, and price) determines each player's share of real demand.`,
      `<b>P&L</b> — revenue, cost of goods, marketing, R&D, payroll, SG&A, depreciation, interest, and taxes are computed into net profit. Cash changes by exactly that amount.`,
      `<b>Personal finances</b> — your CEO salary is drawn (if the company can afford it); your assets appreciate or depreciate and may yield income.`,
      `<b>The world turns</b> — rival companies make their own moves, sports seasons play out, your R&D bank accrues, and your family ages.`,
      `<b>Events</b> — periodically a decision lands in your lap: an opportunity, a crisis, a rival's gambit. Your choices have real consequences.`,
    ])+
    cxTip(`Profit is not magic. If a passive, single-product company merely treads water, that is correct: growth must be driven by your decisions.`),

  economy:()=>cxH('How Money Is Made')+
    cxP(
      `Each market is a <b>sector × region</b> pair (for example, "Streaming in North America"). Every market has a Total Addressable Market (TAM) that scales with the sector's base size, the region's economic weight, the industry's macro multiplier, and overall market sentiment.`,
      `Within a market, every competing product is scored on <b>appeal</b> — a weighted blend of quality, brand strength, and price relative to the market. Your share of real unit demand is your appeal raised against the sum of all competitors' appeal. Demand is capped by your production capacity.`
    )+
    cxH('The Income Statement')+
    cxP(`Revenue flows into a full P&L every month:`)+
    cxList([
      `<b>Revenue</b> = units sold × price.`,
      `<b>− COGS</b> — the cost to produce each unit (lower with efficiency and ops tech).`,
      `<b>= Gross profit</b>, then subtract <b>Marketing</b>, <b>R&D</b>, <b>Payroll</b>, and <b>SG&A</b> overhead.`,
      `<b>= EBIT</b>, then subtract <b>Depreciation</b> and <b>Interest</b> on debt, add <b>yield</b> on idle cash.`,
      `<b>= Pre-tax income</b>, subtract <b>tax</b>, and you have <b>Net profit</b> — which is added directly to company cash.`,
    ])+
    cxTip(`Margin discipline matters as much as growth. A bigger company that loses money on every sale just goes broke faster.`),

  industries:()=>cxH('The Eight Industries')+
    cxP(`The economy spans eight industries, each with several sectors you can build divisions in. Industries rise and fall on their own macro cycles — a boom in one can coincide with a bust in another.`)+
    INDUSTRIES.map(ind=>{
      const secs=sectorsOf(ind.key);
      return `<div class="cx-block"><div class="cx-block-h">${ind.icon||'▣'} ${esc(ind.name)}</div>`+
        `<div class="cx-secline">${secs.map(s=>`<span class="schip">${esc(s.name)}</span>`).join('')}</div></div>`;
    }).join('')+
    cxTip(`Diversifying across industries smooths your revenue against any single sector's downturn — the essence of a conglomerate.`),

  regions:()=>cxH('Six Global Regions')+
    cxP(`Every product launches into specific regions. Larger, wealthier regions hold more demand but draw fiercer competition. Expanding internationally multiplies your reach — and your exposure to currency swings and local shocks.`)+
    dataTable(['Region','Code','Relative Market Size'],
      REGION_KEYS.map(k=>{
        const vals=Object.values(REGION_W[k]||{});
        const m=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0.5;
        return {cells:[esc(REGIONS[k].name),esc((REGIONS[k].short||k).toUpperCase()),bar(clamp(m/1.6,0,1))]};
      }),
      {align:['l','l','l'],cls:'cx-tbl'})+
    cxTip(`Enter a new region only when you can support it — spreading a weak product thin wins share nowhere.`),

  products:()=>cxH('Building Products')+
    cxP(
      `Products are the engine of revenue. Each lives inside a division and sells into one or more regional markets. Three levers define a product's fate:`,
      `<b>Quality</b> rises with R&D investment and technology; it is the strongest driver of market share. <b>Brand</b> rises with marketing and lets you command premium prices; it decays slowly if neglected. <b>Price</b> is set as an index relative to the market — higher price means fatter margins but fewer units, because demand is elastic.`
    )+
    cxH('Pricing Strategy')+
    cxList([
      `<b>Penetration</b> — price low to grab share, then raise once you've locked in customers and brand.`,
      `<b>Premium</b> — high quality plus strong brand supports a high price and superb margins.`,
      `<b>Defense</b> — in a price war you can match a rival's cuts to hold share, or hold price and out-quality them.`,
    ])+
    cxTip(`Capacity caps your sales. If demand outstrips what your facilities can produce, build more capacity or you leave money on the table.`),

  rnd:()=>cxH('Research & Development')+
    cxP(
      `Each month your R&D spending generates research points that accrue in your R&D bank. Spend them in the technology tree to unlock permanent upgrades across four branches: <b>Product</b>, <b>Operations</b>, <b>Growth</b>, and <b>Corporate</b>.`,
      `Technologies have prerequisites — you must unlock something in the prior tier of the same branch before reaching deeper nodes. Bonuses stack, compounding into a durable competitive moat.`
    )+
    cxH('The Technology Tree')+
    ['product','ops','growth','corp'].map(br=>{
      const nodes=TECH_TREE.filter(t=>t.branch===br).sort((a,b)=>a.tier-b.tier);
      return `<div class="cx-block"><div class="cx-block-h">${esc(TECH_BRANCHES[br]||br)}</div>`+
        dataTable(['Tier','Technology','Effect'],
          nodes.map(n=>({cells:[`T${n.tier}`,`<b>${esc(n.name)}</b>`,esc(n.desc)]})),
          {align:['l','l','l'],cls:'cx-tbl'})+`</div>`;
    }).join('')+
    cxTip(`Operations tech lowers cost and raises capacity; Corporate tech makes you a better acquirer and raises your valuation multiple.`),

  finance:()=>cxH('Raising Capital')+
    cxP(`Growth eats cash. You have several ways to fund it, each with trade-offs in control and cost.`)+
    cxList([
      `<b>Venture rounds</b> — while private, raise successive rounds (Pre-seed → Series D). Each injects cash in exchange for equity dilution. Strong fundamentals earn richer valuations.`,
      `<b>Debt</b> — take loans for non-dilutive capital, but you owe interest every month and excessive leverage invites a credit downgrade.`,
      `<b>IPO</b> — once large enough, go public to unlock the capital markets, fund acquisitions with stock, and let the family realize wealth — at the cost of public scrutiny, activists, and short-sellers.`,
    ])+
    cxH('Returning Capital')+
    cxList([
      `<b>Dividends</b> move company cash into your <i>personal</i> fortune.`,
      `<b>Buybacks</b> shrink the share count, concentrating ownership and signaling confidence.`,
      `<b>Selling founder shares</b> converts your equity into personal cash, at the cost of long-term control.`,
    ])+
    cxTip(`Your personal net worth and the company's cash are separate pools. Trophy assets and sports teams are bought with personal cash — so pay yourself.`),

  mna:()=>cxH('Mergers & Acquisitions')+
    cxP(
      `Acquisitions are the fastest path to scale. Buy a rival and its strongest business folds into your empire as a new division, instantly adding revenue, capacity, and market presence.`,
      `Deals are funded with cash, or — once public — a mix of cash and stock. You pay a premium over the target's valuation; distressed sellers and well-timed offers can be had at a discount. A <b>hostile takeover</b> is faster and pricier, and bruises your reputation.`
    )+
    cxList([
      `<b>Tuck-ins</b> — small bolt-on deals to enter a sector or grab a capability.`,
      `<b>Transformational</b> — a large acquisition that reshapes your scale and standing overnight.`,
      `<b>Integration</b> — Corporate technologies make acquired businesses perform better under your roof.`,
    ])+
    cxTip(`Overpaying for empire's sake destroys value. The best deals are the ones the market hasn't noticed yet.`),

  people:()=>cxH('Your Executive Team')+
    cxP(`A strong C-suite amplifies everything you do. Each executive role buffs a different dimension of the company. Recruit candidates, weigh their overall rating against the signing cost, and build a leadership bench worthy of the empire.`)+
    dataTable(['Role','Title','Strength'],
      EXEC_ROLES.map(r=>({cells:[esc(r.name),esc(r.full||r.name),esc(r.buff||'—')]})),
      {align:['l','l','l'],cls:'cx-tbl'})+
    cxH('Workforce')+
    cxP(`Within each division you hire across functions — Engineering, Sales, Operations, Marketing, Support, Finance, and Research. Headcount drives output but also payroll. Morale affects productivity and retention; neglect it and your best people walk.`)+
    cxTip(`A great CTO lifts product quality across the whole company; a great CFO sharpens your margins and cost of capital.`),

  leaders:()=>cxH('The Person at the Top')+
    cxP(`Your CEO — you, then your heirs — is a character with six core attributes that shape company performance:`)+
    dataTable(['Attribute','What It Drives'],
      STATKEYS.map(k=>({cells:[`<b>${esc(STATLBL[k]||k)}</b>`,esc(STATDESC[k]||'')]})),
      {align:['l','l'],cls:'cx-tbl'})+
    cxH('Traits')+
    cxP(`Leaders also carry traits — innate strengths and flaws that modify outcomes. Positive traits are assets to cultivate; negative ones are liabilities to manage or breed out of the bloodline.`)+
    `<div class="cx-traitcols"><div><div class="cx-block-h good">Positive</div>${cxList(POS_TRAITS.map(t=>`<b>${esc(t.name)}</b> — ${esc(t.desc)}`))}</div>`+
    `<div><div class="cx-block-h bad">Negative</div>${cxList(NEG_TRAITS.map(t=>`<b>${esc(t.name)}</b> — ${esc(t.desc)}`))}</div></div>`,

  wealth:()=>cxH('The Personal Fortune')+
    cxP(
      `Beyond the company lies your private wealth — the true measure of a dynasty. Move money from the firm to your pocket via salary, dividends, and share sales, then convert it into a portfolio of trophy assets.`,
      `Some assets appreciate (estates, art, vineyards, private islands); some depreciate but confer prestige (jets, yachts, supercars); some throw off income (rental portfolios, media networks). Prestige burnishes the family name across generations.`

      {align:['l','l','l'],cls:'cx-tbl'})+
    cxTip(`Assets are bought with personal cash, not company cash. A cash-rich company with a broke founder is a common rookie mistake.`),

  sports:()=>cxH('Sports Empire')+
    cxP(
      `The ultimate trophy: owning professional sports franchises across football, basketball, baseball, and soccer leagues. Teams are bought with personal cash and appreciate as prestige assets.`,
      `Invest in your franchise to improve its roster and competitiveness. Win championships for prestige, glory, and a permanent mark in your dynasty's legacy. Big-market teams cost more but carry more cachet.`
    )+
    cxTip(`A championship banner is worth more to a mogul's legacy than almost any business milestone — and far harder to buy outright.`),

  dynasty:()=>cxH('Blood & Succession')+
    cxP(

      `<b>Designate an heir</b> to control who takes the throne. When your CEO dies or steps down, succession passes leadership to the chosen heir and advances the generation. If no adult heir is ready, a minor may inherit under a <b>regency</b> — a shaky, reputation-bruising stopgap until they come of age.`,

    )+

      `<b>Heir rivalry</b> — siblings may feud over the future; whom you favor shapes their growth.`,
      `<b>Legacy</b> — prestige, championships, and philanthropy compound across generations into a lasting house.`,
    ])+
    cxTip(`Name a successor early. A sudden death with no designated heir throws the empire into a costly, reputation-sapping scramble.`),

  events:()=>cxH('Opportunities & Crises')+
    cxP(`The world does not sit still. Periodically an event demands a decision — and most offer multiple paths with genuine trade-offs. There are no purely free wins; the right call depends on your situation.`)+

     ['compete','Competition','Price wars, talent raids, rival scandals, espionage, and distressed sellers ripe for acquisition.'],

SCREENS.codex=function(){
  const cat=UI.codexCat||'start';
  const nav=`<div class="cx-nav">${CODEX_CATS.map(c=>
    `<button class="cx-navbtn ${c.key===cat?'on':''}" data-act="codexcat" data-cat="${c.key}"><span class="cx-navi">${c.icon}</span><span>${esc(c.label)}</span></button>`
  ).join('')}</div>`;
  const meta=CODEX_CATS.find(c=>c.key===cat)||CODEX_CATS[0];
  let body='';try{body=(CODEX_RENDER[cat]||CODEX_RENDER.start)();}catch(e){body=`<p class="cx-p">—</p>`;}
  const content=panel(`${meta.icon}  ${meta.label}`,`<div class="cx-content">${body}</div>`);
  return `<div class="cx-wrap"><div class="cx-side">${panel('Codex',nav)}</div><div class="cx-main">${content}</div></div>`;
};

/* ===================== 19_screens_extra.js ===================== */
/* ============================================================
   EXTRA SCREENS — Financial History & News Archive.
   Both surface data the engine already records.
   ============================================================ */

const FEED_CATS=[
  {key:'all',label:'All'},
  {key:'money',label:'Money'},
  {key:'deal',label:'Deals'},
  {key:'rnd',label:'R&D'},
  {key:'people',label:'People'},
  {key:'world',label:'World'},
  {key:'board',label:'Board'},
  {key:'warn',label:'Alerts'},
];
const FEED_ICON={money:'$',deal:'⇄',rnd:'⚛',people:'☗',world:'◍',board:'♔',warn:'⚠',neutral:'·'};

SCREENS.history=function(){
  const h=(G.history||[]);
  const head=panel('Trajectory',`
    <div class="g4">
      ${tile('Valuation','$'+money(pc().valuation||0))}
      ${tile('Net Worth','$'+money(personalNetWorth()))}
      ${tile('Revenue/yr','$'+money((G.fin.revenue||0)*12))}
      ${tile('Months Elapsed',G.month||0)}
    </div>`);

  // sample history to keep charts readable
  const sample=(arr,n)=>{if(arr.length<=n)return arr;const out=[];const step=(arr.length-1)/(n-1);for(let i=0;i<n;i++)out.push(arr[Math.round(i*step)]);return out;};
  const hs=sample(h,80);

  const valChart=panel('Company Valuation & Personal Net Worth',
    h.length<2?`<div class="empty">History builds as the years pass.</div>`:
    lineChart(hs,[{key:'val',label:'Valuation',color:'var(--gold)'},{key:'nw',label:'Net Worth',color:'var(--teal)'}],
      {w:680,h:230,zero:true,fmt:v=>'$'+money0(v)})+
    legend([{label:'Valuation',color:'var(--gold)'},{label:'Net Worth',color:'var(--teal)'}]));

  const revChart=panel('Revenue & Net Income (annualized)',
    h.length<2?`<div class="empty">History builds as the years pass.</div>`:
    lineChart(hs,[{key:'rev',label:'Revenue',color:'var(--blue)'},{key:'net',label:'Net Income',color:'var(--green)'}],
      {w:680,h:200,zero:true,fmt:v=>'$'+money0(v)})+
    legend([{label:'Revenue',color:'var(--blue)'},{label:'Net Income',color:'var(--green)'}]));

  // annual snapshot table (every 12 months)
  const annual=h.filter((d,i)=>i===h.length-1||d.month%12===0).slice(-14);
  const rows=annual.map((d,i)=>{
    const prev=annual[i-1];
    const grow=prev&&prev.val>0?((d.val-prev.val)/prev.val):null;
    return {cells:[
      esc(dateLabel(d.month)),
      '$'+money(d.val),
      grow==null?'—':`<span class="${grow>=0?'good':'bad'}">${signed(Math.round(grow*100))}%</span>`,
      '$'+money(d.rev),
      `<span class="${d.net>=0?'good':'bad'}">$${money(d.net)}</span>`,
      '$'+money(d.nw),
      '#'+d.rank,
    ]};
  });
  const table=panel('Annual Snapshots',
    annual.length<1?`<div class="empty">No snapshots recorded yet.</div>`:
    dataTable(['Date','Valuation','YoY','Revenue/yr','Net/yr','Net Worth','Rank'],rows,
      {align:['l','r','r','r','r','r','r'],cls:'histtbl'}));

  return head+valChart+revChart+table;
};

SCREENS.archive=function(){
  const filter=UI.feedFilter||'all';
  const feed=(G.feed||[]);
  const counts={};feed.forEach(f=>{counts[f.cat]=(counts[f.cat]||0)+1;});
  const tabs=`<div class="feedfilter">${FEED_CATS.map(c=>{
    const n=c.key==='all'?feed.length:(counts[c.key]||0);
    return `<button class="ffbtn ${c.key===filter?'on':''}" data-act="feedfilter" data-cat="${c.key}">${esc(c.label)}<span class="ffn">${n}</span></button>`;
  }).join('')}</div>`;

  const items=feed.filter(f=>filter==='all'||f.cat===filter);
  const list=items.length?`<div class="archfeed">${items.slice(0,160).map(f=>`
    <div class="archrow tone-${esc(f.tone||'neutral')}">
      <span class="archicon">${FEED_ICON[f.cat]||FEED_ICON[f.tone]||'·'}</span>
      <span class="archtext">${esc(f.text)}</span>
      <span class="archdate">${esc(f.date||dateLabel(f.month))}</span>
    </div>`).join('')}</div>`:`<div class="empty">No dispatches in this category yet.</div>`;

  return panel('The Chronicle',tabs+list,{right:`<span class="hint">${feed.length} dispatches on record</span>`});
};

/* ===================== 14_boot.js ===================== */
/* ============================================================
   BOOT — wire events and start the app.
   ============================================================ */
function boot(){
  wireEvents();
  let resumed=false;
  if(hasSave()){
    try{
      if(loadGame()&&G&&G.started){ resumed=true; }
    }catch(e){ resumed=false; }
  }
  if(resumed){
    UI.tab='dashboard';
    render();
  }else{
    initSetupState();
    renderSetup();
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',boot);
}else{
  boot();
}

</script>
