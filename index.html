/* ============================================================================
   LEADERSHIP / EXEC BONUSES — sum founder/ceo stats, traits, execs into mods.
   ============================================================================ */
function leadershipMods(){
 const c=ceo()||founder();
 const m={rnd:0,cost:0,deal:0,raise:0,brand:0,board:0,sga:0,acq:0,mkt:0,hire:0,growth:0,qcap:0,talent:0,morale:0,variance:0,launch:0,price:0,quality:0,cap:0};
 if(c){
  // stats contribute (centered at 10)
  m.qcap+=(c.stats.product-10)*0.6;
  m.rnd+=(c.stats.vision-10)*0.012;
  m.cost+=-(c.stats.ops-10)*0.006;
  m.mkt+=(c.stats.growth-10)*0.012;
  m.deal+=(c.stats.finance-10)*0.012;
  m.raise+=(c.stats.finance-10)*0.010;
  m.brand+=(c.stats.charisma-10)*0.006;
  m.board+=(c.stats.charisma-10)*0.012;
  m.talent+=(c.stats.charisma-10)*0.010;
  STATKEYS.forEach(()=>{});
  // traits
  ['rnd','cost','deal','raise','brand','board','sga','acq','mkt','hire','growth','qcap','talent','morale','variance','launch','price','quality'].forEach(k=>{m[k]+=traitEff(c,k);});
 }
 // execs
 (G.execs||[]).forEach(e=>{const c2=G.chars[e.charId];if(!c2)return;const ov=overall(c2)/100;
  if(e.role==='cfo'){m.sga-=0.10*ov*2;m.raise+=0.15*ov*2;}
  if(e.role==='cto'){m.qcap+=10*ov;m.rnd+=0.18*ov*2;}
  if(e.role==='coo'){m.cost-=0.10*ov*2;m.cap+=0.20*ov*2;}
  if(e.role==='cmo'){m.mkt+=0.18*ov*2;m.brand+=0.10*ov*2;}
  if(e.role==='cro'){m.price+=0.06*ov*2;m.growth+=0.06*ov*2;}
  if(e.role==='chro'){m.morale+=8*ov;m.talent+=0.12*ov*2;}
 });
 return m;
}

/* ============================================================================
   MARKET ECONOMY — the share & revenue model.
   ============================================================================ */
function marketTAM(sectorKey,region){
 const sec=SECTORBY[sectorKey];
 const indM=(G.indMacro&&G.indMacro[sec.ind])||1;
 return sec.tam*(REGION_W[region][sec.ind]||0.8)*indM*(G.macro.sentiment||1);
}
function marketUnits(sectorKey,region){const sec=SECTORBY[sectorKey];return marketTAM(sectorKey,region)*1e6/sec.arpu;}

/* gather all competitors in a (sector,region) market */
function marketCompetitors(sectorKey,region){
 const out=[];
 // player products launched here
 allProducts().forEach(p=>{if(p.sectorKey===sectorKey&&p.launchedRegions.includes(region)){
  out.push({kind:'player',prod:p,quality:p.quality,brand:Math.max(p.brand,pc().brandEquity*0.5),priceIdx:p.priceIdx,coName:pc().name,isPlayer:true});
 }});
 // rivals
 G.rivalCos.forEach(r=>{if(!r.alive)return;r.presences.forEach(pr=>{if(pr.sectorKey===sectorKey&&pr.region===region){
  out.push({kind:'rival',rival:r,pres:pr,quality:pr.quality,brand:pr.brand,priceIdx:pr.priceIdx,coName:r.name,isPlayer:false});
 }});});
 return out;
}
function computeAppeal(c,sec,mods){
 const qpow=0.6+sec.rnd*0.5;
 const bpow=0.25+sec.brand*0.8;
 const q=Math.pow(Math.max(.05,c.quality/55),qpow);
 const br=Math.pow(Math.max(.05,c.brand/55),bpow);
 const elast=clamp(sec.elastic+(c.isPlayer?(G.techBonus.elastic||0)+(mods.price?-mods.price*0.4:0):0),0.1,0.95);
 const priceA=Math.pow(100/Math.max(40,c.priceIdx),0.5+elast*1.6);
 let a=q*br*priceA;
 if(c.isPlayer){a*=(1+(G.techBonus.network||0)*0.3);} // small direct boost; network handled in exponent
 return Math.max(0.002,a);
}
/* compute one market: assigns share/units/revenue to each competitor entry */
function computeMarket(sectorKey,region){
 const sec=SECTORBY[sectorKey];const comps=marketCompetitors(sectorKey,region);
 if(!comps.length)return comps;
 const mods=G._mods||leadershipMods();
 const netBonus=comps.some(c=>c.isPlayer)?(G.techBonus.network||0):0;
 const k=1+(sec.network+netBonus)*1.7;
 let avgPrice=0,wsum=0;
 comps.forEach(c=>{c.appeal=computeAppeal(c,sec,mods);avgPrice+=c.priceIdx*c.appeal;wsum+=c.appeal;});
 avgPrice=wsum>0?avgPrice/wsum:100;
 // elasticity at market level: high avg price shrinks unit demand
 const unitsTotal=marketUnits(sectorKey,region)*Math.pow(100/Math.max(50,avgPrice),sec.elastic*0.8);
 let denom=0;comps.forEach(c=>{c._w=Math.pow(c.appeal,k);denom+=c._w;});
 comps.forEach(c=>{
  c.share=denom>0?c._w/denom:0;
  c.unitsAnnual=c.share*unitsTotal;
  const effPriceAnnual=sec.arpu*(c.priceIdx/100);
  c.revMonthly=c.unitsAnnual*effPriceAnnual/1e6/12; // $M/month
 });
 return comps;
}

/* ============================================================================
   FULL RECOMPUTE — derive all player financials from products/markets.
   Called each tick and whenever the UI needs fresh numbers.
   ============================================================================ */
function recompute(){
 if(!G||!G.co)return;
 computeTechBonus();
 const mods=leadershipMods();G._mods=mods;
 const co=pc();
 const tb=G.techBonus;
 // reset product perf
 let totalRev=0,totalUnits=0,totalCOGS=0,totalMkt=0,totalRnd=0;
 // gather markets the player touches
 const touched={};
 allProducts().forEach(p=>{p.launchedRegions.forEach(rg=>{touched[p.sectorKey+'|'+rg]=[p.sectorKey,rg];});});
 // also compute rival-only markets lazily (only when needed for shares display) — but to keep rivals moving we recompute all touched + a sample
 const marketCache={};
 Object.values(touched).forEach(([sk,rg])=>{marketCache[sk+'|'+rg]=computeMarket(sk,rg);});
 // assign to player products
 allProducts().forEach(p=>{
  const sec=SECTORBY[p.sectorKey];
  let pRev=0,pUnits=0,pShareAvg=0,nreg=0;
  p.perf={byRegion:{}};
  p.launchedRegions.forEach(rg=>{
   const comps=marketCache[p.sectorKey+'|'+rg]||computeMarket(p.sectorKey,rg);
   const me=comps.find(c=>c.kind==='player'&&c.prod===p);
   if(me){
    // capacity cap
    const cap=productCapacity(p);
    let units=me.unitsAnnual;
    let capped=false;
    if(units>cap){units=cap;capped=true;}
    const effPriceAnnual=sec.arpu*(p.priceIdx/100);
    const rev=units*effPriceAnnual/1e6/12;
    p.perf.byRegion[rg]={share:me.share,units,rev,capped,tam:marketTAM(p.sectorKey,rg)};
    pRev+=rev;pUnits+=units;pShareAvg+=me.share;nreg++;
   }
  });
  // unit cost / COGS
  const effCost=unitCostRatio(p);
  const cogs=pUnits*sec.arpu*effCost/1e6/12;
  p.perf.rev=pRev;p.perf.units=pUnits;p.perf.cogs=cogs;
  p.perf.share=nreg?pShareAvg/nreg:0;
  p.perf.gross=pRev-cogs;p.perf.margin=pRev>0?(pRev-cogs)/pRev:0;
  totalRev+=pRev;totalUnits+=pUnits;totalCOGS+=cogs;totalMkt+=p.mktInvest;totalRnd+=p.rndInvest;
 });
 // division research budgets count as R&D
 G.divisions.forEach(d=>{totalRnd+=d.rndBudget||0;});
 // payroll
 const payroll=totalPayroll();
 // SGA overhead
 const sga=overheadCost();
 // depreciation
 const deprec=depreciation();
 // interest
 const interest=totalInterest();
 // cash yield
 const cy=Math.max(0,co.cash)*((tb.yield||0))/12;
 // synergy bonus to revenue
 const syn=synergyBonus();
 totalRev*=(1+syn);
 const gross=totalRev-totalCOGS;
 const ebit=gross-totalMkt-totalRnd-payroll-sga-deprec;
 const pretax=ebit-interest+cy;
 const taxRate=clamp(0.21+(diff().macroVol>1?0.02:0)-(tb.tax||0)-Math.max(0,mods.sga*0),0.05,0.32);
 const tax=pretax>0?pretax*taxRate:0;
 const net=pretax-tax;
 G.fin={
  revenue:totalRev,cogs:totalCOGS,gross,marketing:totalMkt,rnd:totalRnd,payroll,sga,
  deprec,ebit,interest,cashYield:cy,pretax,tax,taxRate,net,
  units:totalUnits,grossMargin:totalRev>0?gross/totalRev:0,netMargin:totalRev>0?net/totalRev:0,synergy:syn
 };
 // R&D points generation (from researchers + R&D spend + bonuses)
 G.fin.rndPoints=rndPointsPerMonth();
 // valuation
 co.valuation=companyValuation();
 co.sharePrice=co.shares>0?co.valuation/co.shares:0;
 co.stage=co.public?'Public':co.stage;
 G.valuation=co.valuation;
 // update rivals' valuations roughly
 if(G._needRivalVal){updateRivalValuations();G._needRivalVal=false;}
 return G.fin;
}

/* ---- supporting cost functions ---- */
function productCapacity(p){
 const d=divById(p.divId);if(!d)return 1e15;
 const sec=SECTORBY[p.sectorKey];
 const ob=(typeof opsBonus==='function')?opsBonus():{cap:0,productivity:0};
 const ops=d.employees.Operations+d.employees.Engineering*0.4+d.employees.Support*0.3;
 let facCap=(typeof divFacilityCapacity==='function')?divFacilityCapacity(d).total:sum(d.facilities,f=>f.capacity);
 const tb=G.techBonus;
 const perEmp=(sec.capital>0.6? 1800 : sec.capital>0.35? 4200 : 9000)*(1+(ob.productivity||0));
 let cap=(ops*perEmp + facCap)*(1+(tb.cap||0)+(G._mods?G._mods.cap:0)+(ob.cap||0));
 cap*=(1+ (d.efficiency-40)/180);
 // shared across products in division, weighted by production priority
 let sumPri=0;d.products.forEach(pid=>{const pp=G.products[pid];if(pp)sumPri+=(pp.priority||1);});
 const share=sumPri>0?(p.priority||1)/sumPri:1;
 if(typeof shiftCapacityFactor==='function')cap*=shiftCapacityFactor(d);
 return Math.max(500,cap*share* (sec.capital>0.6?1:1.4));
}
function unitCostRatio(p){
 const sec=SECTORBY[p.sectorKey];const d=divById(p.divId);
 const tb=G.techBonus;const mods=G._mods||{cost:0};
 let ratio=(1-sec.margin); // baseline cost share of arpu at idx100
 // efficiency reductions
 ratio*=(1 - clamp((tb.cost||0)*-1,0,0.5) ); // tb.cost negative reduces
 ratio*=(1 + (mods.cost||0));
 ratio*=(1 - clamp((d? (d.efficiency-40)/220 :0),-0.3,0.35));
 // scale economies: more total units in this sector lowers cost
 const scale=clamp(Math.log10(1+(p.perf&&p.perf.units?p.perf.units:1000))/7,0,0.22);
 ratio*=(1-scale);
 ratio*=(1 - (tb.margin||0));
 const _ob=(typeof opsBonus==='function')?opsBonus():{cost:0};
 ratio*=(1 + (_ob.cost||0) + (typeof supplierCostMod==='function'?supplierCostMod():0) + (typeof freightCostMod==='function'?freightCostMod():0));
 return clamp(ratio,0.12,0.95);
}
function totalPayroll(){
 let pr=0;
 G.divisions.forEach(d=>{const city=CITYBY[d.hqRegion]||{cost:1};const cityCost=avgRegionCost(d.hqRegion);
  let dp=0;
  for(const f in d.employees){const n=d.employees[f];const fs=salaryPerEmp(f)*cityCost;dp+=n*fs;}
  if(typeof shiftPayrollFactor==='function')dp*=shiftPayrollFactor(d);
  pr+=dp;});
 // exec salaries
 (G.execs||[]).forEach(e=>{pr+=(e.salary||0)/12;});
 return pr;
}
function salaryPerEmp(func){const base={Engineering:.16,Research:.18,Sales:.11,Operations:.09,Marketing:.12,Support:.07,Finance:.14}[func]||.1;return base/12;}
function avgRegionCost(region){const cs=CITIES.filter(c=>c.region===region);return cs.length?avg(cs,c=>c.cost):1;}
function totalEmployees(){let n=0;G.divisions.forEach(d=>{for(const f in d.employees)n+=d.employees[f];});return n;}
function overheadCost(){
 const tb=G.techBonus;const mods=G._mods||{sga:0};
 const emp=totalEmployees();
 // overhead scales with headcount and footprint — a one-person shop costs almost nothing
 let sga=emp*0.002 + G.divisions.length*0.025 + (pc().public?0.7:0.01);
 const _ob=(typeof opsBonus==='function')?opsBonus():{sga:0};
 sga*=(1+(tb.sga||0)+(mods.sga||0)+(_ob.sga||0)+traitEff(ceo()||founder()||{},'sga'));
 sga*=(1+(mods.frugal||0));
 return Math.max(0.006,sga);
}
function depreciation(){let v=0;G.divisions.forEach(d=>d.facilities.forEach(f=>v+=(f.value||0)*0.012));return v;}
function totalInterest(){return sum(G.loans||[],l=>l.principal*l.rate/12);}
function totalDebt(){return sum(G.loans||[],l=>l.principal);}
function rndPointsPerMonth(){
 const tb=G.techBonus;const mods=G._mods||{rnd:0};
 let pts=0;
 G.divisions.forEach(d=>{pts+=(d.employees.Research||0)*1.1+(d.employees.Engineering||0)*0.35;pts+=(d.rndBudget||0)*6;if(typeof divRndFacilityBoost==='function')pts+=divRndFacilityBoost(d);});
 allProducts().forEach(p=>{pts+=p.rndInvest*5;});
 pts*=(1+(tb.rndmult||0)+(mods.rnd||0));
 return pts;
}
function synergyBonus(){
 const inds=new Set(G.divisions.map(d=>SECTORBY[d.sectorKey].ind));
 const related=G.divisions.length-inds.size; // divisions sharing an industry
 let s=related*0.02 + (G.divisions.length>1?0.01:0);
 s*=(1+(G.techBonus.synergy||0));
 return clamp(s,0,0.4);
}
function companyValuation(){
 const co=pc();const fin=G.fin||{};
 const annualRev=(fin.revenue||0)*12;
 const annualNet=(fin.net||0)*12;
 let val;
 // primary sector for multiple
 const mainSec=G.divisions.length?SECTORBY[G.divisions[0].sectorKey]:SECTORBY.social;
 let revMult=1.4+mainSec.growth*16+(G.techBonus.multiple||0);
 if(fin.netMargin>0.12)revMult+=1.5;
 if(co.public)revMult+=0.8;
 revMult*=(0.8+(co.reputation/100)*0.6);
 revMult*=(0.85+(G.macro.sentiment||1)*0.2);
 revMult=clamp(revMult,0.6,22);
 if(annualRev>1){
  val=annualRev*revMult;
  if(annualNet>0)val=Math.max(val,annualNet*clamp(12+mainSec.growth*60,8,40));
 } else {
  // pre-revenue: value on traction/quality/brand
  let t=0;allProducts().forEach(p=>{t+=p.quality*0.4+p.brand*0.3+(p.perf&&p.perf.units?Math.log10(1+p.perf.units):0)*3;});
  val=Math.max(0.5,t*0.8);
 }
 val+=Math.max(0,co.cash)-totalDebt()*0.7;
 val+=assetsValueAll()*0; // company assets not personal
 if(typeof industryBookValue==='function')val+=industryBookValue();
 return Math.max(0.3,val);
}

/* ---- personal wealth ---- */
function assetTypeByCat(cat){return ASSET_TYPES.find(t=>t.cat===cat);}
function assetsValueAll(){let v=0;(G.assets||[]).forEach(a=>{v+=a.value;});return v;}
function assetsYield(){
  let y=0;(G.assets||[]).forEach(a=>{const t=assetTypeByCat(a.cat);if(!t)return;
    y+=a.value*((t.yield||0))/12; });
  return y;
}
function assetsAppreciate(){
  (G.assets||[]).forEach(a=>{const t=assetTypeByCat(a.cat);if(!t)return;
    a.value*=(1+((t.appr||0))/12 + gauss()*0.004); });
}
function ownedTeams(){return (G.teams||[]).filter(t=>t.owned);}
function teamsValue(){let v=0;ownedTeams().forEach(t=>v+=t.value);return v;}
function personalShares(){const co=pc();return co.shares?(co.famShares||0)/co.shares:1;}
function personalEquityValue(){const co=pc();const val=co.valuation||companyValuation();return val*personalShares();}
function personalNetWorth(){
  return personalEquityValue()+assetsValueAll()+teamsValue()+(G.personalCash||0);
}

/* ---- rival helpers ---- */
function indRepGrowth(indKey){const secs=sectorsOf(indKey);return secs.length?avg(secs,s=>s.growth):0.08;}
function rivalColor(r){return (INDBY[r.indKey]&&INDBY[r.indKey].color)||'#9aa';}
function rivalValuation(r){
  const annualRev=(r.revenue||0)*12;
  const g=indRepGrowth(r.indKey);
  let mult=1.4+g*15+(r.public?0.7:0);
  mult*=(0.85+(G.macro.sentiment||1)*0.2);
  mult=clamp(mult,0.6,20);
  let v=annualRev>1?annualRev*mult:Math.max(0.4,(r.quality+r.brand)/30+r.scale/20);
  v+=Math.max(0,r.cash||0);
  return Math.max(0.2,v);
}
function updateRivalValuations(){(G.rivalCos||[]).forEach(r=>{if(r.alive)r.valuation=rivalValuation(r);});}

/* ---- world ranking ---- */
function worldEntities(){
  const list=[];const co=pc();
  list.push({id:'co',name:co.name,ticker:co.ticker,val:co.valuation||companyValuation(),

function rollNarrative(){
  const m=G.macro;
  if(m.regime&&m.regimeEnd>G.month)return;
  if(m.regime&&m.regimeEnd<=G.month){
    const old=NARRBY[m.regime];
    if(old)pushFeed('world',`The era of ${old.label} has passed.`,'neutral');
    m.regime=null;
  }
  let rate=0.09*(diff().macroVol||1);
  if(chance(rate)){
    const n=pick(NARRATIVES);
    m.regime=n.id; m.regimeEnd=G.month+(n.years||4)*12;
    pushFeed('world',`📰 ${n.label}: ${n.body}`,'neutral');
    toast(`📰 ${n.label}`,'A new economic era begins.');
  }
}
function recomputeMacros(){
  const m=G.macro;
  G.indMacro=G.indMacro||{};
  const n=m.regime?NARRBY[m.regime]:null;
  let sentSum=0,cnt=0;
  INDUSTRIES.forEach(ind=>{
    let target=1;
    if(n&&n.ind&&n.ind[ind.key]!=null)target=n.ind[ind.key];
    const prev=G.indMacro[ind.key]!=null?G.indMacro[ind.key]:1;
    G.indMacro[ind.key]=clamp(lerp(prev,target,0.12)+gauss()*0.012,0.45,1.9);
    sentSum+=G.indMacro[ind.key];cnt++;
  });
  const avgInd=cnt?sentSum/cnt:1;
  m.sentiment=clamp(lerp(m.sentiment,avgInd*(n?(n.mult||1):1),0.12)+gauss()*0.01,0.4,1.7);
  m.growth=clamp(lerp(m.growth,avgInd,0.1),0.5,1.6);
  let targetRates=(n&&n.rates!=null)?n.rates:(m.baseRates||0.045);
  m.rates=clamp(lerp(m.rates,targetRates,0.08),0.005,0.16);
}

function maybeEvent(force){
  if(G.pendingEvent)return;
  let rate=0.15;
  if(!force&&!chance(rate))return;
  const pool=eventPool();if(!pool.length)return;
  const total=pool.reduce((a,e)=>a+e.w,0);
  let r=rf(0,total),chosen=pool[0];
  for(const e of pool){r-=e.w;if(r<=0){chosen=e;break;}}
  G.pendingEvent=chosen.make();
}

/* ============================================================
   RIVAL AI
   ============================================================ */
function tickRival(r){
  if(!r.alive)return;
  const g=indRepGrowth(r.indKey);
  const macroG=(G.macro.growth||1)*((G.indMacro&&G.indMacro[r.indKey])||1);
  const grow=(g*0.5+r.aggression*0.015+(macroG-1)*0.5);
  r.revenue=Math.max(0,(r.revenue||0.2)*(1+grow/12+gauss()*0.02));
  const margin=clamp(g+(r.quality-50)/400+(r.scale-50)/600,-0.15,0.45);
  r.cash=(r.cash||0)+r.revenue*margin;
  r.quality=clamp(r.quality+rf(-0.4,0.7),20,99);
  r.brand=clamp(r.brand+rf(-0.3,0.6),5,98);
  r.scale=clamp(r.scale+rf(-0.2,0.5),5,99);
  if(chance(0.04)){
    const mv=pick(['invest','price','expand','raise']);
    if(mv==='invest'){r.quality=clamp(r.quality+ri(1,4),20,99);r.cash-=r.revenue*0.5;}
    else if(mv==='raise'&&!r.public){r.cash+=r.revenue*ri(2,5);}
    else if(mv==='expand'){r.revenue*=rf(1.03,1.12);
      // add a presence in a new region
      if(r.presences.length){const base=pick(r.presences);const rg=pick(REGION_KEYS);
        if(!r.presences.some(p=>p.sectorKey===base.sectorKey&&p.region===rg))
          r.presences.push({sectorKey:base.sectorKey,region:rg,quality:base.quality,brand:base.brand,priceIdx:base.priceIdx});}}
  }
  if(!r.public&&r.revenue*12>ri(300,900)&&chance(0.05)){r.public=true;pushFeed('rival',`${r.name} (${r.ticker}) went public.`,'neutral');}
  if(r.cash<-r.revenue*8&&chance(0.2)){r.alive=false;pushFeed('rival',`${r.name} collapsed into bankruptcy.`,'bad');}
}
function tickWorld(){
  (G.rivalCos||[]).forEach(tickRival);
  if((G.rivalCos||[]).filter(r=>r.alive).length<16&&chance(0.08)){
    const r=makeRival();G.rivalCos.push(r);
    pushFeed('rival',`A new challenger emerges: ${r.name}.`,'neutral');
  }
  const alive=(G.rivalCos||[]).filter(r=>r.alive);
  if(alive.length>6&&chance(0.04)){
    const buyer=pick(alive.filter(r=>r.cash>50));
    if(buyer){const targets=alive.filter(t=>t!==buyer&&t.valuation<buyer.cash*0.8&&t.valuation>0);
      if(targets.length){const t=pick(targets);t.alive=false;
        buyer.revenue+=t.revenue;buyer.cash-=t.valuation;
        t.presences.forEach(p=>buyer.presences.push(p));
        pushFeed('deal',`${buyer.name} acquired ${t.name}.`,'neutral');}}
  }
  updateRivalValuations();
}

function tickTeams(){

}
function simSeason(t){
  const lg=LEAGUEBY[t.league]||{games:20};
  const games=lg.games||20;
  let w=0;const strength=clamp(0.5+(t.rating-50)/120+((t.payroll||50)-100)/600,0.12,0.9);
  for(let i=0;i<games;i++){if(chance(strength))w++;}
  t.wins=w;t.losses=games-w;t.lastSeasonWinPct=w/games;
  t.playoffs=t.lastSeasonWinPct>0.56;
  if(t.playoffs&&chance(0.25)){t.titles=(t.titles||0)+1;t.value*=1.08;G._champWon=true;
    pushFeed('world',`${t.name} won the championship! 🏆`,'good');toast('🏆 Champions!',t.name);}
  else pushFeed('world',`${t.name} finished ${w}-${t.losses}.`,'neutral');
}

   DYNASTY
   ============================================================ */
function bloodline(){return (G.bloodline||[]).map(id=>G.chars[id]).filter(c=>c&&c.alive);}
function ageCharacter(c){
  c.age+=1/12;
  if(c.age>55&&chance(0.02)){STATKEYS.forEach(k=>{if(chance(0.3))c.stats[k]=clamp(c.stats[k]-1,1,20);});}
}
function tickDynasty(){
  Object.values(G.chars).forEach(c=>{if(c.alive)ageCharacter(c);});
  const ceoC=ceo();
  if(ceoC&&ceoC._regency&&ceoC.age>=18){ceoC._regency=false;pushFeed('board',`${fullName(ceoC)} comes of age and assumes full command. The regency ends.`,'good');}
  if(ceoC&&ceoC.age>24&&ceoC.age<47&&ceoC.spouseId&&chance(0.011)){
    const sp=G.chars[ceoC.spouseId];
    const child=makeChild(ceoC,sp);
    G.chars[child.id]=child;G.bloodline=G.bloodline||[];G.bloodline.push(child.id);
    pushFeed('people',`A child is born to ${fullName(ceoC)}: ${fullName(child)}.`,'good');
    toast('👶 An heir is born','The dynasty continues.');
  }
  if(ceoC){
    const deathChance=ceoC.age>62?(ceoC.age-62)*0.0009:0;
    if(ceoC.age>70&&chance(deathChance+0.002)){
      pushFeed('people',`${fullName(ceoC)} has passed away at ${Math.floor(ceoC.age)}.`,'bad');succession();
    }else if(ceoC.age>67&&chance(0.01)){
      pushFeed('people',`${fullName(ceoC)} steps down as CEO.`,'neutral');succession();
    }
  }
}
function eligibleHeirs(){return bloodline().filter(c=>c.id!==G.ceoId&&c.age>=18);}
function succession(){
  const old=ceo();if(old)old.alive=false;
  const adults=eligibleHeirs().sort((a,b)=>{
    if(a.id===G.designatedHeir)return -1;if(b.id===G.designatedHeir)return 1;
    return overall(b)-overall(a);
  });
  if(adults.length){
    const heir=adults[0];G.ceoId=heir.id;G.generation=(G.generation||1)+1;heir.role='CEO';
    if(G.designatedHeir===heir.id)G.designatedHeir=null;
    pushFeed('people',`${fullName(heir)} becomes CEO. Generation ${G.generation} begins.`,'good');
    toast('👑 A new era','Succession complete.');
    pc().reputation=clamp(pc().reputation-ri(2,8),0,100);
    checkAchievements();return;
  }
  // no adult heir — a minor inherits under a regency (boy/girl king)
  const minors=bloodline().filter(c=>c.id!==old?.id&&c.alive).sort((a,b)=>b.age-a.age);
  if(minors.length){
    const heir=minors[0];G.ceoId=heir.id;G.generation=(G.generation||1)+1;heir.role='CEO';heir._regency=true;
    pushFeed('board',`With no adult heir, a regency installs young ${fullName(heir)} (age ${Math.floor(heir.age)}) as figurehead CEO. The board grows restless.`,'warn');
    toast('👑 A regency begins','A child inherits the empire.');
    pc().reputation=clamp(pc().reputation-ri(8,16),0,100);
    pc().distress=Math.max(pc().distress||0,1);
    checkAchievements();return;
  }
  G.gameOver=true;G.gameOverReason='The bloodline is extinguished. With no living heir, the empire is broken up and sold for parts.';
}

  b1:c=>c.netWorth>=1000,
  b10:c=>c.netWorth>=10000,
  b100:c=>c.netWorth>=100000,
  ipo:c=>c.public,

  acq10:c=>c.acquisitions>=10,
  monopoly:c=>c.maxShare>=0.60,
  conglom:c=>c.industries>=4,
  global:c=>c.regions>=6,
  tech:c=>c.techCount>=10,
  heir:c=>c.generation>=2,
  gen3:c=>c.generation>=3,
  top1:c=>c.rank===1,
  team:c=>c.teams>=1,

};
function checkAchievements(){
  G.achieved=G.achieved||{};
  const co=pc();const val=co.valuation||companyValuation();
  // derived metrics for achievements
  let maxShare=0,regionsSet={},indSet={};
  allProducts().forEach(p=>{
    if(p.perf&&p.perf.byRegion){for(const rg in p.perf.byRegion){regionsSet[rg]=1;if(p.perf.byRegion[rg].share>maxShare)maxShare=p.perf.byRegion[rg].share;}}
    p.launchedRegions.forEach(rg=>regionsSet[rg]=1);
  });
  G.divisions.forEach(d=>{indSet[SECTORBY[d.sectorKey].ind]=1;});
  const recession=G.macro.regime&&(NARRBY[G.macro.regime]&&(NARRBY[G.macro.regime].allmacro&&NARRBY[G.macro.regime].allmacro<0.9));
  if(recession&&(G.fin.net||0)>0&&co.distress===0)G._sawRecessionSurvive=true;
  const ctx={netWorth:personalNetWorth(),valuation:val,rank:playerRank(),public:co.public,
    divisions:G.divisions.length,generation:G.generation||1,teams:ownedTeams().length,
    assets:(G.assets||[]).length,revenue:(G.fin.revenue||0)*12,employees:totalEmployees(),
    techCount:(G.tech.unlocked||[]).length,acquisitions:(G.stats&&G.stats.acquisitions)||0,
    profitMonth:(G.fin.net||0)>0,maxShare,regions:Object.keys(regionsSet).length,
    industries:Object.keys(indSet).length,champWon:!!G._champWon,survivedRecession:!!G._sawRecessionSurvive};
  ACHIEVEMENTS.forEach(a=>{
    if(G.achieved[a.id])return;const t=ACH_TESTS[a.id];if(!t)return;
    if(t(ctx)){G.achieved[a.id]=G.month;
      pushFeed('world',`Achievement unlocked: ${a.name}`,'good');
      toast(`${a.icon} ${a.name}`,a.desc);}
  });
}

function toast(title,body){

/* ============================================================
   MAIN MONTHLY STEP
   ============================================================ */
function step(){
  if(G.gameOver)return;
  G.month++; G.year=2025+Math.floor(G.month/12); G.turn=(G.turn||0)+1;
  rollNarrative(); recomputeMacros();
  recompute();
  const fin=G.fin;const co=pc();
  co.cash+=fin.net;
  const salary=(co.ceoSalary||0)/12;
  if(co.cash>=salary){co.cash-=salary;G.personalCash=(G.personalCash||0)+salary;}

function makeChild(parA,parB){
  const app=(parA&&parB&&parA.app&&parB.app)?childAppearance(parA.app,parB.app):randomAppearance();
  const pA=parA?overall(parA)/100:0.5,pB=parB?overall(parB)/100:0.5;

  c.parentIds=[parA?parA.id:null,parB?parB.id:null];
  c.gen=(parA?parA.gen||1:1)+1;c.family='blood';c.role='Heir';

/* ---- division valuation / divest ---- */
function divisionValue(d){
  let rev=0,net=0;
  divProducts(d).forEach(p=>{if(p.perf){rev+=p.perf.rev||0;net+=p.perf.gross||0;}});
  const sec=SECTORBY[d.sectorKey];
  let mult=1.2+sec.growth*14;
  let v=rev*12*mult;
  if(net>0)v=Math.max(v,net*12*8);
  return Math.max(0.5,v);
}
function divestDivision(id){
  const d=divById(id);if(!d)return;
  (d.products||[]).forEach(pid=>{delete G.products[pid];});
  const idx=G.divisions.findIndex(x=>x.id===id);if(idx>=0)G.divisions.splice(idx,1);
  rebuildIndexes();recompute();
}

const FUNDING_ROUNDS=[
  {key:'pre',name:'Pre-Seed',min:0.3,max:1.5,dil:0.10,valReq:0},
  {key:'seed',name:'Seed',min:1.5,max:5,dil:0.14,valReq:4},
  {key:'a',name:'Series A',min:6,max:20,dil:0.18,valReq:25},
  {key:'b',name:'Series B',min:20,max:70,dil:0.16,valReq:110},
  {key:'c',name:'Series C',min:70,max:220,dil:0.14,valReq:350},
  {key:'d',name:'Series D',min:220,max:650,dil:0.12,valReq:1000},
];
function nextFundingRound(){const done=pc().roundsDone||[];for(const r of FUNDING_ROUNDS){if(!done.includes(r.key))return r;}return null;}
function canRaise(r){const co=pc();if(co.public)return false;return (co.valuation||companyValuation())>=r.valReq;}
function raiseRound(r){
  const co=pc();if(co.public){toast('Already public','Use secondary offerings.');return;}
  if(!canRaise(r)){toast('Valuation too low',`Need ~$${r.valReq}M for ${r.name}.`);return;}
  const val=co.valuation||companyValuation();
  const amount=round1(clamp(val*r.dil,r.min,r.max));
  const newShares=Math.round(co.shares*(r.dil/(1-r.dil)));
  co.shares+=newShares;co.cash+=amount;
  co.roundsDone=co.roundsDone||[];co.roundsDone.push(r.key);
  co.investorShares=(co.investorShares||0)+newShares;
  co.stage=r.name;
  pushFeed('money',`Raised $${amount}M in ${r.name} at $${round1(val)}M valuation.`,'good');
  toast(`💰 ${r.name} closed`,`+$${amount}M raised.`);
  recompute();checkAchievements();
}
function takeLoan(amount){
  const co=pc();
  const maxLoan=Math.max(5,(co.valuation||companyValuation())*0.4-totalDebt());
  if(amount<=0){toast('Enter an amount','');return;}
  if(amount>maxLoan){toast('Loan too large',`Max ~$${round1(maxLoan)}M.`);return;}
  G.loans=G.loans||[];G.loans.push({principal:amount,rate:G.macro.rates});co.cash+=amount;
  pushFeed('money',`Borrowed $${amount}M at ${pct(G.macro.rates)} APR.`,'neutral');
  recompute();
}
function repayDebt(amount){
  const co=pc();amount=Math.min(amount,totalDebt(),Math.max(0,co.cash));
  if(amount<=0){toast('Nothing to repay','');return;}
  co.cash-=amount;let rem=amount;
  G.loans=(G.loans||[]).map(l=>{if(rem<=0)return l;const pay=Math.min(l.principal,rem);l.principal-=pay;rem-=pay;return l;}).filter(l=>l.principal>0.001);
  pushFeed('money',`Repaid $${round1(amount)}M of debt.`,'good');recompute();
}
function goPublic(){
  const co=pc();if(co.public){toast('Already public','');return;}
  const val=co.valuation||companyValuation();
  if(val<200){toast('Too early',`IPO needs ~$200M+ (now $${round1(val)}M).`);return;}
  const floatPct=0.20;const raised=round1(val*floatPct);
  const newShares=Math.round(co.shares*(floatPct/(1-floatPct)));
  co.shares+=newShares;co.publicShares=newShares;co.cash+=raised;co.public=true;co.ipoMonth=G.month;co.stage='Public';
  co.reputation=clamp(co.reputation+8,0,100);
  pushFeed('money',`${co.name} (${co.ticker}) IPO'd, raising $${raised}M at $${round1(val)}M.`,'good');
  toast('🔔 IPO complete',`${co.ticker} is now public.`);
  recompute();checkAchievements();
}
function payDividend(perc){
  const co=pc();if(!co.public){toast('Private company','Dividends apply once public.');return;}
  const amt=Math.max(0,co.cash)*perc;if(amt<=0)return;
  co.cash-=amt;const toFam=amt*personalShares();G.personalCash=(G.personalCash||0)+toFam;
  pushFeed('money',`Declared $${round1(amt)}M dividend; $${round1(toFam)}M to you.`,'good');recompute();
}
function buyback(amount){
  const co=pc();if(!co.public){toast('Private company','Buybacks apply once public.');return;}
  amount=Math.min(amount,Math.max(0,co.cash));if(amount<=0)return;
  const val=co.valuation||companyValuation();const sharesBought=Math.round(co.shares*(amount/val));
  co.shares-=sharesBought;co.publicShares=Math.max(0,(co.publicShares||0)-sharesBought);co.cash-=amount;
  pushFeed('money',`Repurchased $${round1(amount)}M of stock.`,'good');recompute();
}
function sellFounderShares(perc){
  const co=pc();if(!co.public){toast('Private company','Can only sell on public markets.');return;}
  const val=co.valuation||companyValuation();const sharesToSell=Math.round((co.famShares||co.shares)*perc);
  const proceeds=val*(sharesToSell/co.shares);
  co.famShares=(co.famShares||co.shares)-sharesToSell;co.publicShares=(co.publicShares||0)+sharesToSell;
  G.personalCash=(G.personalCash||0)+proceeds;
  pushFeed('money',`Sold ${pct(perc)} of your stake for $${round1(proceeds)}M.`,'neutral');checkAchievements();
}

   M&A
   ============================================================ */
function acquireRival(rid,premium){
  const co=pc();const r=rivalById(rid);if(!r||!r.alive)return;
  premium=premium||0.3;const price=round1((r.valuation||rivalValuation(r))*(1+premium));
  let cashPart=Math.min(co.cash,price);let stockPart=price-cashPart;
  if(stockPart>0&&!co.public){toast('Insufficient cash','Go public to fund deals with stock.');return;}
  co.cash-=cashPart;
  if(stockPart>0){const val=co.valuation||companyValuation();const newShares=Math.round(co.shares*(stockPart/val));co.shares+=newShares;}
  // absorb rival as a division built from its largest presence
  const mainPres=r.presences.length?r.presences.reduce((a,b)=>(b.quality>a.quality?b:a)):{sectorKey:pick(sectorsOf(r.indKey)).key,quality:r.quality,brand:r.brand};
  const d=makeDivision({sectorKey:mainPres.sectorKey,name:r.name});
  d.efficiency=clamp(40+(r.scale-50)*0.4,20,90);
  G.divisions.push(d);
  const p=makeProduct({divId:d.id,name:r.name+' Core',sectorKey:mainPres.sectorKey,
    quality:r.quality,brand:r.brand,launchedRegions:[...new Set(r.presences.map(x=>x.region))].slice(0,3)});
  if(!p.launchedRegions.length)p.launchedRegions=['na'];
  G.products[p.id]=p;d.products.push(p.id);
  r.alive=false;
  G.stats=G.stats||{};G.stats.acquisitions=(G.stats.acquisitions||0)+1;
  pushFeed('deal',`Acquired ${r.name} for $${price}M${stockPart>0?' (cash+stock)':''}.`,'good');
  toast('🤝 Acquisition closed',`${r.name} folded into the empire.`);
  rebuildIndexes();recompute();checkAchievements();
}
function hostileTakeover(rid){const r=rivalById(rid);if(!r||!r.public){toast('Not possible','Target must be public.');return;}acquireRival(rid,0.6);}

   TECH RESEARCH
   ============================================================ */
function techUnlocked(id){return (G.tech.unlocked||[]).includes(id);}
function techPrereqsMet(node){
  if(node.tier===0)return true;
  const sameBranchLower=TECH_TREE.filter(t=>t.branch===node.branch&&t.tier===node.tier-1);
  if(!sameBranchLower.length)return true;
  return sameBranchLower.some(t=>techUnlocked(t.id));
}
function canResearch(node){
  if(techUnlocked(node.id))return false;
  if(!techPrereqsMet(node))return false;
  return (G.rndBank||0)>=node.cost;
}
function researchTech(id){
  const node=TECHBY[id];if(!node)return;
  if(!canResearch(node)){toast('Cannot research yet','Missing prerequisites or R&D points.');return;}
  G.rndBank-=node.cost;G.tech.unlocked=G.tech.unlocked||[];G.tech.unlocked.push(id);
  rebuildIndexes();recompute();
  pushFeed('rnd',`Researched ${node.name}.`,'good');toast('🔬 Breakthrough',node.name);checkAchievements();
}

function kpiCard(label,value,delta,sub){

  if(delta!=null){const cls=delta>0?'up':delta<0?'down':'';const ar=delta>0?'▲':delta<0?'▼':'■';
    d=`<span class="kpi-trend ${cls}">${ar} ${pct(Math.abs(delta))}</span>`;}
  return `<div class="kpi"><div class="lbl">${esc(label)}</div><div class="big">${value} ${d}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}
function bar(frac,tone){frac=clamp(frac,0,1);
  return `<div class="bar"><span class="${tone||''}" style="width:${(frac*100).toFixed(1)}%"></span></div>`;}
function tag(text,tone){return `<span class="tag ${tone||''}">${esc(text)}</span>`;}
function pill(text,tone){return `<span class="pill ${tone||''}">${esc(text)}</span>`;}
function btn(label,act,args,cls){
  const a=args?Object.entries(args).map(([k,v])=>`data-${k}="${esc(String(v))}"`).join(' '):'';
  return `<button class="btn ${cls||''}" data-act="${act}" ${a}>${label}</button>`;}
function statRow(label,val,tone){
  return `<div class="statrow"><span class="k">${esc(label)}</span><span class="v ${tone||''}">${val}</span></div>`;}
function sparkline(arr,w,h,color){
  if(!arr||arr.length<2)return '';
  w=w||120;h=h||32;const mn=Math.min(...arr),mx=Math.max(...arr),rng=(mx-mn)||1;
  const pts=arr.map((v,i)=>`${(i/(arr.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(' ');
  const last=arr[arr.length-1],first=arr[0];const c=color||(last>=first?'var(--green)':'var(--red)');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${c}" stroke-width="1.5" points="${pts}"/></svg>`;}
function miniBars(arr,w,h){
  if(!arr||!arr.length)return '';w=w||140;h=h||40;const mx=Math.max(...arr,1);const bw=w/arr.length;
  let s=`<svg class="minichart" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  arr.forEach((v,i)=>{const bh=(v/mx)*h;s+=`<rect x="${(i*bw+1).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${(bw-2).toFixed(1)}" height="${bh.toFixed(1)}" fill="var(--gold)" opacity="${0.5+0.5*v/mx}"/>`;});
  return s+'</svg>';}
function sectionTitle(t,right){return `<div class="sectionttl"><span>${esc(t)}</span>${right||''}</div>`;}
function emptyState(msg){return `<div class="empty">${esc(msg)}</div>`;}

/* ---------- main render ---------- */
function render(){
  if(G.gameOver){renderGameOver();return;}
  if(!G.started){renderSetup();return;}
  const screen=SCREENS[UI.tab]?SCREENS[UI.tab]():emptyState('Coming soon');
  setRoot(`${renderHUD()}${renderTabs()}<div class="main">${screen}</div>`);

/* ---------- time loop ---------- */
const SPEED_MS={1:1400,2:700,3:300};
function setSpeed(v){
  UI.speed=v;
  if(UI.timer){clearInterval(UI.timer);UI.timer=null;}
  if(v>0){ UI.timer=setInterval(()=>{ step(); render(); }, SPEED_MS[v]||1000); }
  render();
}
function advance(){ step(); render(); }

/* ---------- modal system ---------- */
function openModal(html,opts){
  opts=opts||{};
  const root=document.getElementById('modalroot');
  const wrap=document.createElement('div'); wrap.className='overlay';
  wrap.innerHTML=`<div class="modal ${opts.cls||''}">
    <button class="mclose" data-act="closemodal">✕</button>${html}</div>`;
  wrap.addEventListener('click',e=>{ if(e.target===wrap)closeModal(); });
  root.appendChild(wrap);
  UI.modalStack.push(wrap);
  requestAnimationFrame(()=>wrap.classList.add('open'));
  if(typeof flushPortraits==='function')flushPortraits();
}
function closeModal(){
  const w=UI.modalStack.pop(); if(w){w.classList.remove('open');setTimeout(()=>w.remove(),220);}
}
function closeAllModals(){ while(UI.modalStack.length)closeModal(); }
function refreshModal(html){
  const w=UI.modalStack[UI.modalStack.length-1]; if(!w)return;
  const m=w.querySelector('.modal'); if(m)m.innerHTML=`<button class="mclose" data-act="closemodal">✕</button>${html}`;
  if(typeof flushPortraits==='function')flushPortraits();
}

/* ---------- pending event modal ---------- */
function renderPendingEvent(){
  if(!G.pendingEvent||UI._eventShown===G.pendingEvent)return;
  const ev=G.pendingEvent; UI._eventShown=ev;
  const html=`<div class="evmodal">
    <div class="evicon">${ev.icon||'❗'}</div>
    <div class="evtitle">${esc(ev.title)}</div>
    <div class="evbody">${esc(ev.body)}</div>
    <div class="evchoices">${ev.choices.map((c,i)=>`<button class="btn primary block" data-act="evchoice" data-i="${i}">${esc(c.label)}</button>`).join('')}</div>
  </div>`;
  openModal(html,{cls:'event'});
}
function resolveEvent(i){
  const ev=G.pendingEvent; if(!ev)return;
  const c=ev.choices[i]; if(c&&c.act)c.act();
  G.pendingEvent=null; UI._eventShown=null;
  closeModal(); recompute(); render();
}

/* ---------- global click + input wiring ---------- */
function wireEvents(){
  document.body.addEventListener('click',e=>{
    const t=e.target.closest('[data-act]'); if(!t)return;
    if(t.tagName==='INPUT'&&t.type==='range')return;
    dispatch(t.getAttribute('data-act'),dataset(t),t);
  });
  document.body.addEventListener('input',e=>{
    const t=e.target.closest('[data-act]'); if(!t)return;
    if(t.tagName==='INPUT'||t.tagName==='SELECT'){
      dispatch(t.getAttribute('data-act'),dataset(t),t);
    }
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&UI.modalStack.length)closeModal();
    if(e.key===' '&&!UI.modalStack.length&&G.started&&!isTyping(e)){e.preventDefault();setSpeed(UI.speed?0:1);}
  });
}
function isTyping(e){const n=e.target.tagName;return n==='INPUT'||n==='TEXTAREA'||n==='SELECT';}
function dataset(el){const o={};for(const a of el.attributes){if(a.name.startsWith('data-')&&a.name!=='data-act')o[a.name.slice(5)]=a.value;}return o;}

/* A titled card container. */
function panel(title,body,opts){
  opts=opts||{};

  const ttl=title?`<div class="cardttl"><span>${esc(title)}</span>${right}</div>`:'';
  return `<div class="card ${opts.cls||''}">${ttl}${body}</div>`;
}

/* Two-column key/value ledger row used in statements. */
function ledgerRow(label,value,cls){
  return `<div class="lr ${cls||''}"><span class="k">${esc(label)}</span><span class="lv">${value}</span></div>`;
}

/* Render a labeled progress meter with a numeric caption. */
function meter(label,frac,caption,tone){
  frac=clamp(frac,0,1);
  return `<div class="meterblock">
    <div class="meterhead"><span class="mlbl">${esc(label)}</span><span class="mcap ${tone||''}">${caption!=null?caption:pct(frac)}</span></div>
    ${bar(frac,tone)}

}

/* Small stat tile with label over value. */
function tile(label,value,tone,sub){
  return `<div class="subtile">

    <div class="val ${tone||''}">${value}</div>

/* A clickable list row representing an entity (division/product/rival/person). */
function entityRow(opts){
  // opts: {act, args, icon, iconColor, title, subtitle, metrics:[{label,value,tone}], right}
  const a=opts.args?Object.entries(opts.args).map(([k,v])=>`data-${k}="${esc(String(v))}"`).join(' '):'';
  const ic=opts.icon?`<div class="erow-ic" style="--ic:${opts.iconColor||'var(--gold)'}">${opts.icon}</div>`:'';
  const mets=(opts.metrics||[]).map(m=>`<div class="erow-met"><span class="em-l">${esc(m.label)}</span><span class="em-v ${m.tone||''}">${m.value}</span></div>`).join('');
  return `<div class="erow ${opts.cls||''}" ${opts.act?`data-act="${opts.act}" ${a}`:''} role="button">
    ${ic}
    <div class="erow-main">
      <div class="erow-title">${esc(opts.title)}</div>
      ${opts.subtitle?`<div class="erow-sub">${opts.subtitle}</div>`:''}
    </div>
    <div class="erow-mets">${mets}</div>
    ${opts.right?`<div class="erow-right">${opts.right}</div>`:''}
  </div>`;
}

/* A data table from headers + rows (rows are arrays of html cells). */
function dataTable(headers,rows,opts){
  opts=opts||{};
  const th=headers.map((h,i)=>`<th class="${opts.align&&opts.align[i]==='r'?'tright':''}">${h}</th>`).join('');
  const tr=rows.map(r=>{
    const attrs=r._attrs||'';
    const cells=(r.cells||r).map((c,i)=>`<td class="${opts.align&&opts.align[i]==='r'?'tright':''}">${c}</td>`).join('');
    return `<tr ${attrs}>${cells}</tr>`;
  }).join('');
  return `<table class="tbl ${opts.cls||''}"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}

/* A donut/pie composition from segments [{label,value,color}]. */
function donut(segments,size,thickness){
  size=size||120;thickness=thickness||16;
  const total=segments.reduce((a,s)=>a+Math.max(0,s.value),0)||1;
  const r=(size-thickness)/2;const cx=size/2,cy=size/2;const circ=2*Math.PI*r;
  let off=0;
  const arcs=segments.map(s=>{
    const frac=Math.max(0,s.value)/total;
    const len=frac*circ;
    const dash=`${len.toFixed(2)} ${(circ-len).toFixed(2)}`;
    const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}" stroke-dasharray="${dash}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len;
    return el;
  }).join('');
  return `<svg class="donut" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}</svg>`;
}

/* Legend for donut/segments. */
function legend(segments){
  return `<div class="legend">${segments.map(s=>`<div class="leg"><span class="lswatch" style="background:${s.color}"></span><span class="lname">${esc(s.label)}</span><span class="lval">${s.cap||''}</span></div>`).join('')}</div>`;
}

/* Multi-series line chart (history). series:[{key,color,label}], data:[{...}] */
function lineChart(data,series,opts){
  opts=opts||{};
  const w=opts.w||640,h=opts.h||220,pad=opts.pad||{l:54,r:14,t:14,b:24};
  if(!data||data.length<2)return `<div class="empty">Not enough history yet.</div>`;
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  let mn=Infinity,mx=-Infinity;
  data.forEach(d=>series.forEach(s=>{const v=d[s.key];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v;}}));
  if(opts.zero)mn=Math.min(mn,0);
  if(mn===Infinity){mn=0;mx=1;}
  if(mn===mx){mx=mn+1;}
  const rng=mx-mn;
  const X=i=>pad.l+(i/(data.length-1))*iw;
  const Y=v=>pad.t+ih-((v-mn)/rng)*ih;
  // gridlines
  let grid='';const gl=4;
  for(let g=0;g<=gl;g++){const val=mn+(rng*g/gl);const y=Y(val);
    grid+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${w-pad.r}" y2="${y.toFixed(1)}" class="cgrid"/>`;
    grid+=`<text x="${pad.l-6}" y="${(y+3).toFixed(1)}" class="caxis" text-anchor="end">${opts.fmt?opts.fmt(val):money0(val)}</text>`;
  }
  const lines=series.map(s=>{
    const pts=data.map((d,i)=>d[s.key]!=null?`${X(i).toFixed(1)},${Y(d[s.key]).toFixed(1)}`:null).filter(Boolean).join(' ');
    return `<polyline fill="none" stroke="${s.color}" stroke-width="2" points="${pts}"/>`;
  }).join('');
  const leg=series.length>1?`<div class="chartleg">${series.map(s=>`<span class="cl"><span class="cld" style="background:${s.color}"></span>${esc(s.label)}</span>`).join('')}</div>`:'';
  return `${leg}<svg class="linechart" width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${grid}${lines}</svg>`;
}

/* Horizontal bar comparison. items:[{label,value,color,cap}] */
function hBars(items,opts){
  opts=opts||{};
  const mx=Math.max(...items.map(i=>i.value),opts.max||0,0.0001);
  return `<div class="hbars">${items.map(it=>`
    <div class="hbar">
      <span class="hb-l">${esc(it.label)}</span>
      <span class="hb-track"><span class="hb-fill" style="width:${(it.value/mx*100).toFixed(1)}%;background:${it.color||'var(--gold)'}"></span></span>
      <span class="hb-v ${it.tone||''}">${it.cap!=null?it.cap:money(it.value)}</span>
    </div>`).join('')}</div>`;
}

/* Region label + flag-ish glyph. */
function regionName(key){return (REGIONS[key]&&REGIONS[key].short)||key;}
function regionFull(key){return (REGIONS[key]&&REGIONS[key].name)||key;}

/* Tone helper for numbers. */
function toneOf(v){return v>0?'good':v<0?'bad':'';}
function arrow(v){return v>0?'▲':v<0?'▼':'■';}

/* Format a delta vs previous value as a small badge. */
function deltaBadge(cur,prev,fmt){
  if(prev==null||prev===0)return '';
  const d=(cur-prev)/Math.abs(prev);
  const cls=d>0?'up':d<0?'down':'';
  return `<span class="kpi-trend ${cls}">${arrow(d)} ${pct(Math.abs(d))}</span>`;
}

/* Stars rating out of 5 from a 0..100 number. */
function stars(v){
  const n=Math.round(clamp(v,0,100)/20);
  let s='';for(let i=0;i<5;i++)s+=i<n?'★':'☆';
  return `<span class="stars">${s}</span>`;
}

/* Format a quality/brand chip with tone. */
function qualityChip(v,label){
  const tone=v>=70?'good':v>=40?'':'bad';
  return `<span class="chip ${tone}">${esc(label||'Q')} ${Math.round(v)}</span>`;
}

/* Tiny inline character portrait (canvas placeholder rendered after). */
let _portraitQueue=[];
function charAvatar(c,size){
  size=size||34;
  if(!c)return `<div class="cavatar" style="width:${size}px;height:${size}px"></div>`;
  const id='pa_'+c.id+'_'+(_portraitQueue.length);
  _portraitQueue.push({id,charId:c.id});
  return `<canvas class="cavatar" id="${id}" width="24" height="30" style="width:${size}px;height:${size}px"></canvas>`;
}
/* After DOM render, paint queued avatars. */
function flushPortraits(){
  _portraitQueue.forEach(q=>{
    const el=document.getElementById(q.id);
    const c=G.chars[q.charId]||(G.figures&&G.figures[q.charId]);
    if(el&&c)drawPortrait(el,c);
  });
  _portraitQueue=[];
}

/* Sector tag with industry color. */
function sectorTag(sectorKey){
  const s=SECTORBY[sectorKey];if(!s)return '';
  return `<span class="ptag" style="--pc:${s.color}">${esc(s.name)}</span>`;
}
function indTag(indKey){
  const i=INDBY[indKey];if(!i)return '';
  return `<span class="ptag" style="--pc:${i.color}">${i.glyph} ${esc(i.short)}</span>`;
}

/* Credit-rating pill tone. */
function ratingTone(r){
  if(['AAA','AA','A'].includes(r))return 'good';
  if(['BBB','BB','B'].includes(r))return '';
  return 'bad';
}

/* Health/morale to descriptor. */
function moraleWord(v){return v>=80?'Thriving':v>=62?'Solid':v>=45?'Strained':v>=28?'Low':'Crisis';}
function moraleTone(v){return v>=62?'good':v>=45?'':'bad';}

/* Big number money for headline (returns html with $ + unit suffix). */
function headlineMoney(v){
  return `<span class="hl-money">$${money(v)}</span>`;
}

/* Build a compact P&L array from G.fin for reuse. */
function plLines(fin){
  fin=fin||G.fin||{};
  return [
    ['Revenue',fin.revenue,false],
    ['Cost of goods sold',-(fin.cogs||0),true],
    ['Gross profit',fin.gross,false,'tot'],
    ['Marketing',-(fin.marketing||0),true],
    ['Research & development',-(fin.rnd||0),true],
    ['Payroll',-(fin.payroll||0),true],
    ['SG&A overhead',-(fin.sga||0),true],
    ['Depreciation',-(fin.deprec||0),true],
    ['Operating income (EBIT)',fin.ebit,false,'tot'],
    ['Interest expense',-(fin.interest||0),true],
    ['Cash yield',fin.cashYield||0,true],
    ['Pre-tax income',fin.pretax,false,'tot'],
    ['Taxes',-(fin.tax||0),true],
    ['Net income',fin.net,false,'tot'],
  ];
}

/* Helper: count distinct industries the player operates in. */
function playerIndustries(){
  const set={};G.divisions.forEach(d=>set[SECTORBY[d.sectorKey].ind]=1);return Object.keys(set);
}
/* Helper: count distinct regions launched. */
function playerRegions(){
  const set={};allProducts().forEach(p=>p.launchedRegions.forEach(r=>set[r]=1));return Object.keys(set);
}
/* Helper: total share-weighted market presence count. */
function playerMarkets(){
  const set={};allProducts().forEach(p=>p.launchedRegions.forEach(r=>set[p.sectorKey+'|'+r]=1));return Object.keys(set).length;
}

/* Render the activity feed (n items). */
function renderFeed(n){
  const items=(G.feed||[]).slice(0,n||20);
  if(!items.length)return emptyState('No activity yet.');
  return `<div class="feed">${items.map(f=>{

  }).join('')}</div>`;
}

/* ------------------------------------------------------------
   PRODUCTS — full product portfolio with performance.
   ------------------------------------------------------------ */
SCREENS.products=function(){
  const prods=allProducts();
  const totRev=prods.reduce((a,p)=>a+(p.perf&&p.perf.rev||0),0);
  const totUnits=prods.reduce((a,p)=>a+(p.perf&&p.perf.units||0),0);
  const totGross=prods.reduce((a,p)=>a+(p.perf&&p.perf.gross||0),0);

  const head=panel('Product Portfolio',`
    <div class="g4">
      ${tile('Active Products',prods.length)}
      ${tile('Total Revenue','$'+money(totRev))}
      ${tile('Gross Profit','$'+money(totGross),toneOf(totGross))}
      ${tile('Total Units',units(totUnits))}
    </div>
  `,{right:G.divisions.length?btn('+ Launch Product','newprod',{div:G.divisions[0].id},'primary sm'):''});

  if(!prods.length){
    return head+panel('Products',emptyState(G.divisions.length?'No products yet. Launch one inside a division.':'Found a division first, then launch products.'));
  }

  // sortable table
  const sortKey=UI.sort.products||'rev';
  const rows=prods.map(p=>{
    const d=divById(p.divId);const sec=SECTORBY[p.sectorKey];
    const perf=p.perf||{};
    const margin=perf.margin||0;
    const opMargin=perf.rev>0?(perf.gross-p.mktInvest-p.rndInvest)/perf.rev:0;
    return {
      _attrs:`data-act="openprod" data-id="${p.id}" role="button" class="clickrow"`,
      rev:perf.rev||0,units:perf.units||0,quality:p.quality,share:perf.share||0,margin,
      cells:[
        `<div class="prodcell"><span class="pdot" style="--pc:${sec.color}"></span><div><div class="pname">${esc(p.name)}</div><div class="psub">${esc(sec.name)} · ${esc(d?d.name:'')}</div></div></div>`,
        qualityChip(p.quality,'Q'),
        Math.round(p.priceIdx)+'',
        pct(perf.share||0),
        '$'+money(perf.rev||0),
        '$'+money(perf.gross||0),
        `<span class="${margin>0.3?'good':margin<0?'bad':''}">${pct(margin)}</span>`,
        units(perf.units||0),
      ]
    };
  }).sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));

  const tbl=dataTable(
    ['Product','Quality','Price','Share','Revenue','Gross','Margin','Units'],
    rows,
    {align:['l','l','r','r','r','r','r','r'],cls:'prodtbl'}
  );

  // best/worst callouts
  const sorted=[...prods].sort((a,b)=>(b.perf&&b.perf.gross||0)-(a.perf&&a.perf.gross||0));
  const best=sorted[0],worst=sorted[sorted.length-1];
  const callouts=`<div class="g2">
    ${panel('Top Performer',best?`<div class="callout"><div class="co-name">${esc(best.name)}</div><div class="co-stat good">$${money(best.perf&&best.perf.gross||0)} gross / mo</div><div class="hint">${pct(best.perf&&best.perf.margin||0)} margin · ${pct(best.perf&&best.perf.share||0)} share</div></div>`:emptyState('—'))}
    ${panel('Needs Attention',worst&&worst!==best?`<div class="callout"><div class="co-name">${esc(worst.name)}</div><div class="co-stat ${(worst.perf&&worst.perf.gross||0)<0?'bad':''}">$${money(worst.perf&&worst.perf.gross||0)} gross / mo</div><div class="hint">Consider repricing, R&D, or discontinuation.</div></div>`:emptyState('All products healthy.'))}
  </div>`;

  return head+callouts+panel('All Products',tbl);
};

   MARKETS — competitive landscape by sector & region.

  const touched={};
  allProducts().forEach(p=>p.launchedRegions.forEach(rg=>{touched[p.sectorKey+'|'+rg]={sk:p.sectorKey,rg};}));
  const keys=Object.keys(touched);

  const head=panel('Markets You Compete In',`
    <div class="g4">
      ${tile('Active Markets',keys.length)}
      ${tile('Industries',playerIndustries().length)}
      ${tile('Regions',playerRegions().length+' / 6')}
      ${tile('Live Rivals',(G.rivalCos||[]).filter(r=>r.alive).length)}
    </div>
    <div class="hint" style="margin-top:8px">A market is one sector in one region. Your share depends on product quality, brand, and price against every rival present.</div>
  `);

  if(!keys.length){
    return head+panel('Competition',emptyState('Launch a product to enter a market and see the competitive field.'));
  }

  const blocks=keys.map(k=>{
    const {sk,rg}=touched[k];
    const sec=SECTORBY[sk];
    const comps=computeMarket(sk,rg);
    const tam=marketTAM(sk,rg);
    comps.sort((a,b)=>b.share-a.share);
    const segs=comps.slice(0,8).map(c=>({
      label:c.kind==='player'?'★ '+(c.prod?c.prod.name:'You'):(c.rival?c.rival.name:'Rival'),
      value:c.share,
      color:c.kind==='player'?'var(--gold)':rivalColor(c.rival||{indKey:sec.ind}),
      cap:pct(c.share),
      tone:c.kind==='player'?'gold':''
    }));
    const myShare=comps.filter(c=>c.kind==='player').reduce((a,c)=>a+c.share,0);
    return `<div class="card marketcard">
      <div class="cardttl"><span>${esc(sec.name)} · ${regionFull(rg)}</span><span class="hint">TAM $${money0(tam)}/yr</span></div>
      <div class="row" style="gap:6px;margin-bottom:8px">
        ${pill('Your share '+pct(myShare),myShare>0.3?'good':'')}
        ${pill('Growth '+pct(sec.growth))}
        ${pill('Network '+(sec.network>0.6?'High':sec.network>0.35?'Med':'Low'))}
        ${sec.reg>0.7?pill('Heavy regulation','bad'):''}
      </div>
      ${hBars(segs,{max:Math.max(...segs.map(s=>s.value),0.2)})}
    </div>`;
  }).join('');

  // sector explorer — all sectors with entry hints
  const explorer=panel('Sector Explorer',`
    <div class="hint" style="margin-bottom:8px">Every sector available to enter. Unlocked sectors depend on your tech. Tap a division to add products in these markets.</div>
    <div class="g2">
      ${INDUSTRIES.map(ind=>{
        const secs=sectorsOf(ind.key);
        const unlocked=unlockedSectors();
        return `<div class="indblock">
          <div class="indblock-h" style="--ic:${ind.color}">${ind.glyph} ${esc(ind.name)} <span class="dim">${indMacroLabel(ind.key)}</span></div>
          <div class="sectorchips">${secs.map(s=>{
            const isOpen=unlocked.has(s.key);
            return `<span class="schip ${isOpen?'':'locked'}" title="${esc(s.name)}">${esc(s.name)} ${isOpen?'':'🔒'}</span>`;
          }).join('')}</div>
        </div>`;
      }).join('')}
    </div>
  `);

  return head+`<div class="marketgrid">${blocks}</div>`+explorer;
};

function indMacroLabel(indKey){
  const v=(G.indMacro&&G.indMacro[indKey])||1;
  const tone=v>=1.1?'good':v<=0.9?'bad':'dim';
  return `<span class="${tone}">${v>=1?'+':''}${pct(v-1)}</span>`;
}

/* ------------------------------------------------------------

   ------------------------------------------------------------ */
SCREENS.rnd=function(){
  const bank=G.rndBank||0;
  const perMo=G.fin.rndPoints||0;
  const unlocked=G.tech.unlocked||[];

  const head=panel('Research & Development',`
    <div class="g4">
      ${tile('R&D Bank',Math.round(bank)+' pts','gold')}
      ${tile('Generation','+'+Math.round(perMo)+' / mo',perMo>0?'good':'')}
      ${tile('Unlocked',unlocked.length+' / '+TECH_TREE.length)}
      ${tile('Researchers',units(researchHeadcount()))}
    </div>
    <div class="hint" style="margin-top:8px">R&D points come from your Research staff, product R&D budgets, and division research budgets. Spend them on the tree below to unlock permanent bonuses and new sectors.</div>
  `);

  // branch columns
  const branches=Object.keys(TECH_BRANCHES);
  const cols=branches.map(br=>{
    const nodes=TECH_TREE.filter(t=>t.branch===br).sort((a,b)=>a.tier-b.tier);
    const owned=nodes.filter(n=>unlocked.includes(n.id)).length;
    const cards=nodes.map(n=>{
      const isOwned=unlocked.includes(n.id);
      const canDo=canResearch(n);
      const prereqOk=techPrereqsMet(n);
      let stateCls=isOwned?'owned':canDo?'avail':prereqOk?'tooexp':'locked';
      const eff=Object.entries(n.eff||{}).map(([k,v])=>effLabel(k,v)).filter(Boolean).join(' · ');
      return `<div class="technode ${stateCls}" data-act="techinfo" data-key="${n.id}" role="button">
        <div class="tn-head">
          <span class="tn-tier">T${n.tier}</span>
          <span class="tn-name">${esc(n.name)}</span>
          ${isOwned?'<span class="tn-check">✓</span>':`<span class="tn-cost ${canDo?'good':''}">${n.cost}</span>`}
        </div>
        <div class="tn-desc">${esc(n.desc)}</div>
        ${n.unlock?`<div class="tn-unlock">🔓 Unlocks: ${n.unlock.map(s=>SECTORBY[s]?SECTORBY[s].name:s).join(', ')}</div>`:''}
        ${!isOwned&&canDo?`<div class="tn-action">${btn('Research ('+n.cost+')','research',{key:n.id},'primary block sm')}</div>`:''}
        ${!isOwned&&!prereqOk?`<div class="tn-locked">Requires earlier ${TECH_BRANCHES[br]} tech</div>`:''}
      </div>`;
    }).join('');
    return `<div class="techcol">
      <div class="techcol-head">${esc(TECH_BRANCHES[br])} <span class="dim">${owned}/${nodes.length}</span></div>
      ${cards}
    </div>`;
  }).join('');

  const tree=panel('Technology Tree',`<div class="techtree">${cols}</div>`);

  // active bonuses summary
  const tb=G.techBonus||{};
  const bonusItems=Object.entries(tb).map(([k,v])=>(v&&effLabel(k,v))?`<span class="chip">${effLabel(k,v)}</span>`:'').filter(Boolean).join('');
  const bonuses=panel('Active Tech Bonuses',bonusItems?`<div class="chiprow">${bonusItems}</div>`:emptyState('No technologies unlocked yet.'));

  return head+bonuses+tree;
};

function researchHeadcount(){let n=0;G.divisions.forEach(d=>n+=(d.employees&&d.employees.Research)||0);return n;}
function effLabel(k,v){
  const pctv=(x)=>(x>0?'+':'')+Math.round(x*100)+'%';
  const map={
    qcap:'+'+v+' quality cap',rndmult:pctv(v)+' R&D',brand:pctv(v)+' brand wt',network:'+'+v.toFixed(2)+' network',
    cost:pctv(v)+' unit cost',cap:pctv(v)+' capacity',shock:pctv(v)+' shock',launch:pctv(v)+' launch cost',
    margin:'+'+v.toFixed(2)+' margin cap',mktmult:pctv(v)+' marketing',organic:pctv(v)+' organic',
    branddecay:pctv(v)+' brand decay',churn:pctv(v)+' churn',elastic:'+'+v.toFixed(2)+' pricing power',
    sga:pctv(v)+' SG&A',acqcost:pctv(v)+' acq cost',integration:pctv(v)+' integration',rate:pctv(v)+' rates',
    yield:pctv(v)+' cash yield',tax:Math.round(v*100)+'pt tax',multiple:'+'+v.toFixed(1)+' val mult',
    raise:pctv(v)+' raises',synergy:pctv(v)+' synergy',board:pctv(v)+' board',breakthrough:'breakthroughs',variance:'variance'
  };
  return map[k]||'';
}

SCREENS.finance=function(){
  const co=pc();const fin=G.fin||{};

  // ---- headline ----
  const head=panel('Finance',`
    <div class="g4">
      ${tile('Cash','$'+money(co.cash),co.cash<0?'bad':'')}
      ${tile('Total Debt','$'+money(totalDebt()),totalDebt()>0?'':'')}
      ${tile('Monthly Net','$'+signedMoney(fin.net||0),toneOf(fin.net))}
      ${tile('Valuation','$'+money(co.valuation||0),'gold')}
    </div>
  `);

  // ---- P&L statement ----
  const pl=plLines(fin);
  const plStmt=panel('Income Statement (monthly)',`
    <div class="ledger">${pl.map(r=>ledgerRow(r[0],(r[1]<0?'-$':'$')+money(Math.abs(r[1]||0)),(r[3]||'')+(r[2]?' sub':'')+' '+((r[1]||0)<0&&!r[2]?'':''))).join('')}</div>

    </div>

  // ---- balance sheet (approx) ----
  const assets=Math.max(0,co.cash)+assetsBookValue();
  const liabilities=totalDebt();
  const equity=assets-liabilities;
  const balStmt=panel('Balance Sheet',`
    <div class="ledger">
      ${ledgerRow('Cash & equivalents','$'+money(Math.max(0,co.cash)))}
      ${ledgerRow('Property & equipment','$'+money(assetsBookValue()))}
      ${ledgerRow('Total assets','$'+money(assets),'tot')}
      ${ledgerRow('Debt outstanding','-$'+money(liabilities))}
      ${ledgerRow('Total liabilities','-$'+money(liabilities),'tot')}
      ${ledgerRow('Shareholder equity','$'+money(equity),'tot '+(equity<0?'bad':''))}
    </div>
  `);

  // ---- cash flow ----
  const cfStmt=panel('Cash Flow (monthly)',`

      ${ledgerRow('Operating cash flow','$'+signedMoney((fin.net||0)+(fin.deprec||0)),toneOf((fin.net||0)+(fin.deprec||0)))}

      ${ledgerRow('Interest paid','-$'+money(fin.interest||0))}

      ${ledgerRow('Net change in cash','$'+signedMoney((fin.net||0)-estCapex()),'tot')}
    </div>
    <div class="hint" style="margin-top:6px">Runway: ${runwayLabel(co,fin)}</div>
  `);

  // ---- capital structure / equity ----
  const fam=co.famShares||0;const famPct=co.shares?fam/co.shares:1;
  const equityCard=panel('Capital Structure',`
    <div class="row" style="gap:18px;align-items:center">
      <div>${donut([
        {label:'Founder/Family',value:fam,color:'var(--gold)'},
        {label:'Investors',value:co.investorShares||0,color:'var(--blue)'},
        {label:'Public float',value:co.publicShares||0,color:'var(--teal)'},
      ],112,16)}</div>
      <div style="flex:1">${legend([
        {label:'You & family',color:'var(--gold)',cap:pct(famPct)},
        {label:'Investors',color:'var(--blue)',cap:pct(co.shares?(co.investorShares||0)/co.shares:0)},
        {label:'Public',color:'var(--teal)',cap:pct(co.shares?(co.publicShares||0)/co.shares:0)},
      ])}
      <div class="hint" style="margin-top:6px">Your stake is worth <b class="gold">$${money(personalEquityValue())}</b></div>
      </div>
    </div>
  `);

  // ---- actions: funding ----
  const next=nextFundingRound();
  let fundingBody='';
  if(co.public){
    fundingBody=`<div class="goodbox">You are public (${esc(co.ticker)}). Use secondary offerings, buybacks, and dividends below.</div>`;
  }else if(next){
    const can=canRaise(next);
    const val=co.valuation||0;
    fundingBody=`
      <div class="fundrow">
        <div><div class="fr-name">${esc(next.name)}</div><div class="hint">Dilutes ~${pct(next.dil)} · needs ~$${next.valReq}M valuation</div></div>
        <div>${can?btn('Raise '+next.name,'raise',{key:next.key},'primary sm'):pill('Valuation too low','bad')}</div>
      </div>
      <div class="rounds">${FUNDING_ROUNDS.map(r=>{
        const done=(co.roundsDone||[]).includes(r.key);
        return `<span class="roundpill ${done?'done':r.key===next.key?'next':''}">${r.name}${done?' ✓':''}</span>`;
      }).join('')}</div>`;
  }else{
    fundingBody=`<div class="infobox">All private rounds raised. Consider an IPO to access public capital.</div>`;
  }
  const funding=panel('Fundraising',fundingBody);

  // ---- debt ----
  const debt=panel('Debt',`
    <div class="g2">
      ${tile('Outstanding','$'+money(totalDebt()))}
      ${tile('Interest / mo','$'+money(fin.interest||0))}
    </div>
    <div class="btnrow" style="margin-top:10px">
      ${btn('Take Loan','loan',{},'sm')}
      ${totalDebt()>0?btn('Repay Debt','repay',{},'ghost sm'):''}
    </div>
    <div class="hint" style="margin-top:6px">Borrowing capacity ~$${money(Math.max(0,(co.valuation||0)*0.4-totalDebt()))}M at ${pct(G.macro.rates)} APR.</div>
  `);

  // ---- equity actions (public only) ----
  let equityActions='';
  if(co.public){
    equityActions=panel('Shareholder Actions',`
      <div class="btnrow wrap">
        ${btn('Pay Dividend 2%','dividend',{p:0.02},'sm')}
        ${btn('Pay Dividend 5%','dividend',{p:0.05},'sm')}
        ${btn('Buyback Stock','buyback',{},'ghost sm')}
        ${btn('Sell Your Shares','sellshares',{},'ghost sm')}
      </div>
      <div class="hint" style="margin-top:6px">Dividends and share sales move company cash into your personal cash. Buybacks raise your ownership %.</div>
    `);
  }else{
    const val=co.valuation||0;
    equityActions=panel('Go Public',`
      <div class="infobox">An IPO floats ~20% of the company, raising capital and unlocking stock-funded acquisitions. Requires ~$200M+ valuation (now $${money(val)}M).</div>
      <div class="btnrow" style="margin-top:10px">${val>=200?btn('Begin IPO','ipo',{},'primary'):pill('Not ready for IPO','bad')}</div>
    `);
  }

  // ---- CEO salary ----
  const salaryCard=panel('CEO Compensation',`
    <div class="statrow"><span class="k">Annual salary</span><span class="v gold" id="salaryLabel">$${money(co.ceoSalary||0)}M</span></div>
    <input class="range" type="range" min="0" max="100" step="1" value="${co.ceoSalary||0}" data-act="setsalary"/>
    <div class="hint">Salary is paid from company cash into your personal wealth each month. High salaries drain the company but build your fortune.</div>
  `);

  return head+
    `<div class="g3">${plStmt}${balStmt}${cfStmt}</div>`+
    `<div class="g2">${equityCard}${funding}</div>`+
    `<div class="g2">${debt}${equityActions}</div>`+
    salaryCard;
};

function assetsBookValue(){let v=0;G.divisions.forEach(d=>(d.facilities||[]).forEach(f=>v+=f.value||0));return v;}
function estCapex(){return 0;}
function runwayLabel(co,fin){
  const burn=-(fin.net||0);
  if(burn<=0)return '<span class="good">Profitable — indefinite</span>';
  const months=co.cash/burn;
  if(months<0)return '<span class="bad">Already negative</span>';
  if(months<6)return `<span class="bad">${months.toFixed(1)} months</span>`;
  if(months<18)return `<span class="orange">${months.toFixed(1)} months</span>`;
  return `<span class="good">${months.toFixed(0)}+ months</span>`;
}

   M&A / DEALS — acquire rivals, hostile takeovers, pending event.
   ------------------------------------------------------------ */
SCREENS.deals=function(){
  const co=pc();
  const rivals=(G.rivalCos||[]).filter(r=>r.alive);
  updateRivalValuations();
  rivals.sort((a,b)=>b.valuation-a.valuation);

  const head=panel('Mergers & Acquisitions',`
    <div class="g4">
      ${tile('Acquisitions',(G.stats&&G.stats.acquisitions)||0)}
      ${tile('War Chest','$'+money(co.cash))}
      ${tile('Stock Currency',co.public?'Available':'IPO first',co.public?'good':'dim')}
      ${tile('Targets',rivals.length)}
    </div>
    <div class="hint" style="margin-top:8px">Acquiring a rival folds its operations into a new division. Cash deals always work; stock deals require being public. A 30% premium is typical; hostile takeovers cost more but work on public targets.</div>
  `);

  // affordable vs aspirational
  const targets=rivals.map(r=>{
    const price=round1((r.valuation||rivalValuation(r))*1.3);
    const canCash=co.cash>=price;
    const canStock=co.public;
    const affordable=canCash||canStock;
    return {r,price,affordable,canCash};
  });
  const sortedT=targets.sort((a,b)=>(b.affordable-a.affordable)||(a.price-b.price));

  const rows=sortedT.map(({r,price,affordable,canCash})=>{
    return entityRow({
      act:'openrival',args:{id:r.id},
      icon:r.logo&&r.logo.glyph||'◆',iconColor:rivalColor(r),
      title:r.name,
      subtitle:`${indTag(r.indKey)} ${r.public?pill('Public'):''} ${tag(r.presences.length+' markets')}`,
      metrics:[
        {label:'Valuation',value:'$'+money(r.valuation||0)},
        {label:'Revenue/yr',value:'$'+money((r.revenue||0)*12)},
        {label:'Buy ~',value:'$'+money(price),tone:affordable?'good':'dim'},
      ],
      right:affordable?btn('Acquire','acquire',{id:r.id},'primary sm'):pill('Too big','dim')
    });
  }).join('');

  const list=panel('Acquisition Targets',rivals.length?`<div class="erows">${rows}</div>`:emptyState('No rival companies remain.'));

  return head+list;
};

    'M470,90 Q540,75 580,100 Q560,140 520,150 Q490,130 470,90 Z', // Europe
    'M480,150 Q560,150 580,220 Q560,300 520,310 Q500,260 500,220 Q480,180 480,150 Z', // Africa
    'M600,110 Q760,90 880,140 Q900,200 820,220 Q720,210 660,180 Q610,160 600,110 Z', // Asia
    'M880,300 Q940,290 950,330 Q930,355 890,345 Q875,325 880,300 Z', // Oceania
  ];
  return blobs.map(d=>`<path d="${d}" fill="var(--panel4)" stroke="var(--line2)" stroke-width="0.5" opacity="0.9"/>`).join('');
}
function regionHeatOverlay(rg,intensity){
  if(intensity<=0.02)return '';
  const centers={na:[210,140],sa:[345,280],eu:[525,115],mea:[530,230],asia:[760,160],oce:[915,325]};
  const c=centers[rg];if(!c)return '';
  const radius=20+intensity*55;
  return `<circle cx="${c[0]}" cy="${c[1]}" r="${radius}" fill="var(--gold)" opacity="${(0.04+intensity*0.16).toFixed(3)}"/>`;
}

function renderFamilyTree(){
  const line=(G.bloodline||[]).map(id=>G.chars[id]).filter(Boolean);
  if(!line.length)return emptyState('No recorded bloodline.');
  // group by generation
  const byGen={};
  line.forEach(c=>{const g=c.gen||1;(byGen[g]=byGen[g]||[]).push(c);});
  const gens=Object.keys(byGen).sort((a,b)=>a-b);
  return `<div class="famtree">${gens.map(g=>`
    <div class="famgen">
      <div class="famgen-lbl">Gen ${g}</div>
      <div class="famgen-row">${byGen[g].map(c=>`
        <div class="fammember ${c.id===G.ceoId?'isceo':''} ${!c.alive?'deceased':''}" data-act="openchar" data-id="${c.id}" role="button">
          ${charAvatar(c,40)}
          <div class="fm-name">${esc(c.first)}</div>
          <div class="fm-meta">${c.alive?('age '+Math.floor(c.age)):'†'} ${c.id===G.ceoId?'· CEO':''}</div>
        </div>`).join('')}</div>
    </div>`).join('')}</div>`;
}

  return hdr+stats+`<div class="modal-cols"><div class="mcol">${pricing}${invest}</div><div class="mcol">${regions}</div></div>`+danger;

/* ---------- NEW GAME ---------- */
function newGame(){
  const s=UI.setup||(initSetupState(),UI.setup);
  const seed=(Date.now()^(Math.random()*1e9))>>>0;
  RNG=rngFrom(seed);

  G={
    seed,month:0,year:2025,turn:0,generation:1,
    difficulty:s.diff,
    chars:{},divisions:[],products:{},rivalCos:[],execs:[],
    tech:{unlocked:[]},rndBank:0,loans:[],
    assets:[],teams:[],
    feed:[],history:[],achieved:{},stats:{acquisitions:0},
    personalCash:0,pendingEvent:null,
    macro:{sentiment:1,growth:1,rates:0.045,baseRates:0.045,regime:null,regimeEnd:0},
    indMacro:{},
    bloodline:[],
    started:true,gameOver:false,
    ui:UI,
  };

  // founder
  const first=(s.first||'').trim()||(s.fem?pick(FIRST_F):pick(FIRST_M));
  const surname=(s.surname||'').trim()||pick(SURNAMES);
  s.app.fem=s.fem;
  const founder=makeCharacter({app:s.app,fem:s.fem,first,surname,name:first+' '+surname,
    stats:s.stats,traits:s.traits,age:s.age,power:0.6});
  founder.role='CEO';founder.gen=1;founder.family='blood';
  G.chars[founder.id]=founder;
  G.founderId=founder.id;G.ceoId=founder.id;
  G.bloodline=[founder.id];

  // spouse + (maybe) a young heir, scaled to founder age
  const spouse=makeCharacter({age:clamp(founder.age+ri(-4,5),22,58),power:rf(0.35,0.75),fem:!s.fem});
  spouse.role='Spouse';spouse.spouseId=founder.id;founder.spouseId=spouse.id;founder.married=true;spouse.married=true;
  G.chars[spouse.id]=spouse;
  // children only if the founder is old enough; ages kept valid
  const maxChildAge=founder.age-18;
  if(maxChildAge>=1){
    let nKids=founder.age>=40?(1+(chance(0.6)?1:0)):founder.age>=30?(chance(0.7)?1:0):(chance(0.3)?1:0);
    for(let k=0;k<nKids;k++){
      const child=makeChild(founder,spouse);
      child.age=clamp(founder.age-24-k*ri(2,4),1,maxChildAge);
      G.chars[child.id]=child;G.bloodline.push(child.id);
    }
  }

  // starting company — bootstrapped, almost no capital
  const coName=(s.company||'').trim()||genCompanyName(s.ind);
  G.co=makeCompany({sectorKey:s.sectorKey,name:coName,hqCity:s.hqCity,cash:DIFFS[s.diff].startCash});
  G.board=[];                       // no outside investors yet — you control 100%
  G.co.famShares=G.co.shares=100;G.co.investorShares=0;
  G.ops=defaultOps();               // operations capability layer
  G.holdings=defaultHoldings();      // family holding-company meta-layer
  G.campaigns=[];G.reviews=[];       // expansion campaigns + annual reviews
  G.industry={};                     // per-industry bespoke systems
  if(typeof ensureIndustryState==='function')ensureIndustryState();
  if(typeof ensureFigures==='function')ensureFigures(typeof playerIndustry==='function'?playerIndustry():null);

  // starting division — just you, the founder. No team yet.
  const startRegion=(CITYBY[s.hqCity]||{}).region||'na';
  const d=makeDivision({sectorKey:s.sectorKey,name:SECTORBY[s.sectorKey].name+' Division',hqRegion:startRegion});
  d.employees={Engineering:1,Sales:0,Operations:0,Marketing:0,Support:0,Research:0,Finance:0};
  d.efficiency=30;d.morale=82;     // scrappy but inexperienced
  G.divisions.push(d);

  // first product — designed at setup
  const focusMap={premium:{q:26,price:122},balanced:{q:21,price:100},lean:{q:17,price:82}};
  const pf=focusMap[s.productFocus]||focusMap.balanced;
  const prodName=(s.productName||'').trim()||genProductName(s.sectorKey);
  const p=makeProduct({divId:d.id,sectorKey:s.sectorKey,name:prodName,
    quality:pf.q,brand:4,priceIdx:pf.price,launchedRegions:[startRegion]});
  G.products[p.id]=p;d.products.push(p.id);

  // seed rivals
  seedRivals();
  // seed sports teams
  seedTeams();
  // init macro & indices
  recomputeMacros();
  rebuildIndexes();
  recompute();
  updateRivalValuations();

  pushFeed('world',`${coName} is founded in ${(CITYBY[s.hqCity]||{}).name||'—'} by ${fullName(founder)} — a one-person company with almost nothing in the bank.`,'good');
  pushFeed('rnd',`You ship the first version of ${p.name}. Now you need customers, capital, and a team.`,'neutral');
  recordHistory();
  autoSave();

  UI.tab='dashboard';
  render();
  toast('◈ Day One',`It's just you and ${p.name}. Build ${coName} into a dynasty.`);
}

function seedRivals(){
  G.rivalCos=[];
  const mySector=G.divisions[0].sectorKey;
  const myInd=SECTORBY[mySector].ind;
  // 8-9 DIRECT competitors in your exact subsector: a few entrenched incumbents + scrappy challengers
  const directN=8+ri(0,1);
  for(let i=0;i<directN;i++){
    const big=i<3;                  // ~3 dominant incumbents, the rest mid/small
    const r=makeRival({big,sectorKey:mySector});
    r.directRival=true;             // tagged as in-sector competitor
    G.rivalCos.push(r);
  }
  // a broad world of other companies across every other sector
  const worldN=36+ri(0,10);
  for(let i=0;i<worldN;i++){
    G.rivalCos.push(makeRival({big:chance(0.20)}));
  }
  // a couple of large diversified players that also touch your industry
  for(let i=0;i<2;i++){
    const sec=pick(sectorsOf(myInd));
    G.rivalCos.push(makeRival({big:true,sectorKey:sec.key}));
  }
  // seed initial revenue so valuations are meaningful
  G.rivalCos.forEach(r=>{
    r.revenue=r.scale*0.04*(r.presences.length)+(r.quality+r.brand)/40;
    r.valuation=rivalValuation(r);
  });
}

function seedTeams(){
  G.teams=[];
  const used={};
  LEAGUES.forEach(lg=>{
    const count=lg.key==='fb'?6:5;
    for(let i=0;i<count;i++){
      const sc=pick(SPORT_CITIES);
      let mascot=pick(MASCOTS);let nm=sc.c+' '+mascot;let guard=0;
      while(used[nm]&&guard<20){mascot=pick(MASCOTS);nm=sc.c+' '+mascot;guard++;}
      used[nm]=1;
      const rating=ri(45,80);
      G.teams.push({id:uid('t'),name:nm,league:lg.key,city:sc.c,
        value:round1(lg.base*sc.m*rf(0.7,1.3)),payroll:round1(lg.base*0.18*rf(0.7,1.2)),
        rating,owned:false,wins:0,losses:0,titles:0,lastSeasonWinPct:0.5,playoffs:false});
    }
  });
}

function eventCtx(){
  const co=pc();
  return {
    co, ceoC:ceo(), prods:allProducts(), divs:G.divisions,
    rivals:(G.rivalCos||[]).filter(r=>r.alive),
    rep:co.reputation||60, cash:co.cash||0, month:G.month||0,
    public:!!co.public, staff:totalEmployees(),
  };
}

/* Convenience effect helpers (kept terse, used inside choice acts). */
function _cash(n){pc().cash=round1((pc().cash||0)+n);}
function _pcash(n){G.personalCash=round1((G.personalCash||0)+n);}
function _rep(n){pc().reputation=clamp((pc().reputation||60)+n,0,100);}
function _brandAll(n){allProducts().forEach(p=>p.brand=clamp(p.brand+n,0,100));}
function _qualAll(n){allProducts().forEach(p=>p.quality=clamp(p.quality+n,0,100));}
function _moraleAll(n){G.divisions.forEach(d=>d.morale=clamp((d.morale||60)+n,0,100));}
function _sent(n){G.macro.sentiment=clamp(G.macro.sentiment+n,0.35,1.9);}
function _sectorMacro(indKey,n){G.indMacro[indKey]=clamp((G.indMacro[indKey]||1)+n,0.4,1.9);}

/* prose paragraph helper */
function cxP(){return [].slice.call(arguments).map(p=>`<p class="cx-p">${p}</p>`).join('');}
function cxH(t){return `<h3 class="cx-h">${esc(t)}</h3>`;}
function cxTip(t){return `<div class="cx-tip"><span class="cx-tip-i">▲</span><span>${t}</span></div>`;}
function cxList(items){return `<ul class="cx-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;}

SCREENS.codex=function(){
  const cat=UI.codexCat||'start';

    `<button class="cx-navbtn ${c.key===cat?'on':''}" data-act="codexcat" data-cat="${c.key}"><span class="cx-navi">${c.icon}</span><span>${esc(c.label)}</span></button>`
  ).join('')}</div>`;
  const meta=CODEX_CATS.find(c=>c.key===cat)||CODEX_CATS[0];
  let body='';try{body=(CODEX_RENDER[cat]||CODEX_RENDER.start)();}catch(e){body=`<p class="cx-p">—</p>`;}
  const content=panel(`${meta.icon}  ${meta.label}`,`<div class="cx-content">${body}</div>`);
  return `<div class="cx-wrap"><div class="cx-side">${panel('Codex',nav)}</div><div class="cx-main">${content}</div></div>`;
};

  // sample history to keep charts readable
  const sample=(arr,n)=>{if(arr.length<=n)return arr;const out=[];const step=(arr.length-1)/(n-1);for(let i=0;i<n;i++)out.push(arr[Math.round(i*step)]);return out;};
  const hs=sample(h,80);

  const valChart=panel('Company Valuation & Personal Net Worth',
    h.length<2?`<div class="empty">History builds as the years pass.</div>`:
    lineChart(hs,[{key:'val',label:'Valuation',color:'var(--gold)'},{key:'nw',label:'Net Worth',color:'var(--teal)'}],
      {w:680,h:230,zero:true,fmt:v=>'$'+money0(v)})+
    legend([{label:'Valuation',color:'var(--gold)'},{label:'Net Worth',color:'var(--teal)'}]));

  const revChart=panel('Revenue & Net Income (annualized)',
    h.length<2?`<div class="empty">History builds as the years pass.</div>`:
    lineChart(hs,[{key:'rev',label:'Revenue',color:'var(--blue)'},{key:'net',label:'Net Income',color:'var(--green)'}],
      {w:680,h:200,zero:true,fmt:v=>'$'+money0(v)})+
    legend([{label:'Revenue',color:'var(--blue)'},{label:'Net Income',color:'var(--green)'}]));

  // annual snapshot table (every 12 months)
  const annual=h.filter((d,i)=>i===h.length-1||d.month%12===0).slice(-14);
  const rows=annual.map((d,i)=>{
    const prev=annual[i-1];
    const grow=prev&&prev.val>0?((d.val-prev.val)/prev.val):null;
    return {cells:[
      esc(dateLabel(d.month)),
      '$'+money(d.val),
      grow==null?'—':`<span class="${grow>=0?'good':'bad'}">${signed(Math.round(grow*100))}%</span>`,
      '$'+money(d.rev),
      `<span class="${d.net>=0?'good':'bad'}">$${money(d.net)}</span>`,
      '$'+money(d.nw),
      '#'+d.rank,
    ]};
  });
  const table=panel('Annual Snapshots',
    annual.length<1?`<div class="empty">No snapshots recorded yet.</div>`:
    dataTable(['Date','Valuation','YoY','Revenue/yr','Net/yr','Net Worth','Rank'],rows,
      {align:['l','r','r','r','r','r','r'],cls:'histtbl'}));

  return head+valChart+revChart+table;
};
