/* ============================================================
   TECH — PRODUCT ROADMAP & PLATFORM WARS
   You run a platform with a user base that compounds through
   network effects. Ship features, fight a rival platform for
   share, manage tech debt, and place moonshot bets that can
   leapfrog the category.
   ============================================================ */
const TECH_FEATURES=[
  {key:'growth', name:'Growth feature',    icon:'📈', months:[2,4], cost:[3,12],  desc:'Acquisition & virality — more users.',      eff:{users:0.10}, debt:5},
  {key:'engage', name:'Engagement feature',icon:'❤️', months:[2,4], cost:[3,10],  desc:'Stickiness & retention — lower churn.',     eff:{engagement:8}, debt:5},
  {key:'monet',  name:'Monetization',      icon:'💵', months:[2,5], cost:[4,14],  desc:'Squeeze more revenue per user.',            eff:{monet:0.05}, debt:6},
  {key:'infra',  name:'Infra / Refactor',  icon:'🧱', months:[2,5], cost:[4,16],  desc:'Pay down tech debt and raise velocity.',    eff:{debt:-22}, debt:0},
];
const TECH_FEATBY={};TECH_FEATURES.forEach(f=>TECH_FEATBY[f.key]=f);
const TECH_MOONSHOTS=[
  {key:'ai',    name:'AI Assistant Platform', icon:'🤖', months:[10,18], cost:[40,110], desc:'An AI layer that redefines the product.',       payoff:{users:0.6,engagement:12,brand:6}},
  {key:'ar',    name:'AR / Spatial Computing', icon:'🥽', months:[12,22], cost:[50,140], desc:'A new computing surface and ecosystem.',       payoff:{users:0.45,engagement:8,brand:8}},
  {key:'silicon',name:'Custom Silicon',       icon:'🔩', months:[14,24], cost:[60,160], desc:'Own the stack — performance and margin edge.',payoff:{users:0.2,monet:0.12,brand:5}},
  {key:'superapp',name:'Super-App Expansion', icon:'📱', months:[8,16],  cost:[30,90],  desc:'Bundle everything into one platform.',         payoff:{users:0.5,monet:0.06,engagement:6}},
];
const TECH_MOONBY={};TECH_MOONSHOTS.forEach(m=>TECH_MOONBY[m.key]=m);
const RIVAL_PLATFORMS=['Nexus','Orbit','Vertex','Halcyon','Pinnacle','Synth','Lumina','Apex'];

function ensureTech(){
  if(!G.industry)G.industry={};
  if(!G.industry.tech)G.industry.tech={users:rf(0.8,2.5),engagement:50,monet:0.04,techDebt:10,share:0.4,rival:pick(RIVAL_PLATFORMS),rivalUsers:rf(2,5),roadmap:[],moonshots:[],shipped:0,tam:rf(420,780)};
  const t=G.industry.tech;['users','engagement','monet','techDebt','share','rivalUsers','shipped'].forEach(k=>{if(t[k]==null)t[k]=0;});if(!t.roadmap)t.roadmap=[];if(!t.moonshots)t.moonshots=[];if(!t.rival)t.rival=pick(RIVAL_PLATFORMS);if(!t.tam||t.tam<50)t.tam=rf(420,780);
}
function techVelocity(){const t=G.industry.tech;return clamp(1.15 - t.techDebt/120,0.35,1.8);}
function shipFeature(typeKey){
  ensureTech();const f=TECH_FEATBY[typeKey];if(!f)return;const t=G.industry.tech;const co=pc();
  const cost=round1(rf(f.cost[0],f.cost[1]));
  if(co.cash<cost){toast('Insufficient cash',`This feature costs $${money(cost)}M to build.`);return;}
  co.cash=round1(co.cash-cost);
  const months=Math.max(1,Math.round(ri(f.months[0],f.months[1])/techVelocity()));
  t.roadmap.push({id:uid('feat'),type:typeKey,name:f.name,icon:f.icon,monthsLeft:months,totalMonths:months,eff:f.eff,debt:f.debt});
  pushFeed('rnd',`Building ${f.name} (−$${money(cost)}M, ~${months} mo).`,'neutral');
  toast(`${f.icon} On the roadmap`,`${f.name}`);
  recompute();render();
}
function launchMoonshot(key){
  ensureTech();const m=TECH_MOONBY[key];if(!m)return;const t=G.industry.tech;const co=pc();
  if(t.moonshots.some(x=>x.key===key)){toast('Already underway','');return;}
  const cost=round1(rf(m.cost[0],m.cost[1]));
  if(co.cash<cost){toast('Insufficient cash',`${m.name} needs $${money(cost)}M.`);return;}
  co.cash=round1(co.cash-cost);
  const months=ri(m.months[0],m.months[1]);
  t.moonshots.push({key,name:m.name,icon:m.icon,monthsLeft:months,totalMonths:months,payoff:m.payoff});
  pushFeed('rnd',`Moonshot launched: ${m.name} (−$${money(cost)}M, ~${months} mo).`,'neutral');
  toast(`${m.icon} Moonshot`,`${m.name} underway`);
  recompute();render();
}
function tickTech(){
  ensureTech();const t=G.industry.tech;const co=pc();const TAM=t.tam||600;
  const sat=()=>clamp(1-t.users/TAM,0,1);   // headroom toward addressable market
  // roadmap progress
  for(let i=t.roadmap.length-1;i>=0;i--){const p=t.roadmap[i];p.monthsLeft--;if(p.monthsLeft<=0){
    if(p.eff.users)t.users=round1(Math.min(TAM*1.02,t.users*(1+p.eff.users*sat())));
    if(p.eff.engagement)t.engagement=clamp(t.engagement+p.eff.engagement,0,100);
    if(p.eff.monet)t.monet=clamp(round1(t.monet+p.eff.monet),0,0.30);
    if(p.eff.debt)t.techDebt=clamp(t.techDebt+p.eff.debt,0,100);
    if(p.debt)t.techDebt=clamp(t.techDebt+p.debt,0,100);
    t.shipped++;pushFeed('rnd',`Shipped ${p.name}.`,'good');
    t.roadmap.splice(i,1);
  }}
  // moonshots
  for(let i=t.moonshots.length-1;i>=0;i--){const m=t.moonshots[i];m.monthsLeft--;if(m.monthsLeft<=0){
    const po=m.payoff;if(po.users)t.users=round1(Math.min(TAM*1.05,t.users*(1+po.users*Math.max(0.25,sat()))));if(po.engagement)t.engagement=clamp(t.engagement+po.engagement,0,100);if(po.monet)t.monet=clamp(round1(t.monet+po.monet),0,0.30);if(po.brand)_brandAll(po.brand);
    pushFeed('rnd',`Moonshot landed: ${m.name} reshapes the platform.`,'good');toast(`${m.icon} Breakthrough`,m.name);
    t.moonshots.splice(i,1);
  }}
  // network effects + competition + churn, saturating toward TAM (S-curve)
  const network=Math.log10(1+t.users)*0.012;
  const churn=0.02*(1-t.engagement/100)+ (t.share<0.5?(0.5-t.share)*0.03:0);
  const growth=clamp((network + 0.004*techVelocity())*sat() - churn,-0.05,0.07);
  t.users=clamp(round1(t.users*(1+growth)),0.1,TAM*1.02);
  // platform war: share drifts by relative momentum
  t.rivalUsers=Math.max(0.1,round1(t.rivalUsers*(1+rf(-0.005,0.02))));
  t.share=clamp(t.users/(t.users+t.rivalUsers),0.02,0.98);
  // tech debt creep + brand from engagement/share
  if(t.roadmap.length)t.techDebt=clamp(t.techDebt+0.2,0,100);
  // platform revenue (supplemental, decoupled from raw sector ARPU) + brand
  const rev=round1(t.users*Math.min(t.monet,0.30)*1.25*(0.6+t.engagement/250));
  if(rev>0)co.cash=round1(co.cash+rev*(typeof industryNetMult==='function'?industryNetMult('tech'):1));
  t._mrev=rev;t._growth=growth;
  if(G.month%12===0){_brandAll(Math.round((t.engagement-50)/25 + (t.share-0.4)*4));}
}
function renderTechScreen(){
  ensureTech();const t=G.industry.tech;
  const head=panel('The Platform',`
    <div class="g4">
      ${tile('Users (MAU)',money(t.users)+'M','gold')}
      ${tile('Engagement',Math.round(t.engagement),t.engagement>60?'good':t.engagement<40?'bad':'')}
      ${tile('Monthly Growth',(t._growth>=0?'+':'')+pct(t._growth||0),(t._growth||0)>=0?'good':'bad')}

function ensureFiguresState(){if(!G.figures)G.figures={};if(!G.figGen)G.figGen={};}
function makeFigure(ind,roleDef){
  const c=makeCharacter({age:ri(26,64),bias:roleDef.bias,power:rf(0.42,0.96)});
  c.ind=ind;c.roleKey=roleDef.key;c.role=roleDef.t;
  c.renown=clamp(ri(18,72)+Math.round((overall(c)-50)/4),0,100);
  c.career=[{year:G.year||2025,text:`Began their career as ${roleDef.t.toLowerCase()==='actor'?'an':'a'} ${roleDef.t.toLowerCase()}.`,kind:'start'}];
  return c;
}
function ensureFigures(ind){
  ensureFiguresState();if(!ind||G.figGen[ind])return;
  const roles=FIGURE_ROLES[ind];if(!roles){G.figGen[ind]=true;return;}
  const n=Math.max(roles.length+4,11);
  for(let i=0;i<n;i++){const rd=i<roles.length?roles[i]:pick(roles);const f=makeFigure(ind,rd);G.figures[f.id]=f;}
  G.figGen[ind]=true;
}
function figById(id){ensureFiguresState();return G.figures[id]||G.chars[id]||null;}
function figuresInIndustry(ind){ensureFiguresState();return Object.values(G.figures).filter(f=>f.ind===ind);}
function renownTier(r){return r<30?'Up-and-comer':r<55?'Established':r<80?'Star':'Legend';}
function renownTone(r){return r<30?'':r<55?'':r<80?'good':'gold';}
function logCareer(figId,text,kind,renownDelta){
  const f=figById(figId);if(!f)return;
  f.career=f.career||[];
  f.career.push({year:G.year,text,kind:kind||'note'});
  if(f.career.length>40)f.career.shift();
  if(renownDelta)f.renown=clamp((f.renown||40)+renownDelta,0,100);
}
function pickFigures(ind,roleKeys,count){
  ensureFigures(ind);count=count||1;
  const pool=figuresInIndustry(ind).filter(f=>f.alive!==false);
  let primary=pool;
  if(roleKeys&&roleKeys.length){const match=pool.filter(f=>roleKeys.includes(f.roleKey));if(match.length)primary=match;}
  primary=primary.slice().sort((a,b)=>(a._used||0)-(b._used||0));
  let out=primary.slice(0,count);
  if(out.length<count){const rest=pool.filter(f=>out.indexOf(f)<0).sort((a,b)=>(a._used||0)-(b._used||0));out=out.concat(rest.slice(0,count-out.length));}
  out.forEach(f=>f._used=(f._used||0)+1);
  return out.map(f=>f.id);
}

function tickFigures(){
  ensureFiguresState();const inds=(typeof industriesActive==='function')?industriesActive():[typeof playerIndustry==='function'?playerIndustry():null];

  const roster=figuresInIndustry(ind);

    if(f.alive===false)return;
    if(chance(0.004)){
      const beats=[
        ()=>logCareer(f.id,'Won a major industry award.','award',5),
        ()=>logCareer(f.id,'Featured on the cover of an industry magazine.','press',3),
        ()=>logCareer(f.id,'Poached by a rival house — for now.','move',-2),
        ()=>{f.renown=clamp(f.renown-4,0,100);logCareer(f.id,'A public misstep dented their standing.','scandal',0);},
      ];pick(beats)();
    }
  });
  if(G.month%12===0){
    roster.forEach(f=>{
      f.age=(f.age||40)+1;
      if(f.age>66&&f.alive!==false&&chance(0.12)){f.alive=false;logCareer(f.id,'Retired from the industry, a celebrated career behind them.','retire',0);}
    });
    // refresh the bench: bring in a rising newcomer
    if(roster.length<16&&FIGURE_ROLES[ind]){const rd=pick(FIGURE_ROLES[ind]);const nf=makeFigure(ind,rd);nf.age=ri(24,34);nf.renown=ri(12,32);G.figures[nf.id]=nf;}
  }
  });
}

const CONS_CATS=[
  {key:'apparel',name:'Apparel',icon:'👕',price:14},

  {key:'snack',name:'Snack Food',icon:'🍫',price:7},

const CONS_CATBY={};CONS_CATS.forEach(c=>CONS_CATBY[c.key]=c);
const CONS_CHANNELS=[{key:'dtc',name:'Direct-to-Consumer',reach:0.5,margin:1.0},{key:'specialty',name:'Specialty Retail',reach:1.2,margin:0.72},{key:'mass',name:'Big-Box / Mass',reach:2.6,margin:0.46}];
const CONS_TRENDS=['Health & Wellness','Nostalgia','Sustainability','Viral / Social','Luxury & Status','Minimalism','Bold & Maximalist'];
function ensureConsumer(){if(!G.industry)G.industry={};if(!G.industry.consumer)G.industry.consumer={lines:[],trend:pick(CONS_TRENDS),trendMo:0};const c=G.industry.consumer;if(!c.lines)c.lines=[];if(!c.trend)c.trend=pick(CONS_TRENDS);}
function launchLine(cat,tier,trendTag){
  ensureConsumer();const C=CONS_CATBY[cat]||CONS_CATS[0];const co=pc();
  const cost=round1((tier==='premium'?14:9)*rf(0.8,1.4));
  if(co.cash<cost){toast('Insufficient cash',`Launching this line costs $${money(cost)}M.`);return;}
  co.cash=round1(co.cash-cost);
  const lead=(typeof pickFigures==='function')?pickFigures('consumer',['creative','brand','chef'],1)[0]:null;
  const name=consLineName(cat,tier);
  const ln={id:uid('line'),name,cat,tier,trendTag,channel:0,heat:ri(22,42),mkt:1,leadId:lead};
  G.industry.consumer.lines.push(ln);
  if(lead&&typeof logCareer==='function')logCareer(lead,`Launched the ${name} line.`,'launch',2);
  pushFeed('brand',`Launched ${name} — a ${tier} ${C.name.toLowerCase()} brand aligned to ${trendTag}.`,'neutral');
  toast(`${C.icon} New brand`,name);recompute();render();
}
function consLineName(cat,tier){const A=['Vero','Lumen','Halcyon','Sable','Wilder','Norden','Aurae','Maven','Kindred','Brava','Solace','Atelier'];const B=['& Co.','Goods','Supply','Collective','Labs','House','Studio','Provisions'];return pick(A)+' '+pick(B);}
function consMkt(id,d){ensureConsumer();const ln=G.industry.consumer.lines.find(x=>x.id===id);if(ln){ln.mkt=clamp(round1(ln.mkt+d),0,8);render();}}
function consDist(id){ensureConsumer();const ln=G.industry.consumer.lines.find(x=>x.id===id);if(ln&&ln.channel<CONS_CHANNELS.length-1){ln.channel++;pushFeed('brand',`${ln.name} expands into ${CONS_CHANNELS[ln.channel].name}.`,'good');render();}}
function consDrop(id){ensureConsumer();G.industry.consumer.lines=G.industry.consumer.lines.filter(x=>x.id!==id);render();}
function tickConsumer(){
  ensureConsumer();const cs=G.industry.consumer;const co=pc();let rev=0,spend=0;
  cs.trendMo++;if(cs.trendMo>=ri(6,10)){cs.trendMo=0;cs.trend=pick(CONS_TRENDS.filter(t=>t!==cs.trend));pushFeed('brand',`Consumer trend shift: ${cs.trend} is now in vogue.`,'neutral');}
  cs.lines.forEach(ln=>{
    const onTrend=ln.trendTag===cs.trend;
    ln.heat=clamp(round1(ln.heat + ln.mkt*3.2 - 1.5 + (onTrend?3.5:-1.5) + (typeof synergy==='function'?synergy('ip_merch'):0)),0,100);
    const C=CONS_CATBY[ln.cat]||CONS_CATS[0];const ch=CONS_CHANNELS[ln.channel];
    const r=(ln.heat/100)*ch.reach*(C.price*(ln.tier==='premium'?1.5:1))*ch.margin*0.55*(1+(typeof synergy==='function'?synergy('vertical')+synergy('logistics'):0));
    rev+=r;spend+=ln.mkt;
    if(ln.heat>=90&&!ln._peak){ln._peak=true;if(ln.leadId&&typeof logCareer==='function')logCareer(ln.leadId,`${ln.name} became a breakout hit.`,'hit',6);}

function tickIndustrial(){
  ensureIndustrial();const ind=G.industry.industrial;const co=pc();
  // commodity cycle: mean-reverting random walk with regime swings
  ind.cycleMo++;const drift=(100-ind.spot)*0.04;const shock=rf(-9,9)+((G.macro&&G.macro.growth)?(G.macro.growth-1)*20:0);
  if(ind.cycleMo>=ri(10,20)){ind.cycleMo=0;ind.spot+=rf(-25,25);}
  ind.spot=clamp(round1(ind.spot+drift+shock),35,210);
  const h=ind.hedge/100;const effIdx=ind.spot*(1-h)+100*h;
  let net=0;
  ind.assets.forEach(a=>{
    if(a.buildLeft>0){a.buildLeft--;if(a.buildLeft<=0){pushFeed('ops',`${a.name} is now online.`,'good');if(a.leadId&&typeof logCareer==='function')logCareer(a.leadId,`Brought the ${a.name.toLowerCase()} online on schedule.`,'online',3);}return;}
    const out=a.cap*(a.util/100);

    net+=r;
  });

    ${_leadLine(p.leadId,'Lead')}
    ${building?'':`<div class="btnrow" style="gap:6px;margin-top:8px;flex-wrap:wrap">${btn('Push rents','realtyrent',{id:p.id,delta:1},'ghost sm')}${btn('Cut rents','realtyrent',{id:p.id,delta:-1},'ghost sm')}${btn('Sell','realtysell',{id:p.id},'ghost sm')}</div>`}</div>`;}).join('')}</div>`;}
  else body=`<div class="empty">No properties yet. Acquire a stabilized asset or develop one from the ground up.</div>`;
  return head+panel('Holdings',body);
}
function openRealtyModal(develop){
  const opts=RE_TYPES.map(t=>`<option value="${t.key}">${t.icon} ${esc(t.name)} — ~$${money(t.val[0])}–${money(t.val[1])}M</option>`).join('');
  openModal(`<div class="modal"><div class="modal-hd"><div><div class="mh-title">${develop?'Develop a Property':'Acquire a Property'}</div><div class="mh-sub">${develop?'Build at a cost basis below stabilized value — but carry it vacant through construction.':'Buy a stabilized, income-producing asset at market.'} Financed at 60% LTV.</div></div>${btn('×','closemodal',{},'icon')}</div>
    <div class="fld"><label>Property type</label><select id="reType">${opts}</select></div>
    <div class="btnrow" style="margin-top:12px;justify-content:flex-end">${btn('Cancel','closemodal',{},'ghost')}${btn(develop?'Start development':'Acquire','realtydo',{dev:develop?1:0},'primary')}</div></div>`);
}
function doRealty(dev){const t=($('#reType')||{}).value;if(t){closeModal();acquireProp(t,!!dev);}}

/* register */
INDUSTRY_SYSTEMS.consumer  ={label:'Brands',  glyph:'◈', ensure:ensureConsumer,  tick:tickConsumer,  screen:renderConsumerScreen};
INDUSTRY_SYSTEMS.industrial={label:'Assets',  glyph:'⬡', ensure:ensureIndustrial,tick:tickIndustrial,screen:renderIndustrialScreen};
INDUSTRY_SYSTEMS.mobility  ={label:'Network', glyph:'➤', ensure:ensureMobility,  tick:tickMobility,  screen:renderMobilityScreen};
INDUSTRY_SYSTEMS.realty    ={label:'Property',glyph:'⌂', ensure:ensureRealty,    tick:tickRealty,    screen:renderRealtyScreen};

/* events */
Array.prototype.push.apply(EVENTS,[
{id:'cons_viral',cat:'brand',w:2,cond:c=>hasIndustry('consumer')&&G.industry&&G.industry.consumer&&G.industry.consumer.lines.length>0,make:c=>{
  const ln=pick(G.industry.consumer.lines);
  return {title:'A Brand Goes Viral',icon:'📲',body:`${ln.name} is having a moment online. Pour fuel on the fire?`,
    choices:[{label:'Lean in hard (−$3M)',hint:'Spike heat',act:()=>{if(pc().cash>=3){pc().cash=round1(pc().cash-3);ln.heat=clamp(ln.heat+22,0,100);}}},{label:'Stay measured',act:()=>{ln.heat=clamp(ln.heat+6,0,100);}}]};
}},
{id:'ind_supercycle',cat:'market',w:2,cond:c=>hasIndustry('industrial')&&G.industry&&G.industry.industrial&&G.industry.industrial.assets.some(a=>a.buildLeft<=0),make:c=>{
  return {title:'Commodity Super-Cycle',icon:'📈',body:`Prices are surging. Lock in forward sales to bank the windfall, or run unhedged and let it ride?`,
    choices:[{label:'Hedge the boom',hint:'Bank it',act:()=>{ensureIndustrial();G.industry.industrial.hedge=clamp(G.industry.industrial.hedge+40,0,100);G.industry.industrial.spot=clamp(G.industry.industrial.spot+25,35,210);}},{label:'Run it unhedged',hint:'Greed',act:()=>{ensureIndustrial();G.industry.industrial.spot=clamp(G.industry.industrial.spot+45,35,210);}}]};
}},
{id:'mob_regulator',cat:'compete',w:1,cond:c=>hasIndustry('mobility')&&G.industry&&G.industry.mobility&&G.industry.mobility.cities.length>0,make:c=>{
  const ct=pick(G.industry.mobility.cities);
  return {title:`Regulators in ${ct.name}`,icon:'⚖️',body:`${ct.name} threatens to cap your operations. Fight it or play nice?`,
    choices:[{label:'Lobby hard (−$4M)',act:()=>{if(pc().cash>=4){pc().cash=round1(pc().cash-4);}}},{label:'Accept limits',hint:'Slower growth',act:()=>{ct.maturity=clamp(ct.maturity-10,0,100);}}]};
}},
{id:'realty_rates',cat:'finance',w:2,cond:c=>hasIndustry('realty')&&G.industry&&G.industry.realty&&G.industry.realty.props.some(p=>p.debt>0),make:c=>{
  return {title:'Rates Move Against You',icon:'🏦',body:`Financing costs are climbing. Pay down debt to de-risk, or hold and bet on appreciation?`,
    choices:[{label:'Pay down debt (−$10M)',hint:'Safer',act:()=>{if(pc().cash>=10){pc().cash=round1(pc().cash-10);const p=G.industry.realty.props.find(x=>x.debt>0);if(p)p.debt=round1(Math.max(0,p.debt-10));}}},{label:'Stay levered',hint:'Cycle bet',act:()=>{ensureRealty();G.industry.realty.sentiment=clamp(G.industry.realty.sentiment-0.06,0.7,1.3);}}]};
}},
]);
for(const k in EVENTS_BY_CAT)delete EVENTS_BY_CAT[k];
EVENTS.forEach(e=>{(EVENTS_BY_CAT[e.cat]=EVENTS_BY_CAT[e.cat]||[]).push(e);});

/* ===================== 32_synergies.js ===================== */
/* ============================================================
   CROSS-INDUSTRY SYNERGIES
   Operating complementary industries together compounds the
   empire: IP feeds merchandise, a tech backbone lifts every
   division, an in-house finance arm funds bets cheaply, owned
   real estate and logistics cut costs, and so on.
   Each system queries synergy(id) / industryNetMult(ind) at tick.
   ============================================================ */
const SYNERGIES=[
  {id:'platform_eff', from:'tech', to:'*', name:'Platform Backbone',
   desc:'Your tech platform’s data, tooling and reach improve efficiency across every other division.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('tech'),
   mag:()=>{const t=(G.industry||{}).tech;if(!t)return 0;return clamp((t.engagement-50)/100*0.12+(t.share-0.3)*0.10,0,0.14);}},
  {id:'cheap_capital', from:'finance', to:'*', name:'Internal Capital',
   desc:'An in-house finance arm funds other divisions’ bets more cheaply, lifting their returns.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('finance'),
   mag:()=>{const f=(G.industry||{}).finance;if(!f)return 0;return clamp(0.04+(f.lifetimePnl>0?0.05:0)+(f.aum>3000?0.02:0),0,0.11);}},
  {id:'ip_merch', from:'media', to:'consumer', name:'IP → Merchandise',
   desc:'Hit films and shows drive licensed-merchandise demand, heating up your consumer brands.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('media')&&hasIndustry('consumer'),
   mag:()=>{const s=(G.industry||{}).studio;if(!s)return 0;return clamp((s.hits||0)*0.12,0,3.2);},
   fmt:v=>'+'+v.toFixed(1)+' heat/mo'},
  {id:'vertical', from:'industrial', to:'consumer', name:'Vertical Integration',
   desc:'Owning industrial production lowers the cost of goods for your consumer lines.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('industrial')&&hasIndustry('consumer'),
   mag:()=>0.13},
  {id:'logistics', from:'mobility', to:'consumer', name:'Owned Logistics',
   desc:'Your mobility and delivery network gets your consumer goods to market faster and cheaper.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('mobility')&&hasIndustry('consumer'),
   mag:()=>0.09},
  {id:'ai_discovery', from:'tech', to:'health', name:'AI-Driven Discovery',
   desc:'Your tech R&D and compute raise the odds that drug and device programs clear each phase.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('tech')&&hasIndustry('health'),
   mag:()=>{const t=(G.industry||{}).tech;if(!t)return 0;return clamp(0.03+(t.share-0.3)*0.06,0,0.08);},
   fmt:v=>'+'+Math.round(v*100)+'% trial odds'},
  {id:'own_depots', from:'realty', to:'mobility', name:'Owned Depots',
   desc:'Owning real estate cuts the fixed operating costs of your mobility network.',
   active:()=>typeof hasIndustry==='function'&&hasIndustry('realty')&&hasIndustry('mobility'),
   mag:()=>0.30, fmt:v=>'−'+Math.round(v*100)+'% city costs'},
];
const SYN_BY={};SYNERGIES.forEach(s=>SYN_BY[s.id]=s);
function synergy(id){const s=SYN_BY[id];if(!s)return 0;try{return s.active()?(s.mag()||0):0;}catch(e){return 0;}}
/* empire-wide net multiplier applied to an industry's monthly contribution (source industry excluded from its own bonus) */
function industryNetMult(forInd){let m=1;if(forInd!=='tech')m+=synergy('platform_eff');if(forInd!=='finance')m+=synergy('cheap_capital');return m;}
function activeSynergies(){return SYNERGIES.filter(s=>{try{return s.active()&&s.mag()>0;}catch(e){return false;}});}
function renderSynergies(){
  const act=activeSynergies();if(!act.length)return '';
  return panel('Conglomerate Synergies',
    `<div class="syn-grid">${act.map(s=>{const I1=INDBY[s.from]||{};const toAll=s.to==='*';const I2=toAll?{glyph:'✦',short:'every division'}:(INDBY[s.to]||{});
      const mag=s.mag();const disp=s.fmt?s.fmt(mag):('+'+Math.round(mag*100)+'%');
      return `<div class="syn-card"><div class="syn-h"><span class="syn-route">${I1.glyph||'✦'} ${esc(I1.short||s.from)} <span class="syn-arrow">→</span> ${I2.glyph||'✦'} ${esc(I2.short||s.to)}</span><span class="syn-mag">${disp}</span></div><div class="syn-name">${esc(s.name)}</div><div class="syn-desc">${esc(s.desc)}</div></div>`;}).join('')}</div>`,
    {right:`<span class="hint">${act.length} active — diversifying compounds the whole empire</span>`});
}

/* ===================== 14_boot.js ===================== */
/* ============================================================
   BOOT — wire events and start the app.
   ============================================================ */
function boot(){
  wireEvents();
  let resumed=false;
  if(hasSave()){
    try{
      if(loadGame()&&G&&G.started){ resumed=true; }
    }catch(e){ resumed=false; }
  }
  if(resumed){
    UI.tab='dashboard';
    render();
  }else{
    initSetupState();
    renderSetup();
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',boot);
}else{
  boot();
}

</script>
